function exportBankToCSV() {
  if (!dmBank.length) {
    openModal('Export Bank', `
      <div class="bk-desc">The bank is empty — add some items first before exporting.</div>
      <button class="btn btn-green" style="width:100%" onclick="closeModal()">OK</button>
    `);
    return;
  }

  const colNames = [
    'Name', 'Category', 'Level Requirement', 'Is Attack', 'Is Growth', 'Is Soul Bound',
    'Detail / Cost Line', 'Description', 'Attack Dice', 'Attack Count', 'Attack Stat Modifier',
    'Resource Cost', 'Resource Cost Type', 'Status', 'DM Notes'
  ];

  openModal('⬇ Export Bank to CSV', `
    <div class="bk-icon">📊</div>
    <div class="bk-desc">Export all <strong>${dmBank.length} bank item(s)</strong> as a CSV file — open it in Excel, Google Sheets, or any spreadsheet app to build your rule book reference.</div>
    <div style="margin:0 0 10px">
      <div style="font-family:'Cinzel',serif;font-size:0.55rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:6px">Columns included</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px">
        ${colNames.map(c => `<span style="font-size:0.68rem;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:2px 7px;color:var(--text2)">${c}</span>`).join('')}
      </div>
    </div>
    <label style="display:flex;align-items:center;gap:8px;font-size:0.82rem;color:var(--text2);cursor:pointer;margin-bottom:14px">
      <input type="checkbox" id="csvIncludeDMNotes" checked/>
      Include DM Notes &nbsp;<span style="color:var(--text3);font-size:0.75rem">(uncheck to omit private notes — useful for sharing)</span>
    </label>
    <div class="bk-actions">
      <button class="btn" style="flex:1" onclick="closeModal()">Cancel</button>
      <button class="btn btn-green" style="flex:2" onclick="confirmExportBankToCSV()">⬇ Download CSV</button>
    </div>
  `);
}

function confirmExportBankToCSV() {
  const includeDMNotes = !!(document.getElementById('csvIncludeDMNotes') || {}).checked;

  const DICE_LABEL = { 4:'d4', 6:'d6', 8:'d8', 10:'d10', 12:'d12', 20:'d20', 100:'d100' };
  const CAT_LABEL  = {
    systemSkill:'System Skill', classSkill:'Class Skill', raceSkill:'Race Skill',
    profSkill:'Profession Skill', title:'Title', general:'General Note'
  };

  // Wrap value safely for CSV: quote if contains comma, quote, or newline
  function cv(v) {
    if (v === null || v === undefined) return '';
    const s = String(v).replace(/\r?\n/g, ' ');
    return (s.includes(',') || s.includes('"')) ? '"' + s.replace(/"/g, '""') + '"' : s;
  }

  const headers = [
    'Name', 'Category', 'Level Requirement',
    'Is Attack', 'Is Growth', 'Is Soul Bound',
    'Detail / Cost Line', 'Description',
    'Attack Dice', 'Attack Count', 'Attack Stat Modifier',
    'Resource Cost', 'Resource Cost Type',
    'Status'
  ];
  if (includeDMNotes) headers.push('DM Notes');

  const rows = dmBank.map(function(item) {
    const grantedNames = (item.grantedTo || []).map(function(g) { return g.name; });
    const status = grantedNames.length ? 'Granted to: ' + grantedNames.join('; ') : 'Banked';
    const diceLabel = DICE_LABEL[item.attackDice] || (item.attackDice ? 'd' + item.attackDice : '');

    const row = [
      item.name        || '',
      CAT_LABEL[item.category] || item.category || '',
      item.tier        || '',
      item.isAttack    ? 'Yes' : 'No',
      item.isGrowth    ? 'Yes' : 'No',
      item.isSoulBound ? 'Yes' : 'No',
      item.detail      || '',
      item.desc        || '',
      item.isAttack    ? diceLabel                                        : '',
      item.isAttack    ? (item.attackCount || 1)                          : '',
      item.isAttack    ? (item.attackStat || '')                          : '',
      item.isAttack && item.attackCost > 0         ? item.attackCost      : '',
      item.isAttack && item.attackCostType && item.attackCostType !== 'none'
                       ? item.attackCostType.toUpperCase()               : '',
      status
    ];
    if (includeDMNotes) row.push(item.dmNotes || '');
    return row.map(cv).join(',');
  });

  const csv = [headers.map(cv).join(',')].concat(rows).join('\r\n');
  // BOM prefix so Excel opens UTF-8 correctly without garbled characters
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const dateStr = new Date().toISOString().slice(0, 10);
  a.href     = url;
  a.download = 'chronicle-bank-' + dateStr + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  closeModal();
  showSaveStatus('✓ Bank exported — ' + dmBank.length + ' item(s)', true);
}

// ================================================================
// DARK MODE
// ================================================================
function toggleDarkMode() {
  const isDark = document.body.classList.toggle('dark-mode');
  localStorage.setItem('chronicle_dark_mode', isDark ? '1' : '0');
  const btn = document.getElementById('darkModeBtn');
  if (btn) btn.textContent = isDark ? '☀️' : '🌙';
  if (isDMView) applyDMThemeToRoot();
}

function initDarkMode() {
  if (localStorage.getItem('chronicle_dark_mode') === '1') {
    document.body.classList.add('dark-mode');
    const btn = document.getElementById('darkModeBtn');
    if (btn) btn.textContent = '☀️';
  }
}

// ================================================================
// BOOT
// ================================================================
(function init() {
  // Apply dark mode before first render to avoid flash
  initDarkMode();

  // Always load from localStorage first so data persists across refreshes.
  // Firebase listener will layer in any updates from other players on top.
  const loaded = loadFromStorage();
  if (!loaded) {
    characters.length = 0;
    characters.push(makeDevyn());
    characters.push(makeXeva());
    activeCharIdx = 0;
  }

  characters.forEach(ch => recalcVitals(ch));
  renderAllTabs();
  renderSheet();

  window.addEventListener('beforeunload', () => saveAll());
  document.addEventListener('input', (e) => {
    const id = e.target?.id;
    if (id && ['charName','charRace','charClass','charProf','charAC','blessingsText'].includes(id)) {
      scheduleAutoSave();
    }
  });

  // Connect to Firebase room if ?room= is in the URL
  initFirebase();
})();

// ================================================================
// GALAXY RIPPLE SYSTEM
// Click-triggered nebula ripples — only active in DM galaxy view
// ================================================================
(function() {
  const canvas = document.getElementById('ripple-canvas');
  const ctx = canvas.getContext('2d');
  const ripples = [];
  const RIPPLE_PALETTES = [
    ['rgba(168,85,247,',  'rgba(124,58,237,',  'rgba(216,180,254,'],
    ['rgba(6,182,212,',   'rgba(14,116,144,',  'rgba(103,232,249,'],
    ['rgba(236,72,153,',  'rgba(157,23,77,',   'rgba(249,168,212,'],
    ['rgba(251,191,36,',  'rgba(180,83,9,',    'rgba(254,243,199,'],
    ['rgba(99,102,241,',  'rgba(55,48,163,',   'rgba(199,210,254,'],
  ];
  let paletteIdx = 0;

  function resizeCanvas() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  document.addEventListener('click', function(e) {
    if (!isDMView) return;
    if (e.target.closest('button, textarea, input, select, .dm-status-icon')) return;
    const palette = RIPPLE_PALETTES[paletteIdx % RIPPLE_PALETTES.length];
    paletteIdx++;
    ripples.push({
      x: e.clientX, y: e.clientY,
      maxR: Math.max(window.innerWidth, window.innerHeight) * 0.6,
      progress: 0,
      palette,
      rings: 3,
      speed: 0.008 + Math.random() * 0.006,
    });
  });

  function drawRipples() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = ripples.length - 1; i >= 0; i--) {
      const rp = ripples[i];
      rp.progress += rp.speed;
      if (rp.progress >= 1) { ripples.splice(i, 1); continue; }
      const eased = 1 - Math.pow(1 - rp.progress, 3);
      const r     = rp.maxR * eased;
      const alpha = (1 - rp.progress) * 0.55;
      for (let ring = 0; ring < rp.rings; ring++) {
        const ringR     = Math.max(0, r - ring * (rp.maxR * 0.08));
        const ringAlpha = alpha * (1 - ring * 0.28);
        const ringWidth = Math.max(1, 3 - ring * 0.8);
        const colorBase = rp.palette[ring % rp.palette.length];
        ctx.beginPath();
        ctx.arc(rp.x, rp.y, ringR, 0, Math.PI * 2);
        ctx.strokeStyle = colorBase + ringAlpha + ')';
        ctx.lineWidth   = ringWidth * 2.5;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(rp.x, rp.y, ringR, 0, Math.PI * 2);
        ctx.strokeStyle = colorBase + Math.min(1, ringAlpha * 2) + ')';
        ctx.lineWidth   = ringWidth * 0.8;
        ctx.stroke();
      }
      if (rp.progress < 0.15) {
        const flashAlpha = (0.15 - rp.progress) / 0.15 * 0.6;
        const flashR     = r * 0.25;
        const grad = ctx.createRadialGradient(rp.x, rp.y, 0, rp.x, rp.y, flashR);
        grad.addColorStop(0, rp.palette[2] + flashAlpha + ')');
        grad.addColorStop(1, rp.palette[0] + '0)');
        ctx.beginPath();
        ctx.arc(rp.x, rp.y, flashR, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
      }
    }
    requestAnimationFrame(drawRipples);
  }
  drawRipples();
})();
</script>
