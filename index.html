function removeChar(idx, event) {
  event.stopPropagation();
  if (characters.length<=1) { alert("Can't remove the last character."); return; }
  if (!confirm(`Remove character "${characters[idx].name}"?`)) return;
  characters.splice(idx,1);
  if (activeCharIdx>=characters.length) activeCharIdx=characters.length-1;
  renderAllTabs();
  renderSheet();
}

// ================================================================
// SAVE / LOAD / SHARE
// ================================================================
const SAVE_KEY = 'chronicle_sheets_v2';

function getSerializableState() {
  return { characters, activeCharIdx, nextCharId, sessionNotes, dmBank, humanRankBonuses };
}

function saveAll() {
  try {
    const data = JSON.stringify(getSerializableState());
    localStorage.setItem(SAVE_KEY, data);
    showSaveStatus('✓ Saved', true);
    updateURLHash(data);
    // Sync to Firebase room if live
    if (_firebaseDb && _roomId && !_receivingRemoteUpdate) {
      _firebaseDb.ref('rooms/' + _roomId + '/characters').set({
        payload: data,
        by: _userId,
        ts: Date.now()
      });
    }
  } catch(e) {
    showSaveStatus('Save failed: ' + e.message, false);
  }
}

function loadFromStorage() {
  // First check URL hash (shareable link takes priority)
  const hash = window.location.hash;
  if (hash && hash.length > 2) {
    try {
      const decoded = decodeURIComponent(hash.slice(1));
      const data = JSON.parse(atob(decoded));
      applyLoadedState(data);
      showSaveStatus('✓ Loaded from shared link', true);
      return true;
    } catch(e) {
      // Fall through to localStorage
    }
  }
  // Try localStorage
  try {
    const saved = localStorage.getItem(SAVE_KEY);
    if (saved) {
      const data = JSON.parse(saved);
      applyLoadedState(data);
      showSaveStatus('✓ Loaded saved data', true);
      return true;
    }
  } catch(e) {
    showSaveStatus('Could not load save', false);
  }
  showSaveStatus('No saved data', false);
  return false;
}

function applyLoadedState(data) {
  if (data.characters && Array.isArray(data.characters)) {
    characters.length = 0;
    data.characters.forEach(c => {
      // ── Self-healing: recalculate totalFPEarned from actual levels ──
      c.totalFPEarned = calcTotalFPEarned(c.classLevel || 0, c.raceLevel || 0);
      // ── Self-healing: recalculate classBonus for each stat ──
      const cb = {};
      for (const [stat, bonus] of Object.entries(CLASS_BONUSES)) cb[stat] = bonus * (c.classLevel || 0);
      for (const stat of STAT_KEYS) {
        if (c.stats && c.stats[stat]) c.stats[stat].classBonus = cb[stat] || 0;
      }
      // ── Ensure theme field exists ──
      if (!c.theme) c.theme = 'theme-crimson';
      // ── Ensure systemSkillOptions exists ──
      if (!c.systemSkillOptions) c.systemSkillOptions = {};
      // ── Migrate v5.9 race/profession fields ──
      if (c.selectedRaceId === undefined) c.selectedRaceId = null;
      if (c.raceSS === undefined) c.raceSS = false;
      if (!c.raceBonusesApplied) c.raceBonusesApplied = [];
      if (!c.professions) c.professions = [];
      if (c.activeProfessionId === undefined) c.activeProfessionId = null;
      // ── Ensure new fields exist ──
      if (!c.conditions) c.conditions = [];
      if (c.notes === undefined) c.notes = '';
      if (!c.collapsedSections) c.collapsedSections = {};
      if (!c.rollPresets) c.rollPresets = [];
      if (c.dmNotes === undefined) c.dmNotes = '';
      if (!c.dmConditions) c.dmConditions = [];
      // ── Strip character-wrong skills from old saves ──
      // Devyn must NOT have Cat's Eye (ss6) or Healing Minor (ss7)
      // Xeva must NOT have Bale Fire Bolt (xeva_ss2) or Light Weapon Training (xeva_ss3)
      if (c.name === 'Devyn') {
        const devynBanned = new Set(['ss6','ss7']);
        for (const t of Object.keys(c.systemSkillOptions)) {
          c.systemSkillOptions[t] = (c.systemSkillOptions[t] || []).filter(function(sk) { return !devynBanned.has(sk.id); });
        }
        c.selectedSystemSkills = (c.selectedSystemSkills || []).filter(function(sk) { return !devynBanned.has(sk.id); });
        if (c.classSkills) c.classSkills = c.classSkills.filter(function(sk) { return !devynBanned.has(sk.id); });
      }
      if (c.name === 'Xeva') {
        // Ban both the old global IDs (ss2, ss3) and the xeva-namespaced variants — strip from everywhere
        const xevaBanned = new Set(['ss2','ss3','xeva_ss2','xeva_ss3']);
        for (const t of Object.keys(c.systemSkillOptions)) {
          c.systemSkillOptions[t] = (c.systemSkillOptions[t] || []).filter(function(sk) { return !xevaBanned.has(sk.id); });
        }
        c.selectedSystemSkills = (c.selectedSystemSkills || []).filter(function(sk) { return !xevaBanned.has(sk.id); });
        if (c.classSkills) c.classSkills = c.classSkills.filter(function(sk) { return !xevaBanned.has(sk.id); });
      }
      // ── Seed systemSkillOptions from SYSTEM_SKILLS only if that tier is completely empty ──
      for (const [tier, skills] of Object.entries(SYSTEM_SKILLS)) {
        const t = parseInt(tier);
        if (!c.systemSkillOptions[t] || c.systemSkillOptions[t].length === 0) {
          c.systemSkillOptions[t] = skills.map(function(sk) { return Object.assign({}, sk); });
        }
      }
      // ── Self-healing: strip old buggy saves that had multiple selections per tier ──
      if (c.selectedSystemSkills && Array.isArray(c.selectedSystemSkills)) {
        const tierCounts = {};
        c.selectedSystemSkills.forEach(function(s) { tierCounts[s.tier] = (tierCounts[s.tier] || 0) + 1; });
        const hasBadTier = Object.values(tierCounts).some(function(count) { return count > 1; });
        if (hasBadTier) {
          const staleIds = new Set(c.selectedSystemSkills.map(function(s) { return s.id; }));
          c.selectedSystemSkills = [];
          if (c.classSkills) c.classSkills = c.classSkills.filter(function(s) { return !staleIds.has(s.id); });
        }
      }
      // ── KEY FIX: ensure every selected system skill is present in classSkills ──
      // makeDevyn stores ss1 in selectedSystemSkills but not in classSkills.
      // Any save/load gap where classSkills is missing a selected entry is corrected here.
      if (!c.selectedSystemSkills) c.selectedSystemSkills = [];
      if (!c.classSkills) c.classSkills = [];
      c.selectedSystemSkills.forEach(function(sel) {
        const alreadyInCS = c.classSkills.find(function(sk) { return sk.id === sel.id; });
        if (!alreadyInCS) {
          // Re-create the class skill entry from the selection record
          c.classSkills.push({
            id: sel.id, name: sel.name, detail: sel.rarity || '', desc: sel.desc || '',
            isAttack: sel.isAttack || false, isGrowth: sel.isGrowth || false,
            isSoulBound: false, statAdj: false, sbSlotBonus: false,
            vitalEffect: null, _sysSkillTier: sel.tier,
            attackDice: sel.attackDice || 20, attackCount: sel.attackCount || 1,
            attackStat: sel.attackStat || null, attackCost: sel.attackCost || 0,
            attackCostType: sel.attackCostType || 'none',
          });
        } else {
          // Ensure _sysSkillTier tag is present
          if (!alreadyInCS._sysSkillTier) alreadyInCS._sysSkillTier = sel.tier;
        }
      });
      characters.push(c);
    });
    // ── If only Devyn was saved (old single-char save), add Xeva ──
    const hasXeva = characters.some(c => c.name === 'Xeva');
    if (!hasXeva) {
      const xeva = makeXeva();
      recalcVitals(xeva);
      characters.push(xeva);
    }
  }
  if (typeof data.activeCharIdx === 'number') activeCharIdx = Math.min(data.activeCharIdx, characters.length-1);
  if (typeof data.nextCharId === 'number') nextCharId = data.nextCharId;
  if (typeof data.sessionNotes === 'string') sessionNotes = data.sessionNotes;
  if (Array.isArray(data.dmBank)) dmBank = data.dmBank;
  // Restore human rank bonuses
  if (data.humanRankBonuses && typeof data.humanRankBonuses === 'object') {
    Object.assign(humanRankBonuses, data.humanRankBonuses);
  }
  // Migrate legacy dmConditions → unified conditions
  if (data.characters) data.characters.forEach(function(c) {
    if (c.dmConditions && c.dmConditions.length) {
      if (!c.conditions) c.conditions = [];
      c.dmConditions.forEach(function(id) { if (!c.conditions.includes(id)) c.conditions.push(id); });
      c.dmConditions = [];
    }
  });
  // Re-apply active character's theme
  const activeCh = characters[activeCharIdx];
  if (activeCh) applyTheme(activeCh.theme || 'theme-crimson');
}

function showSaveStatus(msg, isGood) {
  const el = document.getElementById('saveStatus');
  if (!el) return;
  el.textContent = msg;
  el.className = 'save-status ' + (isGood ? 'saved' : 'unsaved');
  if (isGood) setTimeout(() => { el.textContent = '✓ Saved'; el.className='save-status saved'; }, 3000);
}

function updateURLHash(dataStr) {
  try {
    const encoded = btoa(encodeURIComponent(dataStr));
    history.replaceState(null, '', '#' + encoded);
  } catch(e) {}
}

function generateShareURL() {
  saveAll(); // ensure state is current
  const data = JSON.stringify(getSerializableState());
  try {
    const encoded = btoa(encodeURIComponent(data));
    const url = window.location.origin + window.location.pathname + '#' + encoded;
    const box = document.getElementById('shareUrlBox');
    const btn = document.getElementById('copyUrlBtn');
    box.value = url;
    box.style.display = 'block';
    btn.style.display = 'inline-block';
    showSaveStatus('✓ Share URL generated — click to copy', true);
  } catch(e) {
    showSaveStatus('Could not generate URL: data may be too large', false);
  }
}

function copyShareURL() {
  const box = document.getElementById('shareUrlBox');
  if (!box || !box.value) return;
  navigator.clipboard.writeText(box.value).then(() => {
    showSaveStatus('✓ URL copied to clipboard!', true);
    const btn = document.getElementById('copyUrlBtn');
    if (btn) { btn.textContent = 'Copied!'; setTimeout(() => btn.textContent='Copy', 2000); }
  }).catch(() => {
    box.select();
    document.execCommand('copy');
    showSaveStatus('✓ URL copied!', true);
  });
}

function clearSave() {
  openModal('⚠️ Caution', `
    <div style="text-align:center;margin-bottom:16px">
      <div style="font-size:2.4rem;margin-bottom:8px">⚠️</div>
      <div style="font-family:'Cinzel',serif;font-size:1rem;color:#c0392b;font-weight:700;margin-bottom:8px">Clear All Saved Data?</div>
      <div style="color:var(--text2);font-size:0.88rem;line-height:1.65">
        This will permanently delete all character data, customizations, and settings from this browser.<br/><br/>
        <strong style="color:var(--text)">This cannot be undone.</strong>
      </div>
    </div>
    <div style="background:rgba(192,57,43,0.08);border:1px solid rgba(192,57,43,0.3);border-radius:6px;padding:10px 14px;margin-bottom:16px;font-size:0.82rem;color:#c0392b;font-family:'Cinzel',serif;letter-spacing:0.04em;text-align:center">
      All characters will be reset to their defaults.
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn" style="flex:1" onclick="closeModal()">Cancel</button>
      <button class="btn btn-red" style="flex:1;font-weight:700" onclick="closeModal();_executeClearSave()">Yes, Clear Everything</button>
    </div>
  `);
}

function _executeClearSave() {
  localStorage.removeItem(SAVE_KEY);
  history.replaceState(null, '', window.location.pathname);
  const box = document.getElementById('shareUrlBox');
  const btn = document.getElementById('copyUrlBtn');
  if (box) { box.value=''; box.style.display='none'; }
  if (btn) btn.style.display='none';
  // Re-initialize with both default characters
  characters.length = 0;
  characters.push(makeDevyn());
  characters.push(makeXeva());
  activeCharIdx = 0;
  characters.forEach(ch => recalcVitals(ch));
  renderAllTabs();
  renderSheet();
  showSaveStatus('Save cleared — defaults restored', false);
}

function openRaceSelectionModal() {
  const ch = characters[activeCharIdx];
  const raceOptions = dmBank.filter(function(b){ return b.category === 'race'; });
  const optionsHTML = raceOptions.length === 0
    ? '<div style="color:var(--text3);font-size:0.85rem;text-align:center;padding:16px">No race options in the DM Bank yet.<br/>Ask your Game Master to add races.</div>'
    : raceOptions.map(function(race){
        const startRank = race.startingRank || 'G';
        const sr = (race.rankStats && race.rankStats[startRank]) ? race.rankStats[startRank] : {};
        const statPreview = STAT_KEYS.filter(function(k){ return (sr[k]||0)>0; })
          .map(function(k){ return '+' + sr[k] + ' ' + (STAT_ABBR[k]||k); }).join(', ') || 'No immediate bonus';
        return '<div style="border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px;background:var(--bg3)">' +
          '<div style="font-family:\'Cinzel\',serif;font-size:0.95rem;color:var(--accent2);margin-bottom:4px">' + escHtml(race.name) +
          ' <span style="font-size:0.72rem;color:var(--text3)">(Starting Rank: ' + escHtml(startRank) + ')</span></div>' +
          '<div style="font-size:0.82rem;color:var(--text2);margin-bottom:6px">' + escHtml(race.desc||'') + '</div>' +
          '<div style="font-size:0.75rem;color:var(--gold-dim);margin-bottom:8px">Starting bonus: ' + statPreview + '</div>' +
          '<button class="btn btn-gold btn-sm" onclick="confirmRaceSelection(\'' + race.id + '\')">Select ' + escHtml(race.name) + '</button></div>';
      }).join('');
  openModal('🌟 Race Evolution — Human(C) Unlocked',
    '<div style="text-align:center;margin-bottom:14px">' +
    '<div style="font-family:\'Cinzel\',serif;font-size:1rem;color:var(--accent2)">You have reached Level 200!</div>' +
    '<div style="font-size:0.83rem;color:var(--text2);line-height:1.6;margin-top:6px">Your Human journey has taken you to a crossroads.<br/>You may now evolve beyond Human or remain on the Human path.</div></div>' +
    optionsHTML +
    '<div style="margin-top:10px;border-top:1px solid var(--border);padding-top:10px">' +
    '<button class="btn btn-sm" style="width:100%" onclick="closeModal()">Remain Human — Decide Later</button></div>');
}

function confirmRaceSelection(bankRaceId) {
  const ch = characters[activeCharIdx];
  const bankRace = dmBank.find(function(b){ return b.id === bankRaceId; });
  if (!bankRace) return;
  ch.selectedRaceId = bankRaceId;
  ch.race = bankRace.name;
  const startRank = bankRace.startingRank || 'G';
  if (!ch.raceBonusesApplied) ch.raceBonusesApplied = [];
  const startGrade = bankRace.name + '(' + startRank + ')';
  if (!ch.raceBonusesApplied.includes(startGrade)) {
    ch.raceBonusesApplied.push(startGrade);
    const bonus = (bankRace.rankStats||{})[startRank] || {};
    STAT_KEYS.forEach(function(k){ ch.stats[k].raceBonus = (ch.stats[k].raceBonus||0) + (bonus[k]||0); });
  }
  recalcVitals(ch);
  closeModal();
  renderSheet();
  scheduleAutoSave();
}

function dmUnlockRaceSS(charIdx) {
  const ch = characters[charIdx];
  if (!ch.selectedRaceId) return;
  ch.raceSS = true;
  const bankRace = dmBank.find(function(b){ return b.id === ch.selectedRaceId; });
  if (bankRace && bankRace.rankStats && bankRace.rankStats['SS']) {
    const grade = bankRace.name + '(SS)';
    if (!ch.raceBonusesApplied) ch.raceBonusesApplied = [];
    if (!ch.raceBonusesApplied.includes(grade)) {
      ch.raceBonusesApplied.push(grade);
      const bonus = bankRace.rankStats['SS'];
      STAT_KEYS.forEach(function(k){ ch.stats[k].raceBonus = (ch.stats[k].raceBonus||0) + (bonus[k]||0); });
    }
  }
  recalcVitals(ch);
  renderDMView();
  scheduleAutoSave();
}

// DM PROFESSION FUNCTIONS
// ================================================================
function dmProfLevelChange(charIdx, profId, delta) {
  const ch = characters[charIdx];
  const prof = (ch.professions||[]).find(function(p){ return p.id === profId; });
  if (!prof) return;
  const oldLevel = prof.level || 0;
  const newLevel = Math.max(0, oldLevel + delta);
  if (newLevel === oldLevel) return;
  prof.level = newLevel;
  prof.history = prof.history || [];
  prof.history.push({ event: 'level_up', level: newLevel, date: Date.now(), statsGained: {} });
  // Check for milestone titles that are now available
  const bankItem = dmBank.find(function(b){ return b.id === prof.bankId; });
  if (bankItem && bankItem.milestoneTitles && delta > 0) {
    const newlyAvailable = bankItem.milestoneTitles.filter(function(mt){
      return (mt.requiredLevel||0) <= newLevel && !(prof.earnedTitleIds||[]).includes(mt.id);
    });
    if (newlyAvailable.length > 0) {
      const names = newlyAvailable.map(function(mt){ return mt.name + ' (Lvl '+mt.requiredLevel+')'; }).join(', ');
      if (confirm('Milestone title(s) available for ' + prof.name + ': ' + names + '.\n\nAward automatically?')) {
        newlyAvailable.forEach(function(mt){ dmAwardProfTitle(charIdx, profId, mt.id, false); });
      }
    }
  }
  recalcVitals(ch);
  renderDMView();
  renderSheet();
  scheduleAutoSave();
}

function dmSetActiveProfession(charIdx, profId) {
  const ch = characters[charIdx];
  ch.activeProfessionId = profId;
  renderDMView();
  renderSheet();
  scheduleAutoSave();
}

function dmGrantProfessionModal(charIdx) {
  const profOptions = dmBank.filter(function(b){ return b.category === 'profession'; });
  if (profOptions.length === 0) {
    alert('No profession bank items found. Add a Profession in the Skill Bank first.');
    return;
  }
  const ch = characters[charIdx];
  const alreadyGranted = new Set((ch.professions||[]).map(function(p){ return p.bankId; }));
  const optionsHTML = profOptions.map(function(b){
    const hasIt = alreadyGranted.has(b.id);
    return '<div class="option-card ' + (hasIt?'':'') + '" style="opacity:' + (hasIt?'0.5':'1') + '">'
      + '<div class="option-card-title">' + escHtml(b.name) + '</div>'
      + '<div class="option-card-desc">' + escHtml(b.desc||'') + '</div>'
      + (!hasIt ? '<button class="btn btn-green btn-sm" style="margin-top:8px;width:100%" onclick="dmGrantProfessionExec(' + charIdx + ',\'' + b.id + '\');closeModal()">Grant</button>' : '<div style="font-size:0.72rem;color:var(--text3);margin-top:6px">Already granted</div>')
      + '</div>';
  }).join('');
  openModal('Grant Profession to ' + escHtml(ch.name), '<div class="option-grid">' + optionsHTML + '</div>');
}

function dmGrantProfessionExec(charIdx, bankId) {
  const ch = characters[charIdx];
  const bankItem = dmBank.find(function(b){ return b.id === bankId; });
  if (!bankItem) return;
  ch.professions = ch.professions || [];
  const prof = {
    id: 'prof_' + Date.now(),
    bankId: bankId,
    name: bankItem.name,
    level: 0,
    notes: '',
    earnedTitleIds: [],
    history: [{ event: 'granted', date: Date.now(), level: 0 }],
  };
  ch.professions.push(prof);
  if (!ch.activeProfessionId) ch.activeProfessionId = prof.id;
  recalcVitals(ch);
  renderDMView();
  renderSheet();
  scheduleAutoSave();
}

function dmAwardProfTitle(charIdx, profId, titleId, doRender) {
  const ch = characters[charIdx];
  const prof = (ch.professions||[]).find(function(p){ return p.id === profId; });
  if (!prof) return;
  prof.earnedTitleIds = prof.earnedTitleIds || [];
  if (prof.earnedTitleIds.includes(titleId)) return;
  prof.earnedTitleIds.push(titleId);
  const bankItem = dmBank.find(function(b){ return b.id === prof.bankId; });
  const mt = (bankItem && bankItem.milestoneTitles||[]).find(function(m){ return m.id === titleId; });
  if (mt) {
    prof.history = prof.history || [];
    prof.history.push({ event: 'title', titleName: mt.name, level: prof.level||0, date: Date.now() });
  }
  if (doRender !== false) {
    recalcVitals(ch);
    renderDMView();
    renderSheet();
    scheduleAutoSave();
  }
}

function renderProfessionTab(ch) {
  const el = document.getElementById('professionTabContent');
  if (!el) return;
  const professions = ch.professions || [];
  const activeProfession = professions.find(function(p){ return p.id === ch.activeProfessionId; });
  const profStats = calcProfStats(ch);

  // Section 1: Active Profession
  let activeSection = '';
  if (activeProfession) {
    const bankItem = dmBank.find(function(b){ return b.id === activeProfession.bankId; });
    const level = activeProfession.level || 0;
    // Current milestone title
    let currentTitle = '';
    if (bankItem && bankItem.milestoneTitles) {
      const earnedTitles = bankItem.milestoneTitles.filter(function(mt){
        return (activeProfession.earnedTitleIds||[]).includes(mt.id);
      });
      if (earnedTitles.length > 0) currentTitle = earnedTitles[earnedTitles.length-1].name;
    }
    // Per-level stat contributions for active profession
    const baseStats = (bankItem && bankItem.baseStatPerLevel) || {};
    const statRows = STAT_KEYS.map(function(k){
      let total = (baseStats[k]||0) * level;
      if (bankItem && bankItem.milestoneTitles) {
        bankItem.milestoneTitles.forEach(function(mt){
          if ((activeProfession.earnedTitleIds||[]).includes(mt.id)) {
            total += ((mt.additionalStatsPerLevel||{})[k]||0) * Math.max(0, level - (mt.requiredLevel||0));
          }
        });
      }
      if (total === 0) return '';
      return `<div style="display:flex;justify-content:space-between;font-size:0.78rem;padding:2px 0"><span style="color:var(--text2)">${k}</span><span style="color:var(--gold2);font-weight:600">+${total}</span></div>`;
    }).filter(Boolean).join('') || '<div style="color:var(--text3);font-size:0.78rem">No stat bonuses yet.</div>';

    // Next milestone
    let nextMilestoneHTML = '';
    if (bankItem && bankItem.milestoneTitles) {
      const nextMT = bankItem.milestoneTitles.find(function(mt){
        return !(activeProfession.earnedTitleIds||[]).includes(mt.id) && (mt.requiredLevel||0) > level;
      });
      if (nextMT) {
        nextMilestoneHTML = `<div style="margin-top:6px;font-size:0.72rem;color:var(--text3)">Next milestone: <strong style="color:var(--gold)">${escHtml(nextMT.name)}</strong> at level ${nextMT.requiredLevel}</div>`;
      }
    }

    activeSection = `
    <div class="prof-section">
      <div class="prof-section-title">Active Profession</div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <div>
          <div style="font-size:1rem;font-weight:600;font-family:'Cinzel',serif;color:var(--accent)">${escHtml(activeProfession.name)}</div>
          ${currentTitle ? `<div class="prof-milestone-badge">${escHtml(currentTitle)}</div>` : ''}
        </div>
        <div class="header-badge" style="margin-left:auto"><span class="hb-label">Level</span><span class="hb-value">${level}</span></div>
      </div>
      <div style="font-size:0.68rem;color:var(--text3);font-family:'Cinzel',serif;letter-spacing:0.06em;margin-bottom:4px">STAT CONTRIBUTIONS</div>
      ${statRows}
      ${nextMilestoneHTML}
    </div>`;
  } else {
    activeSection = `<div class="prof-section"><div class="prof-section-title">Active Profession</div><div style="color:var(--text3);font-size:0.83rem;padding:8px 0">No active profession. The DM can grant a profession from the Skill Bank.</div></div>`;
  }

  // Section 2: All Professions List
  let allProfHTML = '';
  if (professions.length === 0) {
    allProfHTML = '<div style="color:var(--text3);font-size:0.83rem">No professions granted yet.</div>';
  } else {
    allProfHTML = professions.map(function(prof){
      const isActive = prof.id === ch.activeProfessionId;
      return `
      <div class="prof-card${isActive?' prof-card-active':''}">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <div style="flex:1">
            <span style="font-family:'Cinzel',serif;font-size:0.85rem;font-weight:600;color:${isActive?'var(--accent)':'var(--text)'}">${escHtml(prof.name)}</span>
            <span style="margin-left:8px;font-size:0.75rem;color:var(--text3)">Lvl ${prof.level||0}</span>
            ${isActive ? '<span class="prof-milestone-badge" style="margin-left:6px">Active</span>' : ''}
          </div>
          ${!isActive ? `<button class="btn btn-sm" style="padding:2px 8px;font-size:0.72rem" onclick="setActiveProfessionPlayer('${prof.id}')">Set Active</button>` : ''}
        </div>
        <textarea class="form-textarea" style="min-height:40px;font-size:0.75rem;margin-top:4px" placeholder="Notes…" oninput="updateProfNotes('${prof.id}',this.value)">${escHtml(prof.notes||'')}</textarea>
      </div>`;
    }).join('');
  }

  // Section 3: Cumulative Stats from all professions
  const statSummaryRows = STAT_KEYS.map(function(k){
    const val = profStats[k] || 0;
    if (val === 0) return '';
    return `<div style="display:flex;justify-content:space-between;font-size:0.78rem;padding:2px 0"><span style="color:var(--text2)">${k}</span><span style="color:var(--gold2);font-weight:600">+${val}</span></div>`;
  }).filter(Boolean).join('') || '<div style="color:var(--text3);font-size:0.78rem">No stat contributions yet.</div>';

  // Section 4: History Log (all professions combined)
  const allHistory = [];
  professions.forEach(function(prof){
    (prof.history||[]).forEach(function(evt){
      allHistory.push(Object.assign({profName: prof.name}, evt));
    });
  });
  allHistory.sort(function(a,b){ return (b.date||0) - (a.date||0); });
  const historyHTML = allHistory.length === 0
    ? '<div style="color:var(--text3);font-size:0.83rem">No history recorded.</div>'
    : allHistory.slice(0, 30).map(function(evt){
        const dateStr = evt.date ? new Date(evt.date).toLocaleDateString() : '';
        if (evt.event === 'level_up') {
          const statStr = evt.statsGained ? Object.entries(evt.statsGained).filter(function(e){ return e[1]; }).map(function(e){ return '+'+e[1]+' '+e[0]; }).join(', ') : '';
          return `<div class="growth-item"><span class="growth-label">${escHtml(evt.profName)}</span> reached Lvl ${evt.level} ${statStr ? '('+escHtml(statStr)+')' : ''} <span style="color:var(--text3);font-size:0.7rem;margin-left:4px">${dateStr}</span></div>`;
        }
        if (evt.event === 'title') {
          return `<div class="growth-item"><span class="growth-label">${escHtml(evt.profName)}</span> earned title <strong>${escHtml(evt.titleName)}</strong> at Lvl ${evt.level} <span style="color:var(--text3);font-size:0.7rem;margin-left:4px">${dateStr}</span></div>`;
        }
        if (evt.event === 'granted') {
          return `<div class="growth-item"><span class="growth-label">${escHtml(evt.profName)}</span> profession granted <span style="color:var(--text3);font-size:0.7rem;margin-left:4px">${dateStr}</span></div>`;
        }
        return '';
      }).join('');

  el.innerHTML = `
    ${activeSection}
    <div class="prof-section">
      <div class="prof-section-title">All Professions</div>
      ${allProfHTML}
    </div>
    <div class="prof-section">
      <div class="prof-section-title">Cumulative Profession Stats</div>
      ${statSummaryRows}
    </div>
    <div class="prof-section">
      <div class="prof-section-title">Profession History</div>
      <div class="skills-list">${historyHTML}</div>
    </div>
  `;
}

function handleImportFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.characters || !Array.isArray(data.characters)) {
        openModal('Import Failed', `
          <div class="bk-warn">⚠️ This file doesn't appear to be a valid Chronicle backup.</div>
          <div class="bk-desc">Make sure you're selecting a file named <strong>chronicle-backup-*.json</strong> that was downloaded from this app.</div>
          <button class="btn btn-green" style="width:100%" onclick="closeModal()">OK</button>
        `);
        return;
      }
      const dateMatch = file.name.match(/\d{4}-\d{2}-\d{2}/);
      const dateStr = dateMatch ? dateMatch[0] : 'unknown date';
      window._pendingImportData = data;
      openModal('✓ Confirm Import', `
        <div class="bk-icon">📋</div>
        <div class="bk-desc">Ready to restore from <strong>${escHtml(file.name)}</strong>.</div>
        <ul class="bk-list">
          <li>${data.characters.length} character(s) found in this backup</li>
          <li>Backup date: <strong>${escHtml(dateStr)}</strong></li>
          <li>All current data will be replaced</li>
        </ul>
        <div class="bk-warn">⚠️ This will overwrite everything. Are you sure you want to continue?</div>
        <div class="bk-actions">
          <button class="btn" style="flex:1" onclick="closeModal()">Cancel</button>
          <button class="btn btn-green" style="flex:2" onclick="executeImportBackup()">✓ Import Now</button>
        </div>
      `);
    } catch(err) {
      openModal('Import Failed', `
        <div class="bk-warn">⚠️ Could not read this file. It may be corrupted or in the wrong format.</div>
        <div class="bk-desc">Make sure you're selecting a <strong>.json</strong> file downloaded from Chronicle Sheets.</div>
        <button class="btn btn-green" style="width:100%" onclick="closeModal()">OK</button>
      `);
    }
  };
  reader.readAsText(file);
}

function executeImportBackup() {
  const data = window._pendingImportData;
  if (!data) { closeModal(); return; }
  window._pendingImportData = null;

    applyLoadedState(data);
    characters.forEach(ch => recalcVitals(ch));

    closeModal();
    showSaveStatus('✓ Backup imported successfully', true);

}

// Auto-save on any input change (debounced)
let _autoSaveTimer = null;
// ================================================================
// DRAG & DROP REORDER
// ================================================================
function makeDraggable(listEl, listKey, renderFn) {
  if (!listEl) return;
  const ch = characters[activeCharIdx];
  const items = ch[listKey];
  if (!items || items.length < 2) return;

  let dragSrcIdx = null;

  Array.from(listEl.children).forEach(function(card, idx) {
    if (!card.draggable) return;

    card.addEventListener('dragstart', function(e) {
      dragSrcIdx = idx;
      card.classList.add('drag-ghost');
      e.dataTransfer.effectAllowed = 'move';
      // Required for Firefox
      e.dataTransfer.setData('text/plain', idx);
    });

    card.addEventListener('dragend', function() {
      card.classList.remove('drag-ghost');
      listEl.querySelectorAll('[draggable]').forEach(function(c) {
        c.classList.remove('drag-over-above', 'drag-over-below');
      });
    });

    card.addEventListener('dragover', function(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (dragSrcIdx === idx) return;
      // Determine above vs below based on cursor position
      const rect = card.getBoundingClientRect();
      const mid = rect.top + rect.height / 2;
      listEl.querySelectorAll('[draggable]').forEach(function(c) {
        c.classList.remove('drag-over-above', 'drag-over-below');
      });
      card.classList.add(e.clientY < mid ? 'drag-over-above' : 'drag-over-below');
    });

    card.addEventListener('dragleave', function() {
      card.classList.remove('drag-over-above', 'drag-over-below');
    });

    card.addEventListener('drop', function(e) {
      e.preventDefault();
      if (dragSrcIdx === null || dragSrcIdx === idx) return;
      const rect = card.getBoundingClientRect();
      const mid = rect.top + rect.height / 2;
      const insertBefore = e.clientY < mid;

      // Reorder the data array
      const moved = items.splice(dragSrcIdx, 1)[0];
      let targetIdx = items.indexOf(items[idx > dragSrcIdx ? idx - 1 : idx]);
      // Recalculate target after splice
      const newTargetIdx = idx > dragSrcIdx ? (insertBefore ? idx - 1 : idx) : (insertBefore ? idx : idx + 1);
      items.splice(Math.max(0, Math.min(items.length, newTargetIdx)), 0, moved);

      dragSrcIdx = null;
      scheduleAutoSave();
      renderFn();
    });
  });
}

function scheduleAutoSave() {
  clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(() => saveAll(), 2000);
}

const DICE_SIDES = [20, 12, 100, 10, 8, 6, 4];
let _dicePool = {}; // { sides: count }

function toggleDicePanel() {
  const popup = document.getElementById('dicePopup');
  const btn   = document.getElementById('diceFabBtn');
  if (!popup) return;
  const isOpen = popup.classList.toggle('open');
  btn.classList.toggle('open', isOpen);
  if (isOpen) renderPresets();
}

function clickDie(sides) {
  _dicePool[sides] = (_dicePool[sides] || 0) + 1;
  updateDicePoolDisplay();
}

function resetDicePool() {
  _dicePool = {};
  updateDicePoolDisplay();
  const strip = document.getElementById('diceResultStrip');
  if (strip) strip.style.display = 'none';
}

function updateDicePoolDisplay() {
  const pool = DICE_SIDES.filter(s => (_dicePool[s] || 0) > 0);
  // Update badges
  DICE_SIDES.forEach(function(s) {
    const badge = document.getElementById('diceBadge' + s);
    const btn   = document.getElementById('diceBtn' + s);
    const count = _dicePool[s] || 0;
    if (badge) { badge.textContent = count; badge.style.display = count > 0 ? 'flex' : 'none'; }
    if (btn)   { btn.classList.toggle('active', count > 0); }
  });
  // Pool label
  const mod     = parseInt(document.getElementById('quickDiceMod')?.value) || 0;
  const poolStr = pool.length
    ? pool.map(function(s) { return (_dicePool[s]) + 'd' + s; }).join(' + ')
    : 'Choose dice to roll';
  const modStr  = mod ? (mod > 0 ? ' + ' + mod : ' − ' + Math.abs(mod)) : '';
  const label   = document.getElementById('dicePoolLabel');
  if (label) label.textContent = pool.length ? poolStr + modStr : 'Choose dice to roll';
  // Roll button
  const rollBtn = document.getElementById('diceRollBtn');
  if (rollBtn) {
    rollBtn.disabled = pool.length === 0;
    rollBtn.textContent = pool.length
      ? 'Roll ' + pool.map(function(s) { return (_dicePool[s]) + 'D' + s; }).join('+') + (modStr || '')
      : 'Roll';
  }
}

function rollQuickDice() {
  const pool = DICE_SIDES.filter(function(s) { return (_dicePool[s] || 0) > 0; });
  if (!pool.length) return;
  const mod = parseInt(document.getElementById('quickDiceMod')?.value) || 0;
  let total = mod;
  const parts = [];
  let firstRoll = null;
  pool.forEach(function(sides) {
    const count = _dicePool[sides];
    const rolls = [];
    for (let i = 0; i < count; i++) {
      const r = Math.ceil(Math.random() * sides);
      if (firstRoll === null) firstRoll = r;
      rolls.push(r);
      total += r;
    }
    parts.push(count + 'D' + sides + '[' + rolls.join('+') + ']');
  });
  if (mod) parts.push((mod > 0 ? '+' : '') + mod);
  // Show in panel
  const strip = document.getElementById('diceResultStrip');
  const val   = document.getElementById('diceResultVal');
  if (strip) strip.style.display = 'flex';
  if (val)   val.textContent = total;
  // Send to game log
  const diceLabel = pool.map(function(s) { return (_dicePool[s]) + 'D' + s; }).join('+');
  addLog('Quick Roll ' + diceLabel, parts.join(' ') + ' =', total, firstRoll);
}

function saveRollPreset() {
  const ch = characters[activeCharIdx];
  const pool = DICE_SIDES.filter(function(s) { return (_dicePool[s] || 0) > 0; });
  if (!pool.length) return;
  const label = pool.map(function(s) { return (_dicePool[s] > 1 ? _dicePool[s] : '') + 'd' + s; }).join('+');
  const mod = parseInt(document.getElementById('quickDiceMod').value) || 0;
  const name = label + (mod ? (mod > 0 ? '+' + mod : mod) : '');
  if (!ch.rollPresets) ch.rollPresets = [];
  if (ch.rollPresets.find(function(p) { return p.name === name; })) return;
  ch.rollPresets.push({ name: name, pool: Object.assign({}, _dicePool), mod: mod });
  scheduleAutoSave();
  renderPresets();
}

function deleteRollPreset(presetName) {
  const ch = characters[activeCharIdx];
  if (!ch.rollPresets) return;
  ch.rollPresets = ch.rollPresets.filter(function(p) { return p.name !== presetName; });
  scheduleAutoSave();
  renderPresets();
}

function loadPreset(presetName) {
  const ch = characters[activeCharIdx];
  const preset = (ch.rollPresets || []).find(function(p) { return p.name === presetName; });
  if (!preset) return;
  _dicePool = Object.assign({}, preset.pool);
  const modEl = document.getElementById('quickDiceMod');
  if (modEl) modEl.value = preset.mod || 0;
  updateDicePoolDisplay();
}

function renderPresets() {
  const ch = characters[activeCharIdx];
  const el = document.getElementById('presetChips');
  if (!el) return;
  const presets = ch.rollPresets || [];
  if (!presets.length) {
    el.innerHTML = '<span class="preset-empty">No presets saved</span>';
    return;
  }
  el.innerHTML = presets.map(function(p) {
    return `<span class="preset-chip" onclick="loadPreset('${escHtml(p.name)}')" title="Load ${escHtml(p.name)}">`
      + escHtml(p.name)
      + `<button class="preset-chip-del" onclick="event.stopPropagation();deleteRollPreset('${escHtml(p.name)}')" title="Delete">✕</button>`
      + `</span>`;
  }).join('');
}

function toggleSection(sectionId) {
  const ch = characters[activeCharIdx];
  if (!ch.collapsedSections) ch.collapsedSections = {};
  ch.collapsedSections[sectionId] = !ch.collapsedSections[sectionId];
  const sec = document.getElementById('sec-' + sectionId);
  if (sec) sec.classList.toggle('collapsed', !!ch.collapsedSections[sectionId]);
  scheduleAutoSave();
}

function renderConditionsHTML(character) {
  const active = character.conditions || [];
  return CONDITION_LIST.map(function(c) {
    const isActive = active.includes(c.id);
    return `<button class="condition-btn${isActive?' active':''}" data-cid="${c.id}" data-tip="${c.name}" onclick="toggleCondition('${c.id}')">${c.icon}</button>`;
  }).join('');
}

function toggleCondition(condId) {
  const ch = characters[activeCharIdx];
  if (!ch.conditions) ch.conditions = [];
  const idx = ch.conditions.indexOf(condId);
  if (idx >= 0) ch.conditions.splice(idx, 1);
  else ch.conditions.push(condId);
  document.querySelectorAll('.condition-btn').forEach(function(btn) {
    btn.classList.toggle('active', ch.conditions.includes(btn.dataset.cid));
  });
  scheduleAutoSave();
  if (_firebaseDb && _roomId) pushCharactersToFirebase();
}

// DM-side toggle for any character (updates DM status bar + syncs to player)
function toggleCharCondition(charIdx, condId) {
  const c = characters[charIdx];
  if (!c.conditions) c.conditions = [];
  const idx = c.conditions.indexOf(condId);
  if (idx >= 0) c.conditions.splice(idx, 1);
  else c.conditions.push(condId);
  const newHTML = CONDITION_LIST.map(function(cond) {
    const isActive = c.conditions.includes(cond.id);
    return `<div class="dm-status-icon${isActive?' active':''}" data-tip="${cond.name}" onclick="toggleCharCondition(${charIdx},'${cond.id}')">${cond.icon}</div>`;
  }).join('');
  const bar = document.getElementById('dm-status-bar-' + charIdx);
  if (bar) bar.innerHTML = newHTML;
  scheduleAutoSave();
  if (_firebaseDb && _roomId) pushCharactersToFirebase();
}

// ── Notes Tab ─────────────────────────────────────────────────────
function loadNotesEditor() {
  const ch = characters[activeCharIdx];
  const el = document.getElementById('notesEditor');
  if (!el) return;
  el.innerHTML = ch.notes || '';
}

function saveNotes() {
  const ch = characters[activeCharIdx];
  const el = document.getElementById('notesEditor');
  if (!el) return;
  ch.notes = el.innerHTML;
  scheduleAutoSave();
}

function notesFormat(cmd) {
  document.getElementById('notesEditor').focus();
  document.execCommand(cmd, false, null);
  saveNotes();
}

let _dmPrivateLog = [];
let _dmDicePool = {};
let _dmPresets = (function() {
  try { return JSON.parse(localStorage.getItem('chronicle_dm_presets') || '[]'); } catch(e) { return []; }
})();
const DM_DICE_SIDES = [20, 12, 100, 10, 8, 6, 4];

function clickDMDie(sides) {
  _dmDicePool[sides] = (_dmDicePool[sides] || 0) + 1;
  updateDMDicePoolDisplay();
}

function resetDMDicePool() {
  _dmDicePool = {};
  updateDMDicePoolDisplay();
  const strip = document.getElementById('dmDiceResultStrip');
  if (strip) strip.classList.remove('visible');
}

function updateDMDicePoolDisplay() {
  const pool = DM_DICE_SIDES.filter(function(s) { return (_dmDicePool[s] || 0) > 0; });
  DM_DICE_SIDES.forEach(function(s) {
    const badge = document.getElementById('dmDiceBadge' + s);
    const btn   = document.getElementById('dmDiceBtn' + s);
    const count = _dmDicePool[s] || 0;
    if (badge) { badge.textContent = count; badge.style.display = count > 0 ? 'flex' : 'none'; }
    if (btn)   { btn.classList.toggle('active', count > 0); }
  });
  const mod     = parseInt(document.getElementById('dmPrivateMod')?.value) || 0;
  const poolStr = pool.length
    ? pool.map(function(s) { return (_dmDicePool[s]) + 'd' + s; }).join(' + ')
    : 'Choose dice to roll';
  const modStr  = mod ? (mod > 0 ? ' + ' + mod : ' − ' + Math.abs(mod)) : '';
  const label   = document.getElementById('dmDicePoolLabel');
  if (label) label.textContent = pool.length ? poolStr + modStr : 'Choose dice to roll';
  const rollBtn = document.getElementById('dmDiceRollBtn');
  if (rollBtn) {
    rollBtn.disabled = pool.length === 0;
    rollBtn.textContent = pool.length
      ? 'Roll ' + pool.map(function(s) { return (_dmDicePool[s]) + 'D' + s; }).join('+') + (modStr || '')
      : 'Roll';
  }
}

function rollDMQuickDice() {
  const pool = DM_DICE_SIDES.filter(function(s) { return (_dmDicePool[s] || 0) > 0; });
  if (!pool.length) return;
  const mod = parseInt(document.getElementById('dmPrivateMod')?.value) || 0;
  let total = mod;
  const parts = [];
  pool.forEach(function(sides) {
    const count = _dmDicePool[sides];
    const rolls = [];
    for (let i = 0; i < count; i++) {
      const r = Math.ceil(Math.random() * sides);
      rolls.push(r);
      total += r;
    }
    parts.push(count + 'D' + sides + '[' + rolls.join('+') + ']');
  });
  if (mod) parts.push((mod > 0 ? '+' : '') + mod);
  const detail  = parts.join(' ') + ' = ' + total;
  const timeStr = new Date().toLocaleTimeString([], { hour:'numeric', minute:'2-digit' });

  // Show result strip
  const strip = document.getElementById('dmDiceResultStrip');
  const val   = document.getElementById('dmDiceResultVal');
  if (strip) strip.classList.add('visible');
  if (val)   val.textContent = total;

  // Prepend to private log
  _dmPrivateLog.unshift({ detail, total, time: timeStr });
  if (_dmPrivateLog.length > 20) _dmPrivateLog.pop();
  const logEl = document.getElementById('dmPrivateLog');
  if (logEl) {
    logEl.innerHTML = _dmPrivateLog.map(function(e) {
      return `<div class="dm-private-log-entry">
        <span class="dm-private-result-detail">${e.detail} <span style="color:var(--text3);font-size:0.62rem">${e.time}</span></span>
        <span class="dm-private-log-roll">${e.total}</span>
      </div>`;
    }).join('');
  }
}

// Keep rollDMPrivate for any existing calls — now adds to pool instead of rolling immediately
function rollDMPrivate(sides) { clickDMDie(sides); }

function saveDMPreset() {
  const pool = DM_DICE_SIDES.filter(function(s) { return (_dmDicePool[s] || 0) > 0; });
  if (!pool.length) return;
  const label = pool.map(function(s) { return (_dmDicePool[s] > 1 ? _dmDicePool[s] : '') + 'd' + s; }).join('+');
  const mod   = parseInt(document.getElementById('dmPrivateMod')?.value) || 0;
  const name  = label + (mod ? (mod > 0 ? '+' + mod : mod) : '');
  if (_dmPresets.find(function(p) { return p.name === name; })) return;
  _dmPresets.push({ name: name, pool: Object.assign({}, _dmDicePool), mod: mod });
  try { localStorage.setItem('chronicle_dm_presets', JSON.stringify(_dmPresets)); } catch(e) {}
  renderDMPresets();
}

function deleteDMPreset(presetName) {
  _dmPresets = _dmPresets.filter(function(p) { return p.name !== presetName; });
  try { localStorage.setItem('chronicle_dm_presets', JSON.stringify(_dmPresets)); } catch(e) {}
  renderDMPresets();
}

function loadDMPreset(presetName) {
  const preset = _dmPresets.find(function(p) { return p.name === presetName; });
  if (!preset) return;
  _dmDicePool = Object.assign({}, preset.pool);
  const modEl = document.getElementById('dmPrivateMod');
  if (modEl) modEl.value = preset.mod || 0;
  updateDMDicePoolDisplay();
}

function renderDMPresets() {
  const el = document.getElementById('dmPresetChips');
  if (!el) return;
  if (!_dmPresets.length) {
    el.innerHTML = '<span class="dm-preset-empty">No presets saved</span>';
    return;
  }
  el.innerHTML = _dmPresets.map(function(p) {
    return `<span class="dm-preset-chip" onclick="loadDMPreset('${escHtml(p.name)}')" title="Load ${escHtml(p.name)}">`
      + escHtml(p.name)
      + `<button class="dm-preset-chip-del" onclick="event.stopPropagation();deleteDMPreset('${escHtml(p.name)}')" title="Delete">✕</button>`
      + `</span>`;
  }).join('');
}

function dmAdjustVital(charIdx, type, action) {
  const amtStr = prompt((action === 'dmg' ? 'Damage' : action === 'heal' ? 'Heal' : action === 'spend' ? 'Spend MP' : 'Restore MP') + ' — Amount?');
  const amt = parseInt(amtStr, 10);
  if (!amt || isNaN(amt) || amt <= 0) return;
  const c = characters[charIdx];
  const curKey = type === 'hp' ? 'hpCurrent' : 'mpCurrent';
  const maxKey = type === 'hp' ? 'hpMax' : 'mpMax';
  if (action === 'heal' || action === 'restore') {
    c[curKey] = Math.min(c[maxKey], c[curKey] + amt);
  } else {
    c[curKey] = Math.max(0, c[curKey] - amt);
  }
  dmUpdateCharCard(charIdx);
  scheduleAutoSave();
  // Immediate Firebase push so players see HP/MP changes right away
  if (_firebaseDb && _roomId) pushCharactersToFirebase();
}

function dmUpdateCharCard(charIdx) {
  const c = characters[charIdx];
  const hpPct = c.hpMax > 0 ? Math.round((c.hpCurrent / c.hpMax) * 100) : 0;
  const mpPct = c.mpMax > 0 ? Math.round((c.mpCurrent / c.mpMax) * 100) : 0;
  const hpCurEl = document.getElementById('dm-hp-cur-' + charIdx);
  const mpCurEl = document.getElementById('dm-mp-cur-' + charIdx);
  const hpBarEl = document.getElementById('dm-hp-bar-' + charIdx);
  const mpBarEl = document.getElementById('dm-mp-bar-' + charIdx);
  const hpBadgeEl = document.getElementById('dm-hp-badge-' + charIdx);
  const mpBadgeEl = document.getElementById('dm-mp-badge-' + charIdx);
  if (hpCurEl) hpCurEl.textContent = c.hpCurrent;
  if (mpCurEl) mpCurEl.textContent = c.mpCurrent;
  if (hpBarEl) hpBarEl.style.width = hpPct + '%';
  if (mpBarEl) mpBarEl.style.width = mpPct + '%';
  if (hpBadgeEl) hpBadgeEl.textContent = c.hpCurrent + '/' + c.hpMax;
  if (mpBadgeEl) mpBadgeEl.textContent = c.mpCurrent + '/' + c.mpMax;
}

const BANK_CAT_LABELS = {
  systemSkill: 'System Skill', classSkill: 'Class Skill', raceSkill: 'Race Skill',

};

function renderDMBank() {
  const el = document.getElementById('dmBankList');
  if (!el) return;
  if (!dmBank.length) {
    el.innerHTML = '<div class="dm-bank-empty">No banked items yet. Click "+ Bank Item" to store skills, rewards, or growth potential for later.</div>';
    return;
  }
  // Sort: ungranted first, granted (by any char) at the bottom
  const sorted = dmBank.map(function(item, idx) { return { item, idx }; })
    .sort(function(a, b) {
      const aGranted = a.item.grantedTo && a.item.grantedTo.length > 0;
      const bGranted = b.item.grantedTo && b.item.grantedTo.length > 0;
      if (aGranted === bGranted) return 0;
      return aGranted ? 1 : -1;
    });
  el.innerHTML = sorted.map(function(entry) {
    const item = entry.item;
    const idx = entry.idx;
    const catLabel = BANK_CAT_LABELS[item.category] || item.category;
    const tierLabel = item.tier ? ' · Lvl ' + item.tier : '';
    const flags = [item.isAttack&&'Attack', item.isGrowth&&'Growth', item.isSoulBound&&'Soul Bound'].filter(Boolean);
    const flagsHTML = flags.length ? flags.map(function(f) {
      return `<span style="font-size:0.48rem;background:var(--bg4);border:1px solid var(--border);border-radius:10px;padding:1px 5px;color:var(--text3)">${f}</span>`;
    }).join('') : '';
    const grantedNames = (item.grantedTo||[]).map(function(g) { return escHtml(g.name); }).join(', ');
    const grantedTag = grantedNames ? `<span class="dm-bank-item-granted-tag">✓ ${grantedNames}</span>` : '';
    const isGranted = !!(item.grantedTo && item.grantedTo.length);
    const grantBtns = characters.map(function(c, ci) {
      const alreadyGranted = (item.grantedTo||[]).find(function(g) { return g.charIdx === ci; });
      return `<button class="dm-bank-grant-btn" onclick="grantBankItem(${idx},${ci})" ${alreadyGranted?'style="opacity:0.5"':''}>→ ${escHtml(c.name)}</button>`;
    }).join('');
    return `<div class="dm-bank-item${isGranted?' dm-granted':''}">
      <div class="dm-bank-item-header">
        <div>
          <span class="dm-bank-item-name">${escHtml(item.name)}${grantedTag}</span>
          <span class="dm-bank-item-cat">${escHtml(catLabel + tierLabel)}</span>
        </div>
        <button class="dm-bank-del-btn" onclick="deleteBankItem(${idx})" title="Remove from bank">✕</button>
      </div>
      ${flagsHTML ? `<div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:4px">${flagsHTML}</div>` : ''}
      ${item.detail ? `<div class="dm-bank-item-detail">${escHtml(item.detail)}</div>` : ''}
      ${item.desc ? `<div class="dm-bank-item-desc">${item.desc}</div>` : ''}
      ${item.dmNotes ? `<div class="dm-bank-item-notes">DM: ${escHtml(item.dmNotes)}</div>` : ''}
      <div class="dm-bank-item-actions">
        <button class="dm-bank-edit-btn" onclick="openDMBankModal(${idx})">Edit</button>
        ${grantBtns}
      </div>
    </div>`;
  }).join('');
}

function openDMBankModal(itemIdx) {
  const isEdit = typeof itemIdx === 'number';
  const item = isEdit ? dmBank[itemIdx] : null;
  const tierOpts = [5,10,15,20,25,30,35,40,45,50].map(function(t) {
    return `<option value="${t}" ${item&&item.tier===t?'selected':''}>${t}</option>`;
  }).join('');
  const catVal = item ? item.category : 'systemSkill';
  const statOpts = STAT_KEYS.map(function(k) {
    return `<option value="${k}" ${item&&item.attackStat===k?'selected':''}>${k} (${STAT_ABBR[k]})</option>`;
  }).join('');
  // Race bank fields
  const raceItem = (item && item.category === 'race') ? item : null;
  const raceStartRankOpts = ['G','F','E','D','C','B','A','S'].map(function(r){
    return '<option value="' + r + '" ' + (raceItem && raceItem.startingRank === r ? 'selected' : (!raceItem && r==='G' ? 'selected' : '')) + '>' + r + '</option>';
  }).join('');
  const rankStatTableRows = RANK_LETTERS.map(function(r){
    const isSSRank = r === 'SS';
    const threshMin = raceItem && raceItem.rankThresholds && raceItem.rankThresholds[r] ? raceItem.rankThresholds[r][0] : '';
    const threshMax = raceItem && raceItem.rankThresholds && raceItem.rankThresholds[r] ? raceItem.rankThresholds[r][1] : '';
    const statCells = STAT_KEYS.map(function(sk){
      const val = raceItem && raceItem.rankStats && raceItem.rankStats[r] ? (raceItem.rankStats[r][sk]||0) : 0;
      return '<td style="padding:2px 3px"><input class="form-input" id="raceRankStat_' + r + '_' + sk + '" type="number" value="' + val + '" min="0" style="width:38px;font-size:0.7rem;padding:2px 2px;text-align:center"/></td>';
    }).join('');
    const threshCells = isSSRank

    }).join('');
    return '<div class="prof-milestone-row" id="profMT_' + mti + '"><div style="display:flex;gap:6px;margin-bottom:6px"><input class="form-input" id="profMT_' + mti + '_name" value="' + escHtml(mt.name||'') + '" placeholder="Title name" style="flex:2"/><input class="form-input" id="profMT_' + mti + '_level" type="number" value="' + (mt.requiredLevel||1) + '" min="1" style="flex:1;width:60px" title="Required Level"/><button class="btn btn-red btn-sm" onclick="removeProfMilestone(' + mti + ')" style="padding:2px 6px;flex:0">✕</button></div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">' + extraStats + '</div></div>';
  }).join('');
  const body = `
    <div class="form-row">
      <div class="form-field">
        <label class="form-label">Name</label>
        <input class="form-input" id="bankName" value="${escHtml(item?item.name:'')}" placeholder="Skill / Reward / Profession name"/>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <div class="form-field">
        <label class="form-label">Category</label>
        <select class="form-select" id="bankCat" onchange="bankCatChanged()">
          <option value="systemSkill" ${catVal==='systemSkill'?'selected':''}>System Skill</option>

          <option value="raceSkill" ${catVal==='raceSkill'?'selected':''}>Race Skill</option>

    <div class="form-row">
      <div class="form-field">
        <label class="form-label">Detail / Cost Line</label>

    </div>
    <div class="form-field" style="margin-bottom:8px">
      <label class="form-label">Description</label>
      <textarea class="form-textarea" id="bankDesc" style="min-height:72px">${item?item.desc:''}</textarea>
    </div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px">
      <div class="form-checkbox-row"><input type="checkbox" id="bankIsAttack" ${item&&item.isAttack?'checked':''} onchange="bankAtkChanged()"/><label class="form-check-label" for="bankIsAttack">Attack</label></div>
      <div class="form-checkbox-row"><input type="checkbox" id="bankIsGrowth" ${item&&item.isGrowth?'checked':''}/><label class="form-check-label" for="bankIsGrowth">Growth</label></div>
      <div class="form-checkbox-row"><input type="checkbox" id="bankIsSoulBound" ${item&&item.isSoulBound?'checked':''}/><label class="form-check-label" for="bankIsSoulBound">Soul Bound</label></div>

            <option value="none" ${item&&item.attackCostType==='none'?'selected':''}>None</option>

          <label class="form-label">Starting Rank</label>
          <select class="form-select" id="raceStartRank" style="width:80px">${raceStartRankOpts}</select>

        <table style="border-collapse:collapse;width:100%;font-size:0.72rem">
          <thead><tr>
            <th style="padding:2px 5px;text-align:left;color:var(--gold-dim);font-family:'Cinzel',serif">Rank</th>
            <th style="padding:2px 3px;color:var(--gold-dim);font-family:'Cinzel',serif">Min Lvl</th>
            <th style="padding:2px 3px;color:var(--gold-dim);font-family:'Cinzel',serif">Max Lvl</th>
            ${STAT_KEYS.map(function(sk){ return '<th style="padding:2px 3px;color:var(--gold-dim);font-family:\'Cinzel\',serif">' + (STAT_ABBR[sk]||sk.slice(0,3)) + '</th>'; }).join('')}

        </table>
      </div>

    <div id="bankProfFields" style="${catVal==='profession'?'':'display:none'}">

      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:12px">${profBaseStatsHTML}</div>
      <div style="font-size:0.68rem;color:var(--text3);font-family:'Cinzel',serif;letter-spacing:0.06em;margin-bottom:6px">MILESTONE TITLES (additional stats per level added after title is earned)</div>

      <label class="form-label">Private DM Notes (not shown to player)</label>

}

function addProfMilestone() {
  const container = document.getElementById('profMilestonesContainer');
  if (!container) return;
  const mti = container.children.length;
  const statInputs = STAT_KEYS.map(function(sk){
    return '<div style="text-align:center"><div style="font-size:0.6rem;color:var(--gold-dim);font-family:\'Cinzel\',serif">' + (STAT_ABBR[sk]||sk.slice(0,3)) + '</div><input class="form-input" id="profMT_' + mti + '_stat_' + sk + '" type="number" value="0" min="0" style="width:100%;font-size:0.72rem;text-align:center;padding:2px"/></div>';
  }).join('');
  const div = document.createElement('div');
  div.className = 'prof-milestone-row';
  div.id = 'profMT_' + mti;
  div.innerHTML = '<div style="display:flex;gap:6px;margin-bottom:6px"><input class="form-input" id="profMT_' + mti + '_name" value="" placeholder="Title name" style="flex:2"/><input class="form-input" id="profMT_' + mti + '_level" type="number" value="1" min="1" style="flex:1;width:60px" title="Required Level"/><button class="btn btn-red btn-sm" onclick="removeProfMilestone(' + mti + ')" style="padding:2px 6px;flex:0">✕</button></div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">' + statInputs + '</div>';
  container.appendChild(div);
}

function removeProfMilestone(idx) {
  const el = document.getElementById('profMT_' + idx);
  if (el) el.remove();
  // Re-number remaining rows
  const container = document.getElementById('profMilestonesContainer');
  if (!container) return;
  Array.from(container.children).forEach(function(row, ni) {
    row.id = 'profMT_' + ni;
    const nameEl = row.querySelector('[id^="profMT_"]');
    if (nameEl) {
      // Update all child IDs
      row.querySelectorAll('[id]').forEach(function(el) {
        el.id = el.id.replace(/profMT_\d+/, 'profMT_' + ni);
      });
    }
    const btn = row.querySelector('button');
    if (btn) btn.setAttribute('onclick', 'removeProfMilestone(' + ni + ')');
  });
}

function bankCatChanged() {
  const cat = (document.getElementById('bankCat')||{}).value || '';
  const tf = document.getElementById('bankTierField');
  if (tf) tf.style.display = cat === 'systemSkill' ? '' : 'none';
  const rf = document.getElementById('bankRaceFields');
  if (rf) rf.style.display = cat === 'race' ? '' : 'none';
  const pf = document.getElementById('bankProfFields');
  if (pf) pf.style.display = cat === 'profession' ? '' : 'none';
}

function bankAtkChanged() {
  const el = document.getElementById('bankAtkOpts');
  if (el) el.style.display = (document.getElementById('bankIsAttack')||{}).checked ? 'block' : 'none';
}

function saveDMBankItem(editIdx) {
  const name = ((document.getElementById('bankName')||{}).value || '').trim();
  if (!name) { alert('Please enter a name.'); return; }
  const cat = (document.getElementById('bankCat')||{}).value || 'systemSkill';
  const tierRaw = (document.getElementById('bankTier')||{}).value || '';
  const isAtk = !!(document.getElementById('bankIsAttack')||{}).checked;
  const prev = (editIdx !== null && typeof editIdx === 'number') ? dmBank[editIdx] : null;
  const item = {
    id: prev ? prev.id : ('bank_' + Date.now()),
    name,
    category: cat,
    tier: (cat === 'systemSkill' && tierRaw) ? parseInt(tierRaw) : null,
    detail: ((document.getElementById('bankDetail')||{}).value || '').trim(),
    desc: (document.getElementById('bankDesc')||{}).value || '',
    isAttack: isAtk,
    isGrowth: !!(document.getElementById('bankIsGrowth')||{}).checked,
    isSoulBound: !!(document.getElementById('bankIsSoulBound')||{}).checked,
    dmNotes: ((document.getElementById('bankDmNotes')||{}).value || '').trim(),
    grantedTo: prev ? (prev.grantedTo || []) : [],
    // Attack fields (always captured; used only when isAttack=true)
    attackDice: parseInt((document.getElementById('bankAtkDice')||{}).value) || 20,
    attackCount: parseInt((document.getElementById('bankAtkCount')||{}).value) || 1,
    attackStat: (document.getElementById('bankAtkStat')||{}).value || null,
    attackCost: parseInt((document.getElementById('bankAtkCost')||{}).value) || 0,
    attackCostType: (document.getElementById('bankAtkCostType')||{}).value || 'mp',
  };
  // Race-specific fields
  if (cat === 'race') {
    item.startingRank = ((document.getElementById('raceStartRank')||{}).value) || 'G';
    item.rankThresholds = {};
    item.rankStats = {};
    RANK_LETTERS.forEach(function(r){
      if (r !== 'SS') {
        const minEl = document.getElementById('raceThresh_' + r + '_min');
        const maxEl = document.getElementById('raceThresh_' + r + '_max');
        item.rankThresholds[r] = [parseInt((minEl||{}).value)||0, parseInt((maxEl||{}).value)||999];
      }
      const stats = {};
      STAT_KEYS.forEach(function(sk){
        const el = document.getElementById('raceRankStat_' + r + '_' + sk);
        stats[sk] = el ? (parseInt(el.value)||0) : 0;
      });
      item.rankStats[r] = stats;
    });
  }
  // Profession-specific fields
  if (cat === 'profession') {
    const baseStats = {};
    STAT_KEYS.forEach(function(sk){
      const el = document.getElementById('profBaseStat_' + sk);
      baseStats[sk] = el ? (parseInt(el.value)||0) : 0;
    });
    item.baseStatPerLevel = baseStats;
    const milestones = [];
    let mti = 0;
    while (document.getElementById('profMT_' + mti)) {
      const nameEl = document.getElementById('profMT_' + mti + '_name');
      const levelEl = document.getElementById('profMT_' + mti + '_level');
      if (nameEl && nameEl.value.trim()) {
        const extraStats = {};
        STAT_KEYS.forEach(function(sk){
          const el = document.getElementById('profMT_' + mti + '_stat_' + sk);
          extraStats[sk] = el ? (parseInt(el.value)||0) : 0;
        });
        const prev_mt = prev && prev.milestoneTitles && prev.milestoneTitles[mti];
        milestones.push({
          id: prev_mt ? prev_mt.id : ('mt_' + Date.now() + '_' + mti),
          name: nameEl.value.trim(),
          requiredLevel: parseInt((levelEl||{}).value)||1,
          additionalStatsPerLevel: extraStats,
        });
      }
      mti++;
    }
    item.milestoneTitles = milestones;
  }
  if (prev) {
    dmBank[editIdx] = item;
  } else {
    dmBank.push(item);
  }
  closeModal();
  renderDMBank();
  scheduleAutoSave();
}

function deleteBankItem(idx) {
  if (!confirm('Delete "' + escHtml(dmBank[idx] ? dmBank[idx].name : 'this item') + '" from the bank?')) return;
  dmBank.splice(idx, 1);
  renderDMBank();
  scheduleAutoSave();
}

function grantBankItem(bankIdx, charIdx) {
  const item = dmBank[bankIdx];
  const ch = characters[charIdx];
  if (!item || !ch) return;
  if (!item.grantedTo) item.grantedTo = [];
  const grantedIdx = item.grantedTo.findIndex(function(g) { return g.charIdx === charIdx; });
  if (grantedIdx >= 0) {
    // Toggle: revoke the grant from this character
    if (item.category === 'systemSkill' && item.tier) {
      if (ch.systemSkillOptions && ch.systemSkillOptions[item.tier]) {
        ch.systemSkillOptions[item.tier] = ch.systemSkillOptions[item.tier].filter(function(s) { return s.name !== item.name; });
      }
      if (ch.selectedSystemSkills && ch.selectedSystemSkills[item.tier]) {
        ch.selectedSystemSkills[item.tier] = ch.selectedSystemSkills[item.tier].filter(function(s) { return s.name !== item.name; });
      }
    } else {
      const listKey = BANK_CAT_TO_LIST[item.category] || 'classSkills';
      if (ch[listKey]) ch[listKey] = ch[listKey].filter(function(s) { return s.name !== item.name; });
    }
    item.grantedTo.splice(grantedIdx, 1);
    showSaveStatus('✓ "' + item.name + '" unassigned from ' + ch.name + '.', true);
    renderDMBank();
    scheduleAutoSave();
    if (_firebaseDb && _roomId) pushCharactersToFirebase();
    return;
  }
  // Growth skill interception (non-systemSkill only)
  if (item.isGrowth && item.category !== 'systemSkill') {
    openGrowthGrantModal(bankIdx, charIdx);
    return;
  }
  const skillId = 'granted_' + item.id + '_' + charIdx + '_' + Date.now();
  const newSkill = {
    id: skillId,
    name: item.name,
    detail: item.detail || '',
    desc: item.desc || '',
    isAttack: item.isAttack || false,
    isGrowth: item.isGrowth || false,
    isSoulBound: item.isSoulBound || false,
    isUnique: false,
    statAdj: false,
    sbSlotBonus: false,
    vitalEffect: null,
    _sysSkillTier: (item.category === 'systemSkill' && item.tier) ? item.tier : null,
    // Attack fields
    attackDice: item.attackDice || 20,
    attackCount: item.attackCount || 1,
    attackStat: item.attackStat || null,
    attackCost: item.attackCost || 0,
    attackCostType: item.attackCostType || 'none',
  };
  if (item.category === 'systemSkill' && item.tier) {
    // System skills: add to the selection pool for that tier — player chooses when they reach that level
    if (!ch.systemSkillOptions) ch.systemSkillOptions = {};
    if (!ch.systemSkillOptions[item.tier]) ch.systemSkillOptions[item.tier] = [];
    const alreadyInPool = ch.systemSkillOptions[item.tier].find(function(s) { return s.name === item.name; });
    if (!alreadyInPool) {
      ch.systemSkillOptions[item.tier].push({
        id: skillId, name: item.name, rarity: item.detail||'', desc: item.desc||'',
        isAttack: item.isAttack||false, isGrowth: item.isGrowth||false,
        attackDice: item.attackDice||20, attackCount: item.attackCount||1,
        attackStat: item.attackStat||null, attackCost: item.attackCost||0, attackCostType: item.attackCostType||'none',
      });
    }
    showSaveStatus('✓ "' + item.name + '" added to ' + ch.name + '\'s Lvl ' + item.tier + ' skill pool!', true);
  } else {
    // Other skill types: add immediately to the correct tab
    const listKey = BANK_CAT_TO_LIST[item.category] || 'classSkills';
    if (!ch[listKey]) ch[listKey] = [];
    ch[listKey].push(newSkill);
    showSaveStatus('✓ "' + item.name + '" granted to ' + ch.name + '!', true);
  }
  // Mark as granted (keep item in bank for DM reference)
  item.grantedTo.push({ charIdx, name: ch.name, ts: Date.now() });
  renderDMBank();
  scheduleAutoSave();
  if (_firebaseDb && _roomId) pushCharactersToFirebase();
}

// ================================================================
// GROWTH SKILL GRANT FLOW
// ================================================================
function openGrowthGrantModal(bankIdx, charIdx) {
  const item = dmBank[bankIdx];
  const ch = characters[charIdx];
  if (!item || !ch) return;
  openModal('Grant Growth Skill — ' + escHtml(item.name), `
    <div style="font-size:0.83rem;color:var(--text2);margin-bottom:14px">
      <strong>${escHtml(item.name)}</strong> is a Growth Skill.<br/>
      Is this a brand new skill, or is it a growth stage of an existing skill?
    </div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <div class="option-card" onclick="confirmNewGrowthSkill(${bankIdx},${charIdx})" style="cursor:pointer">
        <div class="option-card-title">New Growth Skill</div>
        <div class="option-card-desc">Add <strong>${escHtml(item.name)}</strong> as a fresh skill entry.</div>
      </div>
      <div class="option-card" onclick="closeModal();openGrowthExistingPicker(${bankIdx},${charIdx})" style="cursor:pointer">
        <div class="option-card-title">Growth of Existing Skill</div>
        <div class="option-card-desc">This is an evolution of a skill the character already has. You'll choose which skill it grows from and can update its name.</div>
      </div>
    </div>
  `);
}

function confirmNewGrowthSkill(bankIdx, charIdx) {
  const item = dmBank[bankIdx];
  const ch = characters[charIdx];
  closeModal();
  const skillId = 'granted_' + item.id + '_' + charIdx + '_' + Date.now();
  const listKey = BANK_CAT_TO_LIST[item.category] || 'classSkills';
  if (!ch[listKey]) ch[listKey] = [];
  ch[listKey].push({
    id: skillId, name: item.name, detail: item.detail||'', desc: item.desc||'',
    isAttack: item.isAttack||false, isGrowth: true, isSoulBound: item.isSoulBound||false,
    isUnique: false, statAdj: false, sbSlotBonus: false, vitalEffect: null,
    attackDice: item.attackDice||20, attackCount: item.attackCount||1,
    attackStat: item.attackStat||null, attackCost: item.attackCost||0, attackCostType: item.attackCostType||'none',
    growthHistory: [],
  });
  if (!ch.growthLog) ch.growthLog = [];
  ch.growthLog.push({
    skillId: skillId,
    rootSkillName: item.name,
    skillName: item.name,
    previousName: null,
    date: new Date().toLocaleDateString(),
    notes: '',
    newDetail: item.detail || '',
    type: 'new',
  });
  if (!item.grantedTo) item.grantedTo = [];
  item.grantedTo.push({ charIdx, name: ch.name, ts: Date.now() });
  showSaveStatus('✓ "' + item.name + '" granted to ' + ch.name + '!', true);
  renderDMBank();
  renderSheet();
  scheduleAutoSave();
  if (_firebaseDb && _roomId) pushCharactersToFirebase();
}

// Temporary store for growth picker data (avoids JSON in onclick attrs)
let _growthPickerData = { bankIdx: null, charIdx: null, skillRefs: [] };

function openGrowthExistingPicker(bankIdx, charIdx) {
  const item = dmBank[bankIdx];
  const ch = characters[charIdx];
  if (!item || !ch) return;
  // Collect all growth skills across all lists
  const allGrowthSkills = [];
  ['titles','raceSkills','classSkills','profSkills'].forEach(function(listKey) {
    (ch[listKey]||[]).forEach(function(sk) {
      if (sk.isGrowth) allGrowthSkills.push({ skill: sk, listKey: listKey });
    });
  });
  if (allGrowthSkills.length === 0) {
    openModal('No Growth Skills Found', `
      <div style="color:var(--text2);font-size:0.83rem;margin-bottom:14px">
        ${escHtml(ch.name)} has no existing Growth Skills to evolve.<br/>Grant it as a new skill instead.
      </div>
      <button class="btn btn-gold" style="width:100%" onclick="closeModal();openGrowthGrantModal(${bankIdx},${charIdx})">← Back</button>
    `);
    return;
  }
  // Store data in module-level variable to avoid JSON-in-onclick issues
  _growthPickerData = {
    bankIdx: bankIdx,
    charIdx: charIdx,
    skillRefs: allGrowthSkills.map(function(e) { return { id: e.skill.id, listKey: e.listKey, name: e.skill.name }; }),
  };
  const options = allGrowthSkills.map(function(entry, i) {
    return '<option value="' + i + '">' + escHtml(entry.skill.name) + ' (' + entry.listKey + ')</option>';
  }).join('');
  openModal('Grow Existing Skill — ' + escHtml(item.name), `
    <div style="font-size:0.83rem;color:var(--text2);margin-bottom:12px">
      Select the existing Growth Skill this is an evolution of, then update the name if needed.
    </div>
    <div class="form-field" style="margin-bottom:10px">
      <label class="form-label">Existing Growth Skill</label>
      <select class="form-select" id="growthExistingSelect" onchange="updateGrowthNamePreview(this.value)">${options}</select>
    </div>
    <div class="form-field" style="margin-bottom:10px">
      <label class="form-label">Updated Skill Name (can rename on growth)</label>
      <input class="form-input" id="growthNewName" value="${escHtml(allGrowthSkills[0].skill.name)}" placeholder="New name after growth…"/>
    </div>
    <div class="form-field" style="margin-bottom:14px">
      <label class="form-label">Growth Notes (optional — describe what changed)</label>
      <textarea class="form-textarea" id="growthNotes" style="min-height:60px" placeholder="e.g. Evolved to Superior rank. Range extended to 50ft.">${escHtml(item.desc||'')}</textarea>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn" style="flex:1" onclick="closeModal();openGrowthGrantModal(${bankIdx},${charIdx})">← Back</button>
      <button class="btn btn-green" style="flex:2" onclick="applyGrowthToExisting()">Apply Growth</button>
    </div>
  `);
}

function updateGrowthNamePreview(selectedIdx) {
  const nameEl = document.getElementById('growthNewName');
  const ref = _growthPickerData.skillRefs[parseInt(selectedIdx)];
  if (nameEl && ref) nameEl.value = ref.name;
}

function applyGrowthToExisting() {
  const { bankIdx, charIdx, skillRefs } = _growthPickerData;
  const item = dmBank[bankIdx];
  const ch = characters[charIdx];
  const selectEl = document.getElementById('growthExistingSelect');
  const nameEl = document.getElementById('growthNewName');
  const notesEl = document.getElementById('growthNotes');
  if (!selectEl || !nameEl) return;
  const selectedIdx = parseInt(selectEl.value);
  const ref = skillRefs[selectedIdx];
  if (!ref) return;
  const newName = nameEl.value.trim() || item.name;
  const notes = notesEl ? notesEl.value.trim() : '';
  // Find and update the skill
  const skillList = ch[ref.listKey] || [];
  const skill = skillList.find(function(s) { return s.id === ref.id; });
  if (!skill) { alert('Skill not found — it may have been removed.'); return; }
  const previousName = skill.name;
  // Capture attack changes from bank item vs current skill
  let attackChanges = null;
  if (skill.isAttack && (item.attackDice || item.attackCost !== undefined || item.attackCount)) {
    const oldAtk = { dice: skill.attackDice||20, count: skill.attackCount||1, cost: skill.attackCost||0, costType: skill.attackCostType||'none' };
    const newAtkDice = item.attackDice || oldAtk.dice;
    const newAtkCount = item.attackCount || oldAtk.count;
    const newAtkCost = item.attackCost !== undefined ? item.attackCost : oldAtk.cost;
    const newAtkCostType = item.attackCostType || oldAtk.costType;
    if (newAtkDice !== oldAtk.dice || newAtkCount !== oldAtk.count || newAtkCost !== oldAtk.cost || newAtkCostType !== oldAtk.costType) {
      attackChanges = { old: oldAtk, new: { dice: newAtkDice, count: newAtkCount, cost: newAtkCost, costType: newAtkCostType } };
      skill.attackDice = newAtkDice; skill.attackCount = newAtkCount;
      skill.attackCost = newAtkCost; skill.attackCostType = newAtkCostType;
    }
  }
  skill.name = newName;
  skill.detail = item.detail || skill.detail;
  skill.desc = item.desc || skill.desc;
  if (!skill.growthHistory) skill.growthHistory = [];
  skill.growthHistory.push({
    bankItemId: item.id,
    bankItemName: item.name,
    previousName: previousName,
    newName: newName,
    date: new Date().toLocaleDateString(),
    notes: notes,
    attackChanges,
  });
  // Add to growth log
  if (!ch.growthLog) ch.growthLog = [];
  ch.growthLog.push({
    skillId: ref.id,
    rootSkillName: previousName,
    skillName: newName,
    previousName: previousName !== newName ? previousName : null,
    date: new Date().toLocaleDateString(),
    notes: notes,
    newDetail: item.detail || '',
    type: 'growth',
    attackChanges,
  });
  // Mark bank item as granted
  if (!item.grantedTo) item.grantedTo = [];
  item.grantedTo.push({ charIdx, name: ch.name, ts: Date.now() });
  closeModal();
  showSaveStatus('✓ "' + previousName + '" grew into "' + newName + '"!', true);
  renderDMBank();
  renderSheet();
  scheduleAutoSave();
  if (_firebaseDb && _roomId) pushCharactersToFirebase();
}
