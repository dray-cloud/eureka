function saveSkill() {
  const ch = characters[activeCharIdx];
  const name = getVal('asName').trim();
  if (!name) { alert('Please enter a skill name.'); return; }
  const isAttack = isChecked('asIsAttack');
  const statAdj = isChecked('asStatAdj');
  const sbSlotBonus = isChecked('asSbSlot');
  const hasVitalEffect = isChecked('asVitalEffect');
  let statBonuses = {};
  if (statAdj) {
    for (const k of STAT_KEYS) {
      const v = parseInt(document.getElementById('statAdj_'+k)?.value)||0;
      if (v) statBonuses[k]=v;
    }
  }
  let vitalEffect = null;
  if (hasVitalEffect) {
    vitalEffect = {};
    for (const type of ['hp','mp','ac']) {
      const flat = parseInt(document.getElementById(`ve_${type}_flat`)?.value)||0;
      const statBase = document.getElementById(`ve_${type}_statBase`)?.value||'';
      const statMod = document.getElementById(`ve_${type}_statMod`)?.value||'';
      if (flat) vitalEffect[type+'Flat'] = flat;
      if (statBase) vitalEffect[type+'StatBase'] = statBase;
      if (statMod) vitalEffect[type+'StatMod'] = statMod;
    }
  }
  const skill = {
    id: _editSkillId || ch.nextId++,
    name, detail:getVal('asDetail').trim(),
    desc: getVal('asDesc').trim(),
    isAttack, isGrowth:isChecked('asIsGrowth'),
    isSoulBound:isChecked('asIsSoulBound'),
    isUnique:false, statAdj, statBonuses, sbSlotBonus,
    vitalEffect,
    growthHistory:[],
  };
  // Preserve _sysSkillTier if editing an existing class skill that came from a system skill
  if (_editSkillId) {
    const prevSkill = ch[_addSkillTarget] ? ch[_addSkillTarget].find(function(s) { return s.id === _editSkillId; }) : null;
    if (prevSkill && prevSkill._sysSkillTier) skill._sysSkillTier = prevSkill._sysSkillTier;
    if (prevSkill && prevSkill.growthHistory) skill.growthHistory = prevSkill.growthHistory;
  }
  if (isAttack) {
    skill.attackDice=parseInt(getVal('asAtkDice'))||20;
    skill.attackCount=parseInt(getVal('asAtkCount'))||1;
    skill.attackStat=getVal('asAtkStat')||null;
    skill.attackCost=parseInt(getVal('asAtkCost'))||0;
    skill.attackCostType=getVal('asAtkCostType');
  }
  // Apply stat bonuses to titleBonus if it's a title
  if (statAdj && Object.keys(statBonuses).length) {
    applySkillStatBonuses(skill, _editSkillId ? 'edit' : 'add', _addSkillTarget);
  }
  if (_editSkillId) {
    const idx = ch[_addSkillTarget].findIndex(s=>s.id===_editSkillId);
    if (idx>=0) ch[_addSkillTarget][idx]=skill;

    // If this is a system-skill-originated class skill, sync the edit back to systemSkillOptions
    // so the System Skills tab shows the updated data
    if (_addSkillTarget === 'classSkills') {
      const allSSO = ch.systemSkillOptions || {};
      for (const t of Object.keys(allSSO)) {
        const ssoIdx = allSSO[t].findIndex(function(s) { return s.id === _editSkillId; });
        if (ssoIdx !== -1) {
          // Update the source option with the new name/desc/rarity/attack data
          const orig = allSSO[t][ssoIdx];
          allSSO[t][ssoIdx] = Object.assign({}, orig, {
            name: skill.name, desc: skill.desc, detail: skill.detail,
            isAttack: skill.isAttack, isGrowth: skill.isGrowth,
            rarity: skill.detail || orig.rarity,
            attackDice: skill.attackDice, attackCount: skill.attackCount,
            attackStat: skill.attackStat, attackCost: skill.attackCost,
            attackCostType: skill.attackCostType,
          });
          // Also update the selectedSystemSkills record
          const selIdx = ch.selectedSystemSkills.findIndex(function(s) { return s.id === _editSkillId; });
          if (selIdx !== -1) {
            ch.selectedSystemSkills[selIdx] = Object.assign({}, ch.selectedSystemSkills[selIdx], {
              name: skill.name, desc: skill.desc
            });
          }
          break;
        }
      }
    }
  } else {
    ch[_addSkillTarget].push(skill);
  }
  // Soul Bound slot bonus
  if (sbSlotBonus && !_editSkillId) ch.extraSoulBoundSlots = (ch.extraSoulBoundSlots||0)+1;
  // Recalc vitals in case this skill affects HP/MP/AC
  recalcVitals(ch);
  // Update header badges
  const acEl=document.getElementById('hAC'); if(acEl) acEl.textContent=ch.ac;
  renderSkillList(_addSkillTarget);
  renderSoulBound();
  // If editing a class skill that came from a system skill, refresh System Skills tab too
  if (_editSkillId && _addSkillTarget === 'classSkills') {
    renderSystemSkills();
  }
  closeModal();
  scheduleAutoSave();
}

function applySkillStatBonuses(skill, mode, listKey) {
  const ch = characters[activeCharIdx];
  for (const [stat, bonus] of Object.entries(skill.statBonuses||{})) {
    if (listKey==='titles') ch.stats[stat].titleBonus = (ch.stats[stat].titleBonus||0)+bonus;
    else ch.stats[stat].rewardBonus = (ch.stats[stat].rewardBonus||0)+bonus;
  }
  renderStats();
}

function editSkill(id, listKey) { openAddSkillModal(listKey, id); }

function removeSkill(id, listKey) {
  const ch = characters[activeCharIdx];
  const skill = ch[listKey].find(s=>s.id===id);
  if (!skill) return;
  if (skill.sbSlotBonus) ch.extraSoulBoundSlots = Math.max(0,(ch.extraSoulBoundSlots||0)-1);
  ch[listKey] = ch[listKey].filter(s=>s.id!==id);
  // If this class skill came from a system skill selection, clear that selection too
  // so the System Skills tab shows the tier as pending again
  if (listKey === 'classSkills') {
    const wasSysSkill = ch.selectedSystemSkills.find(function(s) { return s.id === id; });
    if (wasSysSkill) {
      ch.selectedSystemSkills = ch.selectedSystemSkills.filter(function(s) { return s.id !== id; });
      renderSystemSkills();
      renderAllTabs();
    }
  }
  renderSkillList(listKey);
  renderSoulBound();
  scheduleAutoSave();
}

// ================================================================
// GROW SKILL
// ================================================================
function growSkill(id, listKey) {
  const ch = characters[activeCharIdx];
  const skill = ch[listKey].find(s=>s.id===id);
  if (!skill) return;
  const safeId = (typeof id === 'string') ? ("'" + id + "'") : id;
  openModal(`Grow: [${skill.name}]`, `
    <div style="margin-bottom:10px;color:var(--text3);font-size:0.83rem">Record a growth event. Changes are saved to the Growth Log.</div>
    <div class="form-field" style="margin-bottom:8px"><label class="form-label">Updated Detail</label><input class="form-input" id="gDetail" value="${escHtml(skill.detail||'')}"/></div>
    <div class="form-field" style="margin-bottom:8px"><label class="form-label">Updated Description</label><textarea class="form-textarea" id="gDesc">${escHtml(skill.desc||'')}</textarea></div>
    <div class="form-field" style="margin-bottom:12px"><label class="form-label">What Changed?</label><input class="form-input" id="gNotes" placeholder="e.g. Unlocked secondary fire..."/></div>
    <button class="btn btn-green" style="width:100%" onclick="commitGrowth(${safeId},'${listKey}')">Commit Growth</button>
  `);
}

function commitGrowth(id, listKey) {
  const ch = characters[activeCharIdx];
  const skill = ch[listKey].find(s=>s.id===id);
  if (!skill) return;
  const event = {skillName:skill.name, date:new Date().toLocaleString(), oldDetail:skill.detail, newDetail:getVal('gDetail'), notes:getVal('gNotes')};
  ch.growthLog.push(event);
  skill.detail = event.newDetail;
  skill.desc = getVal('gDesc');
  renderSkillList(listKey);
  renderGrowthLog();
  closeModal();
}

function renderGrowthLog() {
  const ch = characters[activeCharIdx];
  const el = document.getElementById('growthHistory');
  if (!el) return;
  if (ch.growthLog.length===0) { el.innerHTML='<div style="color:var(--text3);font-size:0.83rem">Growth events will appear here.</div>'; return; }
  el.innerHTML='';
  ch.growthLog.slice().reverse().forEach(ev=>{
    const d=document.createElement('div');
    d.className='growth-event';
    d.innerHTML=`<div class="growth-event-header"><span class="growth-event-name">[${escHtml(ev.skillName)}]</span><span class="growth-event-date">${ev.date}</span></div><div style="font-size:0.83rem;color:var(--text2);margin-top:3px">${ev.notes?`<em>${escHtml(ev.notes)}</em><br/>`:''}${escHtml(ev.newDetail)||'—'}</div>`;
    el.appendChild(d);
  });
}

// ================================================================
// SYSTEM SKILLS
// ================================================================
function renderSystemSkills() {
  const ch = characters[activeCharIdx];
  const el = document.getElementById('systemSkillsContent');
  if (!el) return;
  el.innerHTML = '';

  const maxTier = Math.min(Math.floor(ch.classLevel / 5) * 5, 100);

  if (maxTier < 5) {
    el.innerHTML = '<div style="color:var(--text3);font-size:0.83rem;padding:4px">System Skill selections become available at Class Level 5.</div>';
    return;
  }

  // Map of skillId -> tier at which it was selected
  const selectionMap = {};
  ch.selectedSystemSkills.forEach(function(s) { selectionMap[s.id] = s.tier; });

  for (let tier = 5; tier <= maxTier; tier += 5) {
    const selection = ch.selectedSystemSkills.find(function(s) { return s.tier === tier; });
    const isPending = !selection;

    // Tier-specific options (added explicitly for this tier via "+ Add Option")
    const tierOwned = (ch.systemSkillOptions && ch.systemSkillOptions[tier]) ? [...ch.systemSkillOptions[tier]] : [];

    // Carry-over pool: skills from EARLIER tiers that were NOT selected
    // These appear as additional choices but are NOT part of tierOwned (not editable/deletable at this tier)
    const carryOver = [];
    if (tier > 5) {
      for (let prevTier = 5; prevTier < tier; prevTier += 5) {
        const prevOwned = (ch.systemSkillOptions && ch.systemSkillOptions[prevTier]) ? ch.systemSkillOptions[prevTier] : [];
        prevOwned.forEach(function(sk) {
          // Include if: not yet selected at any tier, OR selected at THIS tier (show checkmark)
          const selectedAtTier = selectionMap[sk.id];
          if (!selectedAtTier || selectedAtTier === tier) {
            // Don't duplicate if already in tierOwned
            if (!tierOwned.find(function(o) { return o.id === sk.id; })) {
              carryOver.push({...sk, _fromTier: prevTier});
            }
          }
        });
      }
    }

    // Section container
    const section = document.createElement('div');
    section.style.cssText = 'margin-bottom:20px;border:1px solid ' + (isPending ? 'var(--accent-dim)' : 'var(--border)') + ';border-radius:6px;overflow:hidden';

    // Section header
    const hdr = document.createElement('div');
    hdr.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:' + (isPending ? 'var(--theme-bg)' : 'var(--bg4)') + ';border-bottom:1px solid var(--border)';
    const hdrLeft = document.createElement('span');
    hdrLeft.style.cssText = 'font-family:Cinzel,serif;font-size:0.72rem;letter-spacing:0.1em;color:' + (isPending ? 'var(--accent)' : 'var(--text3)');
    hdrLeft.textContent = (isPending ? '⚡ ' : '✓ ') + 'CLASS LEVEL ' + tier + ' — SYSTEM SKILL';
    if (isPending) {
      const badge = document.createElement('span');
      badge.style.cssText = 'font-size:0.62rem;color:var(--accent-dim);margin-left:6px';
      badge.textContent = '(Choose 1)';
      hdrLeft.appendChild(badge);
    }
    hdr.appendChild(hdrLeft);
    const addBtn = document.createElement('button');
    addBtn.className = 'btn btn-sm';
    addBtn.style.cssText = 'background:var(--bg4);color:var(--text3);border-color:var(--border);font-size:0.58rem';
    addBtn.textContent = '+ Add Option';
    addBtn.onclick = (function(t) { return function() { openAddSystemSkillOption(t); }; })(tier);
    hdr.appendChild(addBtn);
    section.appendChild(hdr);

    const listEl = document.createElement('div');
    listEl.style.cssText = 'padding:8px;display:flex;flex-direction:column;gap:6px';

    // Helper: build a skill card for display
    function buildSysCard(sk, fromTier) {
      const isSelected = !!(selection && selection.id === sk.id);
      const isGreyed = !isPending && !isSelected;
      const isCarryOver = !!fromTier; // came from an earlier tier's pool, not this tier's owned list

      const card = document.createElement('div');
      card.className = 'sys-skill-card' + (isSelected ? ' selected' : '');
      if (isGreyed) card.style.opacity = '0.4';

      // Checkbox
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.className = 'sys-skill-checkbox';
      cb.checked = isSelected;
      cb.onchange = (function(sid, t) { return function() { selectSystemSkill(sid, t, this.checked); }; })(sk.id, tier);
      card.appendChild(cb);

      // Info block
      const info = document.createElement('div');
      info.className = 'sys-skill-info';

      const nameRow = document.createElement('div');
      nameRow.style.cssText = 'display:flex;align-items:center;gap:6px;flex-wrap:wrap';
      const nameEl = document.createElement('span');
      nameEl.className = 'sys-skill-name';
      nameEl.style.margin = '0';
      nameEl.textContent = sk.name;
      nameRow.appendChild(nameEl);

      if (isSelected) {
        const selBadge = document.createElement('span');
        selBadge.style.cssText = 'color:var(--green2);font-size:0.68rem;font-family:Cinzel,serif;white-space:nowrap';
        selBadge.textContent = '✓ Selected — Level ' + tier;
        nameRow.appendChild(selBadge);
      }
      if (isCarryOver) {
        const coBadge = document.createElement('span');
        coBadge.style.cssText = 'color:var(--text3);font-size:0.62rem;font-style:italic';
        coBadge.textContent = '(from Lvl ' + fromTier + ')';
        nameRow.appendChild(coBadge);
      }
      info.appendChild(nameRow);

      if (sk.desc) {
        const descEl = document.createElement('div');
        descEl.className = 'sys-skill-desc';
        descEl.innerHTML = escHtml(sk.desc).replace(/\n/g, '<br/>');
        info.appendChild(descEl);
      }

      const tagsEl = document.createElement('div');
      tagsEl.className = 'sys-skill-tags';
      if (sk.rarity) {
        const rc = sk.rarity === 'rare' ? 'rarity-rare' : sk.rarity === 'uncommon' ? 'rarity-uncommon' : sk.rarity === 'passive' ? 'rarity-growth' : 'rarity-common';
        const rt = document.createElement('span');
        rt.className = 'sys-skill-rarity ' + rc;
        rt.textContent = sk.rarity;
        tagsEl.appendChild(rt);
      }
      if (sk.isGrowth) { const t2=document.createElement('span'); t2.className='skill-tag tag-growth'; t2.textContent='Growth'; tagsEl.appendChild(t2); }
      if (sk.isAttack) { const t2=document.createElement('span'); t2.className='skill-tag tag-attack'; t2.textContent='Attack'; tagsEl.appendChild(t2); }
      info.appendChild(tagsEl);
      card.appendChild(info);

      // Edit + Delete buttons
      // Carry-over skills: edit/delete routes back to their origin tier
      const editTier = isCarryOver ? fromTier : tier;
      const actions = document.createElement('div');
      actions.style.cssText = 'display:flex;flex-direction:column;gap:4px;margin-left:auto;align-self:flex-start;flex-shrink:0';
      const editBtn2 = document.createElement('button');
      editBtn2.className = 'btn btn-sm';
      editBtn2.style.cssText = 'background:var(--bg4);color:var(--text3);border-color:var(--border);font-size:0.58rem';
      editBtn2.textContent = '✎';
      editBtn2.title = 'Edit skill option';
      editBtn2.onclick = (function(et, sid) { return function() { editSystemSkillOption(et, sid); }; })(editTier, sk.id);
      actions.appendChild(editBtn2);
      const delBtn2 = document.createElement('button');
      delBtn2.className = 'btn btn-red btn-xs';
      delBtn2.textContent = '✕';
      delBtn2.title = isCarryOver ? 'Delete from origin tier (Lvl ' + fromTier + ')' : 'Delete option';
      delBtn2.onclick = (function(et, sid) { return function() { confirmDeleteSystemSkillOption(et, sid); }; })(editTier, sk.id);
      actions.appendChild(delBtn2);
      card.appendChild(actions);
      return card;
    }

    // Render tier-owned options first
    if (tierOwned.length === 0 && carryOver.length === 0) {
      const empty = document.createElement('div');
      empty.style.cssText = 'color:var(--text3);font-size:0.8rem;padding:4px;font-style:italic';
      empty.textContent = 'No options yet. Click "+ Add Option" to add skill choices for this level.';
      listEl.appendChild(empty);
    } else {
      if (tierOwned.length > 0) {
        tierOwned.forEach(function(sk) { listEl.appendChild(buildSysCard(sk, null)); });
      }
      // Carry-over section separator
      if (carryOver.length > 0) {
        if (tierOwned.length > 0) {
          const sep = document.createElement('div');
          sep.style.cssText = 'font-family:Cinzel,serif;font-size:0.6rem;letter-spacing:0.08em;color:var(--text3);padding:6px 2px 2px;border-top:1px solid var(--border);margin-top:4px';
          sep.textContent = 'AVAILABLE FROM PREVIOUS LEVELS';
          listEl.appendChild(sep);
        }
        carryOver.forEach(function(sk) { listEl.appendChild(buildSysCard(sk, sk._fromTier)); });
      }
    }

    section.appendChild(listEl);
    el.appendChild(section);
  }

  _updateSystemSkillBanner(ch);
}

// Update the header notification banner and tab dot without full re-render
function _updateSystemSkillBanner(ch) {
  const pending = getPendingSystemSkillTiers(ch);
  // Update banner
  const banner = document.getElementById('sysSkillBanner');
  if (banner) {
    if (pending.length > 0) {
      banner.style.display = '';
      banner.innerHTML = '&#9889; System Skill Selection' + (pending.length > 1 ? 's' : '') + ' available! Pending: <strong>' + pending.map(function(t){return 'Lvl '+t;}).join(', ') + '</strong>. Visit the <strong>System Skills</strong> tab to choose.';
    } else {
      banner.style.display = 'none';
    }
  }
  // Update tab dot
  const tabBtns = document.querySelectorAll('.tab-btn');
  tabBtns.forEach(function(btn) {
    if (btn.textContent.includes('System Skills') || btn.innerHTML.includes('System Skills')) {
      // Rebuild tab text
      const dot = document.getElementById('sysSkillTabDot');
      if (dot) dot.style.display = pending.length > 0 ? '' : 'none';
    }
  });
}

function editSystemSkillOption(tier, skillId) {
  const ch = characters[activeCharIdx];
  // If this skill is currently selected (i.e. it lives in classSkills), edit it there
  // so the full class skill editor opens with all fields populated.
  const isSelected = !!ch.selectedSystemSkills.find(function(s) { return s.id === skillId; });
  const inClassSkills = !!ch.classSkills.find(function(s) { return s.id === skillId; });
  if (isSelected && inClassSkills) {
    openAddSkillModal('classSkills', skillId);
  } else {
    openAddSystemSkillOption(tier, skillId);
  }
}

function toggleSsoAtk() {
  const el = document.getElementById('ssoAtkOpts');
  if (el) el.style.display = isChecked('ssoIsAttack') ? 'block' : 'none';
}

function saveSystemSkillOption(tier, existingId) {
  const ch = characters[activeCharIdx];
  const name = getVal('ssoName').trim();
  if (!name) { alert('Please enter a skill name.'); return; }
  if (!ch.systemSkillOptions) ch.systemSkillOptions = {};
  if (!ch.systemSkillOptions[tier]) ch.systemSkillOptions[tier] = [];
  const isAtk = isChecked('ssoIsAttack');
  const skData = {
    name,
    rarity: getVal('ssoRarity'),
    desc: getVal('ssoDesc').trim(),
    isGrowth: isChecked('ssoIsGrowth'),
    isAttack: isAtk,
    ...(isAtk ? {
      attackDice: parseInt(getVal('ssoAtkDice')) || 20,
      attackCount: parseInt(getVal('ssoAtkCount')) || 1,
      attackStat: getVal('ssoAtkStat') || null,
      attackCost: parseInt(getVal('ssoAtkCost')) || 0,
      attackCostType: getVal('ssoAtkCostType') || 'mp',
    } : {}),
  };

  if (existingId) {
    // Edit existing option in-place
    const idx = ch.systemSkillOptions[tier].findIndex(s => s.id === existingId);
    if (idx !== -1) {
      ch.systemSkillOptions[tier][idx] = { ...ch.systemSkillOptions[tier][idx], ...skData };
      // If this option is currently selected, sync the class skill entry too
      const sel = ch.selectedSystemSkills.find(s => s.tier === tier && s.id === existingId);
      if (sel) {
        Object.assign(sel, skData);
        const cs = ch.classSkills.find(s => s.id === existingId);
        if (cs) Object.assign(cs, { name: skData.name, desc: skData.desc, detail: skData.rarity || '' });
      }
    }
  } else {
    // New option
    ch.systemSkillOptions[tier].push({ id: 'sso_' + tier + '_' + Date.now(), ...skData });
  }

  closeModal();
  renderSystemSkills();
  renderSkillList('classSkills');
  scheduleAutoSave();
}

// Delete an option — always available, cascades if it was selected
function confirmDeleteSystemSkillOption(tier, skillId) {
  const ch = characters[activeCharIdx];
  const allOptions = ch.systemSkillOptions?.[tier] || [];
  const sk = allOptions.find(s => s.id === skillId);
  if (!sk) return;
  const isSelected = !!ch.selectedSystemSkills.find(s => s.tier === tier && s.id === skillId);
  const msg = isSelected
    ? `Delete "${sk.name}"? It is currently selected — this will also remove it from Class Skills.`
    : `Delete "${sk.name}" from Level ${tier} options?`;
  if (!confirm(msg)) return;
  deleteSystemSkillOption(tier, skillId);
}

function deleteSystemSkillOption(tier, skillId) {
  const ch = characters[activeCharIdx];
  if (ch.systemSkillOptions?.[tier]) {
    ch.systemSkillOptions[tier] = ch.systemSkillOptions[tier].filter(s => s.id !== skillId);
  }
  ch.selectedSystemSkills = ch.selectedSystemSkills.filter(s => !(s.tier === tier && s.id === skillId));
  ch.classSkills = ch.classSkills.filter(s => s.id !== skillId);
  renderSystemSkills();
  renderSkillList('classSkills');
  renderAllTabs();
  scheduleAutoSave();
}


function selectSystemSkill(skillId, tier, checked) {
  const ch = characters[activeCharIdx];

  // Search ALL tiers for the skill — carry-over skills live in a previous tier's options
  let sk = null;
  const allTiers = Object.keys(ch.systemSkillOptions || {}).map(Number).sort((a,b)=>a-b);
  for (const t of allTiers) {
    const found = (ch.systemSkillOptions[t] || []).find(function(s) { return s.id === skillId; });
    if (found) { sk = found; break; }
  }
  if (!sk) return;

  if (checked) {
    // Remove any prior selection for this tier from both selectedSystemSkills and classSkills
    const prior = ch.selectedSystemSkills.find(function(s) { return s.tier === tier; });
    if (prior) ch.classSkills = ch.classSkills.filter(function(s) { return s.id !== prior.id; });
    ch.selectedSystemSkills = ch.selectedSystemSkills.filter(function(s) { return s.tier !== tier; });
    ch.selectedSystemSkills.push(Object.assign({}, sk, { tier: tier }));

    // Add to classSkills as a full editable entry (with system skill tier tracked)
    if (!ch.classSkills.find(function(s) { return s.id === sk.id; })) {
      ch.classSkills.push({
        id: sk.id, name: sk.name, detail: sk.rarity || '', desc: sk.desc || '',
        isAttack: sk.isAttack || false, isGrowth: sk.isGrowth || false,
        isSoulBound: false, statAdj: false, sbSlotBonus: false,
        vitalEffect: null, _sysSkillTier: tier,
        attackDice: sk.attackDice || 20, attackCount: sk.attackCount || 1,
        attackStat: sk.attackStat || null, attackCost: sk.attackCost || 0,
        attackCostType: sk.attackCostType || 'none',
      });
    }
  } else {
    // Uncheck — clear selection and remove from class skills
    ch.selectedSystemSkills = ch.selectedSystemSkills.filter(function(s) {
      return !(s.id === skillId && s.tier === tier);
    });
    ch.classSkills = ch.classSkills.filter(function(s) { return s.id !== skillId; });
  }
  renderSystemSkills();
  renderSkillList('classSkills');
  renderAllTabs();
  scheduleAutoSave();
}

function renderStatRewards() {
  const ch = characters[activeCharIdx];
  const el = document.getElementById('statRewardsList');
  if (!el) return;
  el.innerHTML='';
  if (!ch.statRewards||ch.statRewards.length===0) { el.innerHTML='<div style="color:var(--text3);font-size:0.83rem">No stat rewards yet.</div>'; return; }
  ch.statRewards.forEach(r=>{
    const d=document.createElement('div');
    d.className='stat-reward-item';
    const bonusTags = Object.entries(r.bonuses||{}).filter(([,v])=>v>0).map(([k,v])=>`<span class="stat-reward-bonus">+${v} ${STAT_ABBR[k]||k}</span>`).join('');
    d.draggable = true;
    d.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="display:flex;align-items:center;gap:4px"><span class="drag-handle" title="Drag to reorder">⠿</span><span style="font-family:'Cinzel',serif;font-size:0.78rem;color:var(--gold)">[${escHtml(r.source||'Reward')}]</span></span>
        <button class="btn btn-red btn-xs" onclick="removeStatReward(${r.id})">✕</button>
      </div>
      <div style="font-size:0.8rem;color:var(--text3);margin-top:2px;font-style:italic">${escHtml(r.desc||'')}</div>
      <div class="stat-reward-bonuses">${bonusTags}</div>`;
    el.appendChild(d);
  });
  makeDraggable(el, 'statRewards', renderStatRewards);
}

function openStatRewardModal() {
  const statInputs = STAT_KEYS.map(k=>`
    <div class="form-checkbox-row" style="margin-bottom:4px">
      <label class="form-check-label" style="min-width:90px">${k}</label>
      <input class="form-input" id="sr_${k}" type="number" value="0" min="0" style="width:55px"/>
    </div>`).join('');
  openModal('Add Stat Reward', `
    <div class="form-field" style="margin-bottom:8px"><label class="form-label">Source / Title</label><input class="form-input" id="srSource" placeholder="e.g. Boss Reward, Event"/></div>
    <div class="form-field" style="margin-bottom:8px"><label class="form-label">One-line Description</label><input class="form-input" id="srDesc" placeholder="What led to this reward?"/></div>
    <div class="form-label" style="margin-bottom:6px">Stat Increases</div>
    ${statInputs}
    <button class="btn btn-green" style="width:100%;margin-top:12px" onclick="saveStatReward()">Add Stat Reward</button>
  `);
}

function saveStatReward() {
  const ch = characters[activeCharIdx];
  const bonuses = {};
  for (const k of STAT_KEYS) { const v=parseInt(document.getElementById('sr_'+k)?.value)||0; if(v) bonuses[k]=v; }
  const reward = {id:ch.nextId++, source:getVal('srSource').trim(), desc:getVal('srDesc').trim(), bonuses};
  ch.statRewards = ch.statRewards||[];
  ch.statRewards.push(reward);
  // Apply to rewardBonus
  for (const [k,v] of Object.entries(bonuses)) { ch.stats[k].rewardBonus=(ch.stats[k].rewardBonus||0)+v; }
  renderStatRewards();
  renderStats();
  closeModal();
}

function removeStatReward(id) {
  const ch = characters[activeCharIdx];
  const r = ch.statRewards.find(x=>x.id===id);
  if (r) { for (const [k,v] of Object.entries(r.bonuses||{})) ch.stats[k].rewardBonus=Math.max(0,(ch.stats[k].rewardBonus||0)-v); }
  ch.statRewards = ch.statRewards.filter(x=>x.id!==id);
  renderStatRewards();
  renderStats();
}

function renderWeapons() {
  const ch = characters[activeCharIdx];
  const el = document.getElementById('weaponsList');
  if (!el) return;
  el.innerHTML='';
  if (!ch.weapons||ch.weapons.length===0) { el.innerHTML='<div style="color:var(--text3);font-size:0.83rem">No weapons or armor.</div>'; return; }
  ch.weapons.forEach(w=>{
    const d=document.createElement('div');
    d.className='weapon-card'+(w.isEquipped?' equipped':'')+(w.isAttack?' attack-weapon':'')+(w.isDefensive?' defensive-weapon':'');
    const tags=[];
    if(w.isEquipped) tags.push('<span class="skill-tag tag-equipped">Equipped</span>');
    if(w.isAttack) tags.push('<span class="skill-tag tag-attack">Attack</span>');
    if(w.isDefensive) tags.push('<span class="skill-tag" style="background:#0a1a2e;color:#6aaee8;border:1px solid #4a8fc4">Defensive</span>');

    if(w.isSoulBound) tags.push('<span class="skill-tag tag-soulbound">Soul Bound</span>');
    const atkBtns = w.isAttack ? `<button class="to-hit-btn" onclick="rollToHit('${escHtml(w.name)}')">To Hit</button><button class="attack-btn" onclick="rollWeaponAttack(${w.id})">Roll DMG</button>` : '';
    // Build AC display for defensive items
    let acLine = '';
    if (w.isDefensive) {
      const ch2 = characters[activeCharIdx];
      let acVal = w.acBase||0;
      let acParts = [`Base ${acVal}`];
      if (w.acStatBase) { const sv=calcStatTotal(w.acStatBase,ch2); acVal+=sv; acParts.push(`+${w.acStatBase} Base(${sv})`); }
      if (w.acStatMod) { const mv=getMod(w.acStatMod,ch2); acVal+=mv; acParts.push(`+${w.acStatMod} Mod(${mv})`); }
      acLine = `<div class="skill-detail" style="color:var(--blue2)"><strong>AC: ${acVal}</strong> <span style="color:var(--text3);font-size:0.78rem">(${acParts.join(' ')})</span></div>`;
    }
    d.draggable = true;
    d.innerHTML=`
      <div class="skill-row">
        <span class="drag-handle" title="Drag to reorder">⠿</span>
        <span class="skill-name">${escHtml(w.name)}</span>
        <div class="skill-actions">${atkBtns}
          <button class="btn btn-sm" style="background:var(--bg4);color:var(--text3);border-color:var(--border)" onclick="openEditWeaponModal(${w.id})">✎</button>
          <button class="btn btn-red btn-xs" onclick="removeWeapon(${w.id})">✕</button>
        </div>
      </div>
      ${w.dmg?`<div class="skill-detail"><strong>DMG: ${escHtml(w.dmg)} ${escHtml(w.dmgType||'')}</strong></div>`:''}
      ${acLine}
      ${w.desc?`<div class="skill-detail">${escHtml(w.desc)}</div>`:''}
      ${tags.length?`<div class="skill-row" style="margin-top:4px">${tags.join(' ')}</div>`:''}`;
    el.appendChild(d);
  });
  makeDraggable(el, 'weapons', renderWeapons);
}

function rollWeaponAttack(id) {

  if (!w||!w.isAttack) return;
  let total=0; const rolls=[];
  for(let i=0;i<(w.attackCount||1);i++){const r=Math.ceil(Math.random()*(w.attackDice||20));rolls.push(r);total+=r;}

  if (!FIREBASE_CONFIGURED) {

function joinRoom(roomId, isCreator) {
  if (!_firebaseDb) return;
  _roomId = roomId;

  // Reflect room ID in the URL so others can join via the same link
  const url = new URL(window.location.href);
  url.searchParams.set('room', roomId);
  history.replaceState(null, '', url.toString());

  const roomRef = _firebaseDb.ref('rooms/' + roomId);

  // Presence — auto-remove on disconnect
  const presRef = roomRef.child('presence/' + _userId);
  const chName = characters[activeCharIdx] ? characters[activeCharIdx].name : 'Player';
  presRef.set({ uid: _userId, name: chName, joined: Date.now() });
  presRef.onDisconnect().remove();

  // If we created the room, push our current characters up
  if (isCreator) pushCharactersToFirebase();

  // Listen for character state changes from others
  roomRef.child('characters').on('value', function(snap) {
    const val = snap.val();
    if (!val || val.by === _userId) return; // skip own pushes
    _receivingRemoteUpdate = true;
    try {
      applyLoadedState(JSON.parse(val.payload));
      characters.forEach(function(ch) { recalcVitals(ch); });
      renderAllTabs();
      renderSheet();
    } catch(e) { console.warn('Firebase character sync error:', e); }
    _receivingRemoteUpdate = false;
  });

  // Listen for new rolls — skip existing history on join
  let rollInitDone = false;
  roomRef.child('rolls').orderByChild('ts').on('child_added', function(snap) {
    if (!rollInitDone) return;
    const data = snap.val();
    if (!data || data.by === _userId) return; // skip own rolls — already rendered locally
    _renderRollCard(data);
  });
  setTimeout(function() { rollInitDone = true; }, 300);

  // Listen for presence changes
  roomRef.child('presence').on('value', function(snap) {
    _renderPresence(snap.val() || {});
  });

  updateGoLiveBtn();
}

function pushCharactersToFirebase() {
  if (!_firebaseDb || !_roomId || _receivingRemoteUpdate) return;
  _firebaseDb.ref('rooms/' + _roomId + '/characters').set({
    payload: JSON.stringify(getSerializableState()),
    by: _userId,
    ts: Date.now()
  });
}

function copyRoomLink() {
  if (!_roomId) return;
  const url = new URL(window.location.href);
  url.searchParams.set('room', _roomId);
  navigator.clipboard.writeText(url.toString()).then(function() {
    showSaveStatus('✓ Room link copied — share it with your players!', true);
    const btn = document.getElementById('goLiveBtn');
    if (btn) { btn.textContent = '✓ Link Copied!'; setTimeout(updateGoLiveBtn, 2000); }
  }).catch(function() {
    showSaveStatus('Room link: ' + url.toString(), true);
  });
}

function _parseLabel(label) {
  // "[SkillName] DMG"  /  "[SkillName] To Hit"
  const skillMatch = label.match(/^\[(.+?)\]\s+(.+)$/);
  if (skillMatch) return { type: skillMatch[2].toUpperCase(), action: skillMatch[1].toUpperCase() };
  // "Strength Check" etc.
  const statCheck = label.match(/^(\w+)\s+Check$/i);
  if (statCheck) {
    const abbr = STAT_ABBR[statCheck[1]] || statCheck[1].toUpperCase().slice(0, 3);
    return { type: abbr, action: 'CHECK' };
  }
  if (label === 'Level Up!')          return { type: 'LEVEL',  action: 'UP'      };
  if (label === 'Level Up Undone')    return { type: 'LEVEL',  action: 'UNDO'    };
  if (label.startsWith('System Skill')) return { type: 'SKILL', action: 'UNLOCK' };
  const parts = label.trim().split(/\s+/);
  if (parts.length >= 2) return { type: parts[0].toUpperCase(), action: parts.slice(1).join(' ').toUpperCase() };
  return { type: 'ROLL', action: label.toUpperCase() };
}

function _renderRollCard(data) {
  const log = document.getElementById('logEntries');
  if (!log) return;
  const ph = log.querySelector('.log-empty');
  if (ph) ph.remove();

  const isCrit   = data.roll === 100;
  const isFumble = data.roll === 1;
  const totalColor = isCrit ? '#ffd700' : isFumble ? '#ff4444' : '';
  const time = new Date(data.ts).toLocaleString([], {
    month: 'numeric', day: 'numeric', year: 'numeric',
    hour: 'numeric', minute: '2-digit'
  });
  const initial = (data.charName || '?').charAt(0).toUpperCase();

  const group = document.createElement('div');
  group.className = 'log-group';
  group.innerHTML =
    '<div class="log-char-name">' + escHtml(data.charName) + '</div>' +
    '<div class="log-card">' +
      '<div class="log-card-body">' +
        '<div class="log-avatar" style="background:' + escHtml(data.accentColor) + '">' + initial + '</div>' +
        '<div class="log-label">' +
          '<span class="log-label-type">' + escHtml(data.labelType) + '</span>' +
          '<span class="log-label-type">: </span>' +
          '<span class="log-label-action" style="color:' + escHtml(data.accentColor) + '">' + escHtml(data.labelAction) + '</span>' +
          (data.breakdown ? '<div class="log-breakdown">' + escHtml(data.breakdown) + ' <strong>' + data.total + '</strong></div>' : '') +
        '</div>' +
      '</div>' +
      '<div class="log-divider"></div>' +
      '<div class="log-card-total"' + (totalColor ? ' style="color:' + totalColor + '"' : '') + '>' + data.total + '</div>' +
    '</div>' +
    '<div class="log-entry-time">' + escHtml(time) + '</div>';

  log.insertBefore(group, log.firstChild);

  const gl = document.getElementById('gameLog');
  if (gl.classList.contains('collapsed')) {
    gl.classList.remove('collapsed');
    document.getElementById('logToggleIcon').textContent = '▼';
  }
}

function showDiceAnimation(result, accentColor, callback) {
  const overlay = document.getElementById('diceOverlay');
  if (!overlay) { if (callback) callback(); return; }

  const scene = document.createElement('div');
  scene.className = 'die-scene';
  scene.style.top = (15 + Math.random() * 35) + 'vh';

  const cube = document.createElement('div');
  cube.className = 'die-cube';

  const brightness = { front:1, top:0.88, right:0.82, left:0.78, back:0.65, bottom:0.6 };
  Object.keys(brightness).forEach(function(face) {
    const f = document.createElement('div');
    f.className = 'die-face ' + face;
    f.textContent = face === 'front' ? result : '';
    f.style.background = accentColor;
    f.style.filter = 'brightness(' + brightness[face] + ')';
    cube.appendChild(f);
  });

  scene.appendChild(cube);
  overlay.appendChild(scene);

  // After 1.5s animation, pause on result (card renders now), then fade die out
  setTimeout(function() {
    if (callback) callback();
    setTimeout(function() {
      scene.style.transition = 'opacity 0.35s ease, transform 0.35s ease';
      scene.style.opacity = '0';
      scene.style.transform = 'translateY(-18px) scale(0.82)';
      setTimeout(function() {
        if (overlay.contains(scene)) overlay.removeChild(scene);
      }, 350);
    }, 750);
  }, 1500);
}

function addLog(label, breakdown, total, roll) {
  const ch = characters[activeCharIdx];
  const charName    = ch ? ch.name : 'Unknown';
  const accentColor = THEME_DOTS[ch ? (ch.theme || 'theme-crimson') : 'theme-crimson'] || '#8b1a1a';
  const parsed      = _parseLabel(label);

  const rollData = {
    charName,
    accentColor,
    labelType:   parsed.type,
    labelAction: parsed.action,
    breakdown,
    total,
    roll,
    by: _userId,
    ts: Date.now()
  };

  // Show dice animation; render card + sync only after it lands
  showDiceAnimation(total, accentColor, function() {
    _renderRollCard(rollData);
    if (_firebaseDb && _roomId) {
      _firebaseDb.ref('rooms/' + _roomId + '/rolls').push(rollData);
    }
  });
}

    <div class="option-grid">

        <div class="option-card-title">Mage</div>
        <div class="option-card-desc">Level bonuses: +2 INT, +1 WIS, VIT, PER, PER per Class Level.<br/>High MP pool.</div>
      </div>
      <div class="option-card ${_wizData.charClass==='Melee'?'selected':''}" onclick="selectWiz('charClass','Melee',this)">
        <div class="option-card-title">Melee</div>
        <div class="option-card-desc">Level bonuses: +2 STR, +1 AGI, VIT, PER, WIS per Class Level.<br/>High HP pool.</div>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn" style="flex:1" onclick="wizBack()">← Back</button>
      <button class="btn btn-gold" style="flex:2" onclick="wizNext()">Next →</button>
    </div>
  `;
  if (step===3) {
    const statInputs = STAT_KEYS.map(k=>`
      <div class="stat-init-row">
        <label class="stat-init-label">${k} (${STAT_ABBR[k]})</label>
        <input class="stat-init-input" id="wizStat_${k}" type="number" value="${_wizData.stats[k]||5}" min="1" max="50"/>
      </div>`).join('');
    return `
      <div class="wizard-title">Step 3 of 3 — Starting Stats</div>
      <div class="wizard-sub">Enter the starting base values for each stat. The modifier is base ÷ 2.</div>
      <div class="stat-init-grid">${statInputs}</div>
      <div style="display:flex;gap:8px;margin-top:14px">
        <button class="btn" style="flex:1" onclick="wizBack()">← Back</button>
        <button class="btn btn-gold" style="flex:2" onclick="wizCreate()">Create Character ✦</button>
      </div>`;
  }
}

function selectWiz(field, val, el) {
  _wizData[field]=val;
  el.closest('.option-grid').querySelectorAll('.option-card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
}

function wizNext() {
  if (_wizData.step===1) { _wizData.name=document.getElementById('wizName').value.trim(); if(!_wizData.name){alert('Please enter a name.');return;} }
  if (_wizData.step===2) {}
  _wizData.step++;
  document.getElementById('modalBody').innerHTML=buildWizardHTML();
}

function wizBack() { _wizData.step--; document.getElementById('modalBody').innerHTML=buildWizardHTML(); }

function wizCreate() {
  const startStats={};
  for(const k of STAT_KEYS){startStats[k]=parseInt(document.getElementById('wizStat_'+k)?.value)||5;}
  const ch = makeBlankChar(_wizData.name, _wizData.race+' ('+_wizData.gender+')', _wizData.charClass, startStats);
  characters.push(ch);
  activeCharIdx=characters.length-1;
  closeModal();
  renderAllTabs();
  renderSheet();
}

// ================================================================
// MULTI-CHARACTER
// ================================================================
function removeChar(idx, event) {
  event.stopPropagation();
  if (characters.length<=1) { alert("Can't remove the last character."); return; }
  if (!confirm(`Remove character "${characters[idx].name}"?`)) return;
  characters.splice(idx,1);
  if (activeCharIdx>=characters.length) activeCharIdx=characters.length-1;
  renderAllTabs();
  renderSheet();
}

// ================================================================
// SAVE / LOAD / SHARE
// ================================================================
const SAVE_KEY = 'chronicle_sheets_v2';

function getSerializableState() {
  return { characters, activeCharIdx, nextCharId };
}

function saveAll() {
  try {
    const data = JSON.stringify(getSerializableState());
    localStorage.setItem(SAVE_KEY, data);
    showSaveStatus('✓ Saved', true);
    updateURLHash(data);
    // Sync to Firebase room if live
    if (_firebaseDb && _roomId && !_receivingRemoteUpdate) {
      _firebaseDb.ref('rooms/' + _roomId + '/characters').set({
        payload: data,
        by: _userId,
        ts: Date.now()
      });
    }
  } catch(e) {
    showSaveStatus('Save failed: ' + e.message, false);
  }
}

function loadFromStorage() {
  // First check URL hash (shareable link takes priority)
  const hash = window.location.hash;
  if (hash && hash.length > 2) {
    try {
      const decoded = decodeURIComponent(hash.slice(1));
      const data = JSON.parse(atob(decoded));
      applyLoadedState(data);
      showSaveStatus('✓ Loaded from shared link', true);
      return true;
    } catch(e) {
      // Fall through to localStorage
    }
  }
  // Try localStorage
  try {
    const saved = localStorage.getItem(SAVE_KEY);
    if (saved) {
      const data = JSON.parse(saved);
      applyLoadedState(data);
      showSaveStatus('✓ Loaded saved data', true);
      return true;
    }
  } catch(e) {
    showSaveStatus('Could not load save', false);
  }
  showSaveStatus('No saved data', false);
  return false;
}

function applyLoadedState(data) {
  if (data.characters && Array.isArray(data.characters)) {
    characters.length = 0;
    data.characters.forEach(c => {
      // ── Self-healing: recalculate totalFPEarned from actual levels ──
      c.totalFPEarned = calcTotalFPEarned(c.classLevel || 0, c.raceLevel || 0);
      // ── Self-healing: recalculate classBonus for each stat ──
      const cb = {};
      for (const [stat, bonus] of Object.entries(CLASS_BONUSES)) cb[stat] = bonus * (c.classLevel || 0);
      for (const stat of STAT_KEYS) {
        if (c.stats && c.stats[stat]) c.stats[stat].classBonus = cb[stat] || 0;
      }
      // ── Ensure theme field exists ──
      if (!c.theme) c.theme = 'theme-crimson';
      // ── Ensure systemSkillOptions exists ──
      if (!c.systemSkillOptions) c.systemSkillOptions = {};
      // ── Strip character-wrong skills from old saves ──
      // Devyn must NOT have Cat's Eye (ss6) or Healing Minor (ss7)
      // Xeva must NOT have Bale Fire Bolt (xeva_ss2) or Light Weapon Training (xeva_ss3)
      if (c.name === 'Devyn') {
        const devynBanned = new Set(['ss6','ss7']);
        for (const t of Object.keys(c.systemSkillOptions)) {
          c.systemSkillOptions[t] = (c.systemSkillOptions[t] || []).filter(function(sk) { return !devynBanned.has(sk.id); });
        }
        c.selectedSystemSkills = (c.selectedSystemSkills || []).filter(function(sk) { return !devynBanned.has(sk.id); });
        if (c.classSkills) c.classSkills = c.classSkills.filter(function(sk) { return !devynBanned.has(sk.id); });
      }
      if (c.name === 'Xeva') {
        // Ban both the old global IDs (ss2, ss3) and the xeva-namespaced variants — strip from everywhere
        const xevaBanned = new Set(['ss2','ss3','xeva_ss2','xeva_ss3']);
        for (const t of Object.keys(c.systemSkillOptions)) {
          c.systemSkillOptions[t] = (c.systemSkillOptions[t] || []).filter(function(sk) { return !xevaBanned.has(sk.id); });
        }
        c.selectedSystemSkills = (c.selectedSystemSkills || []).filter(function(sk) { return !xevaBanned.has(sk.id); });
        if (c.classSkills) c.classSkills = c.classSkills.filter(function(sk) { return !xevaBanned.has(sk.id); });
      }
      // ── Seed systemSkillOptions from SYSTEM_SKILLS only if that tier is completely empty ──
      for (const [tier, skills] of Object.entries(SYSTEM_SKILLS)) {
        const t = parseInt(tier);
        if (!c.systemSkillOptions[t] || c.systemSkillOptions[t].length === 0) {
          c.systemSkillOptions[t] = skills.map(function(sk) { return Object.assign({}, sk); });
        }
      }
      // ── Self-healing: strip old buggy saves that had multiple selections per tier ──
      if (c.selectedSystemSkills && Array.isArray(c.selectedSystemSkills)) {
        const tierCounts = {};
        c.selectedSystemSkills.forEach(function(s) { tierCounts[s.tier] = (tierCounts[s.tier] || 0) + 1; });
        const hasBadTier = Object.values(tierCounts).some(function(count) { return count > 1; });
        if (hasBadTier) {
          const staleIds = new Set(c.selectedSystemSkills.map(function(s) { return s.id; }));
          c.selectedSystemSkills = [];
          if (c.classSkills) c.classSkills = c.classSkills.filter(function(s) { return !staleIds.has(s.id); });
        }
      }
      // ── KEY FIX: ensure every selected system skill is present in classSkills ──
      // makeDevyn stores ss1 in selectedSystemSkills but not in classSkills.
      // Any save/load gap where classSkills is missing a selected entry is corrected here.
      if (!c.selectedSystemSkills) c.selectedSystemSkills = [];
      if (!c.classSkills) c.classSkills = [];
      c.selectedSystemSkills.forEach(function(sel) {
        const alreadyInCS = c.classSkills.find(function(sk) { return sk.id === sel.id; });
        if (!alreadyInCS) {
          // Re-create the class skill entry from the selection record
          c.classSkills.push({
            id: sel.id, name: sel.name, detail: sel.rarity || '', desc: sel.desc || '',
            isAttack: sel.isAttack || false, isGrowth: sel.isGrowth || false,
            isSoulBound: false, statAdj: false, sbSlotBonus: false,
            vitalEffect: null, _sysSkillTier: sel.tier,
            attackDice: sel.attackDice || 20, attackCount: sel.attackCount || 1,
            attackStat: sel.attackStat || null, attackCost: sel.attackCost || 0,
            attackCostType: sel.attackCostType || 'none',
          });
        } else {
          // Ensure _sysSkillTier tag is present
          if (!alreadyInCS._sysSkillTier) alreadyInCS._sysSkillTier = sel.tier;
        }
      });
      characters.push(c);
    });
    // ── If only Devyn was saved (old single-char save), add Xeva ──
    const hasXeva = characters.some(c => c.name === 'Xeva');
    if (!hasXeva) {
      const xeva = makeXeva();
      recalcVitals(xeva);
      characters.push(xeva);
    }
  }
  if (typeof data.activeCharIdx === 'number') activeCharIdx = Math.min(data.activeCharIdx, characters.length-1);
  if (typeof data.nextCharId === 'number') nextCharId = data.nextCharId;
  // Re-apply active character's theme
  const activeCh = characters[activeCharIdx];
  if (activeCh) applyTheme(activeCh.theme || 'theme-crimson');
}

function showSaveStatus(msg, isGood) {
  const el = document.getElementById('saveStatus');
  if (!el) return;
  el.textContent = msg;
  el.className = 'save-status ' + (isGood ? 'saved' : 'unsaved');
  if (isGood) setTimeout(() => { el.textContent = '✓ Saved'; el.className='save-status saved'; }, 3000);
}

function updateURLHash(dataStr) {
  try {
    const encoded = btoa(encodeURIComponent(dataStr));
    history.replaceState(null, '', '#' + encoded);
  } catch(e) {}
}

function generateShareURL() {
  saveAll(); // ensure state is current
  const data = JSON.stringify(getSerializableState());
  try {
    const encoded = btoa(encodeURIComponent(data));
    const url = window.location.origin + window.location.pathname + '#' + encoded;
    const box = document.getElementById('shareUrlBox');
    const btn = document.getElementById('copyUrlBtn');
    box.value = url;
    box.style.display = 'block';
    btn.style.display = 'inline-block';
    showSaveStatus('✓ Share URL generated — click to copy', true);
  } catch(e) {
    showSaveStatus('Could not generate URL: data may be too large', false);
  }
}

function copyShareURL() {
  const box = document.getElementById('shareUrlBox');
  if (!box || !box.value) return;
  navigator.clipboard.writeText(box.value).then(() => {
    showSaveStatus('✓ URL copied to clipboard!', true);
    const btn = document.getElementById('copyUrlBtn');
    if (btn) { btn.textContent = 'Copied!'; setTimeout(() => btn.textContent='Copy', 2000); }
  }).catch(() => {
    box.select();
    document.execCommand('copy');
    showSaveStatus('✓ URL copied!', true);
  });
}

function clearSave() {
  if (!confirm('Clear all saved data? This cannot be undone.')) return;
  localStorage.removeItem(SAVE_KEY);
  history.replaceState(null, '', window.location.pathname);
  const box = document.getElementById('shareUrlBox');
  const btn = document.getElementById('copyUrlBtn');
  if (box) { box.value=''; box.style.display='none'; }
  if (btn) btn.style.display='none';
  // Re-initialize with both default characters
  characters.length = 0;
  characters.push(makeDevyn());
  characters.push(makeXeva());
  activeCharIdx = 0;
  characters.forEach(ch => recalcVitals(ch));
  renderAllTabs();
  renderSheet();
  showSaveStatus('Save cleared — defaults restored', false);
}

// Auto-save on any input change (debounced)
let _autoSaveTimer = null;
// ================================================================
// DRAG & DROP REORDER
// ================================================================
function makeDraggable(listEl, listKey, renderFn) {
  if (!listEl) return;
  const ch = characters[activeCharIdx];
  const items = ch[listKey];
  if (!items || items.length < 2) return;

  let dragSrcIdx = null;

  Array.from(listEl.children).forEach(function(card, idx) {
    if (!card.draggable) return;

    card.addEventListener('dragstart', function(e) {
      dragSrcIdx = idx;
      card.classList.add('drag-ghost');
      e.dataTransfer.effectAllowed = 'move';
      // Required for Firefox
      e.dataTransfer.setData('text/plain', idx);
    });

    card.addEventListener('dragend', function() {
      card.classList.remove('drag-ghost');
      listEl.querySelectorAll('[draggable]').forEach(function(c) {
        c.classList.remove('drag-over-above', 'drag-over-below');
      });
    });

    card.addEventListener('dragover', function(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (dragSrcIdx === idx) return;
      // Determine above vs below based on cursor position
      const rect = card.getBoundingClientRect();
      const mid = rect.top + rect.height / 2;
      listEl.querySelectorAll('[draggable]').forEach(function(c) {
        c.classList.remove('drag-over-above', 'drag-over-below');
      });
      card.classList.add(e.clientY < mid ? 'drag-over-above' : 'drag-over-below');
    });

    card.addEventListener('dragleave', function() {
      card.classList.remove('drag-over-above', 'drag-over-below');
    });

    card.addEventListener('drop', function(e) {
      e.preventDefault();
      if (dragSrcIdx === null || dragSrcIdx === idx) return;
      const rect = card.getBoundingClientRect();
      const mid = rect.top + rect.height / 2;
      const insertBefore = e.clientY < mid;

      // Reorder the data array
      const moved = items.splice(dragSrcIdx, 1)[0];
      let targetIdx = items.indexOf(items[idx > dragSrcIdx ? idx - 1 : idx]);
      // Recalculate target after splice
      const newTargetIdx = idx > dragSrcIdx ? (insertBefore ? idx - 1 : idx) : (insertBefore ? idx : idx + 1);
      items.splice(Math.max(0, Math.min(items.length, newTargetIdx)), 0, moved);

      dragSrcIdx = null;
      scheduleAutoSave();
      renderFn();
    });
  });
}

function scheduleAutoSave() {
  clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(() => saveAll(), 2000);
}

function escHtml(str){return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function getVal(id){return document.getElementById(id)?.value||'';}
function setVal(id,v){const el=document.getElementById(id);if(el)el.value=v;}
function isChecked(id){return document.getElementById(id)?.checked||false;}
function setChecked(id,v){const el=document.getElementById(id);if(el)el.checked=v;}
function wrapTA(id,open,close){const ta=document.getElementById(id);if(!ta)return;const s=ta.selectionStart,e=ta.selectionEnd,sel=ta.value.substring(s,e);ta.value=ta.value.substring(0,s)+open+sel+close+ta.value.substring(e);}

// ================================================================
// BOOT
// ================================================================
(function init() {
  // If a room ID is in the URL and Firebase is configured, skip local storage
  // (we'll load from Firebase via the listener in joinRoom)
  const inRoom = FIREBASE_CONFIGURED && new URLSearchParams(window.location.search).get('room');

  if (!inRoom) {
    const loaded = loadFromStorage();
    if (!loaded) {
      characters.length = 0;
      characters.push(makeDevyn());
      characters.push(makeXeva());
      activeCharIdx = 0;
    }
  } else {
    // Start with defaults; Firebase listener will replace them momentarily
    characters.length = 0;
    characters.push(makeDevyn());
    characters.push(makeXeva());
    activeCharIdx = 0;
  }

  characters.forEach(ch => recalcVitals(ch));
  renderAllTabs();
  renderSheet();

  window.addEventListener('beforeunload', () => saveAll());
  document.addEventListener('input', (e) => {
    const id = e.target?.id;
    if (id && ['charName','charRace','charClass','charProf','charAC','blessingsText'].includes(id)) {
      scheduleAutoSave();
    }
  });

  // Connect to Firebase room if ?room= is in the URL
  initFirebase();
})();
</script>
