function updateBar(type) {
  const ch = characters[activeCharIdx];
  const cur = parseInt(document.getElementById(type+'Current').value)||0;
  const max = type==='hp'?ch.hpMax:ch.mpMax;
  if (type==='hp') ch.hpCurrent=cur; else ch.mpCurrent=cur;
  const bar = document.getElementById(type+'Bar');
  if (bar) bar.style.width = Math.min(100,(cur/max)*100)+'%';
}

function changeVital(type, action) {
  const ch = characters[activeCharIdx];
  const amt = Math.abs(parseInt(document.getElementById(type+'Change').value)||0);
  if (!amt) return;
  const cur = type==='hp'?ch.hpCurrent:ch.mpCurrent;
  const max = type==='hp'?ch.hpMax:ch.mpMax;
  const newVal = action==='heal'?Math.min(max,cur+amt):Math.max(0,cur-amt);
  if (type==='hp') ch.hpCurrent=newVal; else ch.mpCurrent=newVal;
  document.getElementById(type+'Current').value=newVal;
  document.getElementById(type+'Change').value='';
  updateBar(type);
  scheduleAutoSave();
}

// ================================================================
// LEVEL UP / UNDO
// ================================================================
// Returns array of all tiers that are unlocked (classLevel >= tier) but have no selection yet
function getPendingSystemSkillTiers(ch) {
  const pending = [];
  const maxTier = Math.min(Math.floor(ch.classLevel / 5) * 5, 100);
  for (let t = 5; t <= maxTier; t += 5) {
    if (!ch.selectedSystemSkills.find(s => s.tier === t)) {
      pending.push(t);
    }
  }
  return pending;
}


function levelUp() {
  const ch = characters[activeCharIdx];
  // Save snapshot for undo
  const snap = JSON.parse(JSON.stringify({
    classLevel:ch.classLevel, raceLevel:ch.raceLevel,
    stats: JSON.parse(JSON.stringify(ch.stats)),
    totalFPEarned:ch.totalFPEarned,
    hpMax:ch.hpMax, mpMax:ch.mpMax, ac:ch.ac,
  }));
  ch.levelHistory.push(snap);

  ch.classLevel++;
  // Apply class bonuses to classBonus component
  for (const [stat, bonus] of Object.entries(CLASS_BONUSES)) {
    ch.stats[stat].classBonus = (ch.stats[stat].classBonus||0)+bonus;
  }

  // Race level every 2 class levels
  if (ch.classLevel%2===0) {
    ch.raceLevel++;
    for (const stat of STAT_KEYS) {
      ch.stats[stat].raceBonus = (ch.stats[stat].raceBonus||0)+RACE_BONUSES_ALL;
    }
    renderSoulBound();
    // Detect rank transition — apply one-time rank bonus
    const newGrade = getRaceGrade(ch);
    if (!ch.raceBonusesApplied) ch.raceBonusesApplied = [];
    if (!ch.raceBonusesApplied.includes(newGrade)) {
      ch.raceBonusesApplied.push(newGrade);
      if (!ch.selectedRaceId) {
        const bonus = humanRankBonuses[newGrade] || {};
        STAT_KEYS.forEach(function(k){ ch.stats[k].raceBonus = (ch.stats[k].raceBonus||0) + (bonus[k]||0); });
      } else {
        const bankRace = dmBank.find(function(b){ return b.id === ch.selectedRaceId; });
        if (bankRace && bankRace.rankStats) {
          const rankLetter = newGrade.replace(/^.*\(([^)]+)\)$/, '$1');
          const bonus = (bankRace.rankStats||{})[rankLetter] || {};
          STAT_KEYS.forEach(function(k){ ch.stats[k].raceBonus = (ch.stats[k].raceBonus||0) + (bonus[k]||0); });
        }
      }
    }
    // At raceLevel 200 — trigger Race Evolution selection
    if (ch.raceLevel === 200 && !ch.selectedRaceId) {
      setTimeout(function(){ openRaceSelectionModal(); }, 400);
    }
  }

  // Recalculate total FP earned using scaling formula
  ch.totalFPEarned = calcTotalFPEarned(ch.classLevel, ch.raceLevel);

  // Recalc HP/MP/AC using formulas
  recalcVitals(ch);

  document.getElementById('hClassLvl').textContent = ch.classLevel;
  document.getElementById('hRaceLvl').textContent = ch.raceLevel;

  addLog('Level Up!', `Class Lvl ${ch.classLevel}`, ch.classLevel, ch.classLevel);
  renderSheet();
  scheduleAutoSave();

  // Check for system skill notification
  const pendingTiers = getPendingSystemSkillTiers(ch);
  if (pendingTiers.length > 0) {
    const newest = pendingTiers[pendingTiers.length - 1];
    // At level 10+, show modal prompting player to add their 5 skill options
    // At level 5, options are pre-loaded (SYSTEM_SKILLS[5]) so just notify
    if (newest >= 10) {
      setTimeout(() => {
        openModal(`⚡ System Skill Unlocked — Level ${newest}`, `
          <div style="text-align:center;margin-bottom:16px">
            <div style="font-family:'Cinzel',serif;font-size:1.1rem;color:var(--accent2);margin-bottom:8px">Class Level ${newest} Reached!</div>
            <div style="color:var(--text2);font-size:0.88rem;line-height:1.6">You may now select <strong>1 System Skill</strong> from your available options.<br/>
            Add up to 5 skill options for this tier, then choose one.</div>
          </div>
          <div style="background:var(--bg4);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:16px;font-size:0.82rem;color:var(--text3)">
            ℹ️ System Skill options for each level are unique to each player and session. Add the 5 options provided by your game master, then pick one.
          </div>
          <div style="display:flex;gap:8px">
              <button class="btn btn-gold" style="flex:2" onclick="closeModal();switchTab('systemSkills',document.querySelector('[onclick*=systemSkills]'));setTimeout(()=>openAddSystemSkillOption(${newest}),150)">
                + Add Skill Options for Level ${newest}
              </button>
            <button class="btn" style="flex:1" onclick="closeModal()">Later</button>
          </div>
        `);
      }, 200);
    } else {
      addLog('System Skill Available!', `Choose your Lvl ${newest} skill in the System Skills tab`, newest, newest);
    }
  }
}

function undoLevelUp() {
  const ch = characters[activeCharIdx];
  if (!ch.levelHistory || ch.levelHistory.length===0) return;
  const snap = ch.levelHistory.pop();
  ch.classLevel = snap.classLevel;
  ch.raceLevel = snap.raceLevel;
  ch.stats = snap.stats;
  ch.totalFPEarned = snap.totalFPEarned;
  ch.hpMax = snap.hpMax;
  ch.mpMax = snap.mpMax;
  if (snap.ac !== undefined) ch.ac = snap.ac;
  addLog('Level Up Undone', `Reverted to Class Lvl ${ch.classLevel}`, ch.classLevel, ch.classLevel);
  renderSheet();
  scheduleAutoSave();
}

function renderAllSkillLists() {
  renderSkillList('titles');
  renderSkillList('raceSkills');
  renderSkillList('classSkills');
  renderSkillList('profSkills');
  const profTab = document.getElementById('tab-professions');
  if (profTab && profTab.classList.contains('active')) {
    renderProfessionTab(characters[activeCharIdx]);
  }
}

function renderSkillList(listKey) {
  const ch = characters[activeCharIdx];
  const el = document.getElementById(listKey+'List');
  if (!el) return;
  el.innerHTML = '';
  const items = ch[listKey];
  if (!items||items.length===0) {
    el.innerHTML = '<div style="color:var(--text3);font-size:0.83rem;padding:4px">None added yet.</div>';
    return;
  }
  items.forEach(skill => el.appendChild(buildSkillCard(skill, listKey)));
  makeDraggable(el, listKey, function() { renderSkillList(listKey); });
}

function buildSkillCard(skill, listKey) {
  const div = document.createElement('div');
  div.className='skill-item'+(skill.isAttack?' attack-skill':'')+(skill.isGrowth?' growth-skill':'')+(skill.isSoulBound?' soulbound-skill':'');
  const tags = [];
  if (skill.isAttack) tags.push('<span class="skill-tag tag-attack">Attack</span>');
  if (skill.isGrowth) tags.push('<span class="skill-tag tag-growth">Growth</span>');
  if (skill.isSoulBound) tags.push('<span class="skill-tag tag-soulbound">Soul Bound</span>');
  if (skill.isUnique) tags.push('<span class="skill-tag tag-unique">Unique</span>');
  if (skill.statAdj && skill.statBonuses) {
    const bonusStrs = Object.entries(skill.statBonuses).filter(([,v])=>v>0).map(([k,v])=>`+${v} ${STAT_ABBR[k]||k}`);
    if (bonusStrs.length) tags.push(`<span class="skill-tag tag-growth">${bonusStrs.join(' ')}</span>`);
  }
  if (skill.sbSlotBonus) tags.push('<span class="skill-tag tag-soulbound">+SB Slot</span>');
  if (skill._sysSkillTier) tags.push('<span class="skill-tag" style="background:var(--theme-bg);color:var(--accent);border:1px solid var(--accent-dim);font-size:0.58rem">Sys Lvl ' + skill._sysSkillTier + '</span>');

  // Use single-quote wrapping for string IDs so onclick attrs don't break (JSON.stringify adds double quotes which close the HTML attr)
  const safeId = (typeof skill.id === 'string') ? ("'" + skill.id + "'") : skill.id;
  const attackBtns = skill.isAttack ? `
    <button class="to-hit-btn" onclick="rollToHit(${safeId},'${listKey}')">To Hit</button>
    <button class="attack-btn" onclick="rollSkillAttack(${safeId},'${listKey}')">Roll DMG</button>` : '';
  const growBtn = skill.isGrowth ? `<button class="btn btn-green btn-xs" onclick="growSkill(${safeId},'${listKey}')">Grow</button>` : '';

  div.draggable = true;
  div.innerHTML = `
    <div class="skill-row">
      <span class="drag-handle" title="Drag to reorder">⠿</span>
      <span class="skill-name" ${skill.isAttack?`onclick="rollSkillAttack(${safeId},'${listKey}')" style="cursor:pointer"`:''}><span class="skill-name-bracket">[</span>${escHtml(skill.name)}<span class="skill-name-bracket">]</span></span>
      <div class="skill-actions">${attackBtns}${growBtn}
        <button class="btn btn-sm" style="background:var(--bg4);color:var(--text3);border-color:var(--border)" onclick="editSkill(${safeId},'${listKey}')">✎</button>
        <button class="btn btn-red btn-xs" onclick="removeSkill(${safeId},'${listKey}')">✕</button>
      </div>
    </div>
    ${skill.detail?`<div class="skill-detail"><strong>${skill.detail}</strong></div>`:''}
    ${skill.desc?`<div class="skill-detail" style="margin-top:2px">${skill.desc}</div>`:''}
    ${tags.length?`<div class="skill-row" style="margin-top:4px">${tags.join(' ')}</div>`:''}
  `;
  return div;
}

let _addSkillTarget = null, _editSkillId = null;

function openAddSkillModal(listKey, skillId) {
  _addSkillTarget = listKey;
  _editSkillId = skillId||null;
  const ch = characters[activeCharIdx];
  const ex = skillId ? ch[listKey].find(s=>s.id===skillId) : null;
  const labels = {titles:'Title',raceSkills:'Race Skill',classSkills:'Class Skill',profSkills:'Profession Skill'};
  openModal((skillId?'Edit':'Add')+' '+labels[listKey], buildSkillForm(ex));
  if (ex) {
    setChecked('asIsAttack', ex.isAttack);
    setChecked('asIsGrowth', ex.isGrowth);
    setChecked('asIsSoulBound', ex.isSoulBound);
    setChecked('asStatAdj', ex.statAdj);
    setChecked('asSbSlot', ex.sbSlotBonus);
    setChecked('asVitalEffect', !!ex.vitalEffect);
    toggleAttackOpts();
    toggleStatAdj();
    toggleVitalEffect();
    if (ex.isAttack) {
      setVal('asAtkDice', ex.attackDice||20);
      setVal('asAtkCount', ex.attackCount||1);
      setVal('asAtkStat', ex.attackStat||'');
      setVal('asAtkCost', ex.attackCost||0);
      setVal('asAtkCostType', ex.attackCostType||'mp');
    }
    if (ex.statAdj && ex.statBonuses) {
      for (const [k,v] of Object.entries(ex.statBonuses)) {
        const el = document.getElementById('statAdj_'+k);
        if (el) el.value=v;
      }
    }
    if (ex.vitalEffect) {
      for (const type of ['hp','mp','ac']) {
        const ve = ex.vitalEffect;
        setVal(`ve_${type}_flat`, ve[type+'Flat']||0);
        setVal(`ve_${type}_statBase`, ve[type+'StatBase']||'');
        setVal(`ve_${type}_statMod`, ve[type+'StatMod']||'');
      }
    }
  }
}

function saveSkill() {
  const ch = characters[activeCharIdx];
  const name = getVal('asName').trim();
  if (!name) { alert('Please enter a skill name.'); return; }
  const isAttack = isChecked('asIsAttack');
  const statAdj = isChecked('asStatAdj');
  const sbSlotBonus = isChecked('asSbSlot');
  const hasVitalEffect = isChecked('asVitalEffect');
  let statBonuses = {};
  if (statAdj) {
    for (const k of STAT_KEYS) {
      const v = parseInt(document.getElementById('statAdj_'+k)?.value)||0;
      if (v) statBonuses[k]=v;
    }
  }
  let vitalEffect = null;
  if (hasVitalEffect) {
    vitalEffect = {};
    for (const type of ['hp','mp','ac']) {
      const flat = parseInt(document.getElementById(`ve_${type}_flat`)?.value)||0;
      const statBase = document.getElementById(`ve_${type}_statBase`)?.value||'';
      const statMod = document.getElementById(`ve_${type}_statMod`)?.value||'';
      if (flat) vitalEffect[type+'Flat'] = flat;
      if (statBase) vitalEffect[type+'StatBase'] = statBase;
      if (statMod) vitalEffect[type+'StatMod'] = statMod;
    }
  }
  const skill = {
    id: _editSkillId || ch.nextId++,
    name, detail:getVal('asDetail').trim(),
    desc: getVal('asDesc').trim(),
    isAttack, isGrowth:isChecked('asIsGrowth'),
    isSoulBound:isChecked('asIsSoulBound'),
    isUnique:false, statAdj, statBonuses, sbSlotBonus,
    vitalEffect,
    growthHistory:[],
  };
  // Preserve _sysSkillTier if editing an existing class skill that came from a system skill
  if (_editSkillId) {
    const prevSkill = ch[_addSkillTarget] ? ch[_addSkillTarget].find(function(s) { return s.id === _editSkillId; }) : null;
    if (prevSkill && prevSkill._sysSkillTier) skill._sysSkillTier = prevSkill._sysSkillTier;
    if (prevSkill && prevSkill.growthHistory) skill.growthHistory = prevSkill.growthHistory;
  }
  if (isAttack) {
    skill.attackDice=parseInt(getVal('asAtkDice'))||20;
    skill.attackCount=parseInt(getVal('asAtkCount'))||1;
    skill.attackStat=getVal('asAtkStat')||null;
    skill.attackCost=parseInt(getVal('asAtkCost'))||0;
    skill.attackCostType=getVal('asAtkCostType');
  }
  // Apply stat bonuses to titleBonus if it's a title
  if (statAdj && Object.keys(statBonuses).length) {
    applySkillStatBonuses(skill, _editSkillId ? 'edit' : 'add', _addSkillTarget);
  }
  if (_editSkillId) {
    const idx = ch[_addSkillTarget].findIndex(s=>s.id===_editSkillId);
    if (idx>=0) ch[_addSkillTarget][idx]=skill;

    // If this is a system-skill-originated class skill, sync the edit back to systemSkillOptions
    // so the System Skills tab shows the updated data
    if (_addSkillTarget === 'classSkills') {
      const allSSO = ch.systemSkillOptions || {};
      for (const t of Object.keys(allSSO)) {
        const ssoIdx = allSSO[t].findIndex(function(s) { return s.id === _editSkillId; });
        if (ssoIdx !== -1) {
          // Update the source option with the new name/desc/rarity/attack data
          const orig = allSSO[t][ssoIdx];
          allSSO[t][ssoIdx] = Object.assign({}, orig, {
            name: skill.name, desc: skill.desc, detail: skill.detail,
            isAttack: skill.isAttack, isGrowth: skill.isGrowth,
            rarity: skill.detail || orig.rarity,
            attackDice: skill.attackDice, attackCount: skill.attackCount,
            attackStat: skill.attackStat, attackCost: skill.attackCost,
            attackCostType: skill.attackCostType,
          });
          // Also update the selectedSystemSkills record
          const selIdx = ch.selectedSystemSkills.findIndex(function(s) { return s.id === _editSkillId; });
          if (selIdx !== -1) {
            ch.selectedSystemSkills[selIdx] = Object.assign({}, ch.selectedSystemSkills[selIdx], {
              name: skill.name, desc: skill.desc
            });
          }
          break;
        }
      }
    }
  } else {
    ch[_addSkillTarget].push(skill);
  }
  // Soul Bound slot bonus
  if (sbSlotBonus && !_editSkillId) ch.extraSoulBoundSlots = (ch.extraSoulBoundSlots||0)+1;
  // Recalc vitals in case this skill affects HP/MP/AC
  recalcVitals(ch);
  // Update header badges
  const acEl=document.getElementById('hAC'); if(acEl) acEl.textContent=ch.ac;
  renderSkillList(_addSkillTarget);
  renderSoulBound();
  // If editing a class skill that came from a system skill, refresh System Skills tab too
  if (_editSkillId && _addSkillTarget === 'classSkills') {
    renderSystemSkills();
  }
  closeModal();
  scheduleAutoSave();
}

function applySkillStatBonuses(skill, mode, listKey) {
  const ch = characters[activeCharIdx];
  for (const [stat, bonus] of Object.entries(skill.statBonuses||{})) {
    if (listKey==='titles') ch.stats[stat].titleBonus = (ch.stats[stat].titleBonus||0)+bonus;
    else ch.stats[stat].rewardBonus = (ch.stats[stat].rewardBonus||0)+bonus;
  }
  renderStats();
}

function editSkill(id, listKey) { openAddSkillModal(listKey, id); }

function removeSkill(id, listKey) {
  const ch = characters[activeCharIdx];
  const skill = ch[listKey].find(s=>s.id===id);
  if (!skill) return;
  if (skill.sbSlotBonus) ch.extraSoulBoundSlots = Math.max(0,(ch.extraSoulBoundSlots||0)-1);
  ch[listKey] = ch[listKey].filter(s=>s.id!==id);
  // If this class skill came from a system skill selection, clear that selection too
  // so the System Skills tab shows the tier as pending again
  if (listKey === 'classSkills') {
    const wasSysSkill = ch.selectedSystemSkills.find(function(s) { return s.id === id; });
    if (wasSysSkill) {
      ch.selectedSystemSkills = ch.selectedSystemSkills.filter(function(s) { return s.id !== id; });
      renderSystemSkills();
      renderAllTabs();
    }
  }
  renderSkillList(listKey);
  renderSoulBound();
  scheduleAutoSave();
}

// ================================================================
// GROW SKILL
// ================================================================
function growSkill(id, listKey) {
  const ch = characters[activeCharIdx];
  const skill = ch[listKey].find(s=>s.id===id);
  if (!skill) return;
  const safeId = (typeof id === 'string') ? ("'" + id + "'") : id;
  const atkFields = skill.isAttack ? `
    <div style="margin:10px 0 4px;font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.1em;color:var(--gold-dim);text-transform:uppercase">Attack Properties</div>
    <div class="form-row" style="margin-bottom:8px">
      <div class="form-field"><label class="form-label">Dmg Dice</label>
        <select class="form-select" id="gAtkDice">${[4,6,8,10,12,20,100].map(d=>`<option value="${d}" ${(skill.attackDice||20)===d?'selected':''}>D${d}</option>`).join('')}</select>
      </div>
      <div class="form-field"><label class="form-label"># Dice</label>
        <input class="form-input" id="gAtkCount" type="number" value="${skill.attackCount||1}" min="1"/>
      </div>
      <div class="form-field"><label class="form-label">Cost</label>
        <input class="form-input" id="gAtkCost" type="number" value="${skill.attackCost||0}" min="0"/>
      </div>
      <div class="form-field"><label class="form-label">Cost Type</label>
        <select class="form-select" id="gAtkCostType">${['mp','hp','none'].map(t=>`<option value="${t}" ${(skill.attackCostType||'none')===t?'selected':''}>${t.toUpperCase()}</option>`).join('')}</select>
      </div>
    </div>` : '';
  openModal(`Grow: [${skill.name}]`, `
    <div style="margin-bottom:10px;color:var(--text3);font-size:0.83rem">Record a growth event. Changes are saved to the Growth Log.</div>
    <div class="form-field" style="margin-bottom:8px"><label class="form-label">Skill Name (rename on growth)</label><input class="form-input" id="gName" value="${escHtml(skill.name)}"/></div>
    <div class="form-field" style="margin-bottom:8px"><label class="form-label">Updated Detail</label><input class="form-input" id="gDetail" value="${escHtml(skill.detail||'')}"/></div>
    <div class="form-field" style="margin-bottom:8px"><label class="form-label">Updated Description</label><textarea class="form-textarea" id="gDesc">${escHtml(skill.desc||'')}</textarea></div>
    ${atkFields}
    <div class="form-field" style="margin-bottom:12px"><label class="form-label">What Changed?</label><input class="form-input" id="gNotes" placeholder="e.g. Unlocked secondary fire..."/></div>
    <button class="btn btn-green" style="width:100%" onclick="commitGrowth(${safeId},'${listKey}')">Commit Growth</button>
  `);
}

function commitGrowth(id, listKey) {
  const ch = characters[activeCharIdx];
  const skill = ch[listKey].find(s=>s.id===id);
  if (!skill) return;
  const previousName = skill.name;
  const newName = getVal('gName').trim() || skill.name;
  // Capture attack property changes if applicable
  let attackChanges = null;
  if (skill.isAttack) {
    const oldAtk = { dice: skill.attackDice||20, count: skill.attackCount||1, cost: skill.attackCost||0, costType: skill.attackCostType||'none' };
    const newDice = parseInt(getVal('gAtkDice')) || oldAtk.dice;
    const newCount = parseInt(getVal('gAtkCount')) || oldAtk.count;
    const newCost = parseInt(getVal('gAtkCost')) || 0;
    const newCostType = getVal('gAtkCostType') || oldAtk.costType;
    if (newDice !== oldAtk.dice || newCount !== oldAtk.count || newCost !== oldAtk.cost || newCostType !== oldAtk.costType) {
      attackChanges = { old: oldAtk, new: { dice: newDice, count: newCount, cost: newCost, costType: newCostType } };
    }
    skill.attackDice = parseInt(getVal('gAtkDice')) || skill.attackDice;
    skill.attackCount = parseInt(getVal('gAtkCount')) || skill.attackCount;
    skill.attackCost = parseInt(getVal('gAtkCost')) || 0;
    skill.attackCostType = getVal('gAtkCostType') || skill.attackCostType;
  }
  skill.name = newName;
  skill.detail = getVal('gDetail');
  skill.desc = getVal('gDesc');
  if (!skill.growthHistory) skill.growthHistory = [];
  skill.growthHistory.push({ previousName, newName, date: new Date().toLocaleDateString(), notes: getVal('gNotes'), attackChanges });
  if (!ch.growthLog) ch.growthLog = [];
  ch.growthLog.push({
    skillId: id,
    skillName: newName,
    previousName: previousName !== newName ? previousName : null,
    date: new Date().toLocaleString(),
    notes: getVal('gNotes'),
    newDetail: getVal('gDetail'),
    type: 'growth',
    attackChanges,
  });
  renderSkillList(listKey);
  renderGrowthLog();
  closeModal();
  scheduleAutoSave();
}

function findSkillById(ch, skillId) {
  for (const lk of ['titles','raceSkills','classSkills','profSkills']) {
    const s = (ch[lk]||[]).find(function(s){ return s.id === skillId; });
    if (s) return s;
  }
  return null;
}

function _buildGrowthEventDiv(ev) {
  const typeTag = ev.type === 'new'
    ? '<span style="font-size:0.62rem;background:var(--green2);color:#fff;padding:1px 6px;border-radius:8px;margin-right:6px">New</span>'
    : '<span style="font-size:0.62rem;background:var(--blue2);color:#fff;padding:1px 6px;border-radius:8px;margin-right:6px">Growth</span>';
  const renameNote = ev.previousName
    ? `<div style="font-size:0.75rem;color:var(--text3);margin-top:3px">Renamed: <em>${escHtml(ev.previousName)}</em> → <strong>${escHtml(ev.skillName)}</strong></div>`
    : '';
  let atkDiff = '';
  if (ev.attackChanges) {
    const o = ev.attackChanges.old, n = ev.attackChanges.new;
    const parts = [];
    if (o.dice !== n.dice) parts.push(`Dice: d${o.dice} → d${n.dice}`);
    if (o.count !== n.count) parts.push(`Count: ${o.count} → ${n.count}`);
    const costLabel = function(c, t) { return t === 'none' ? 'None' : c + t.toUpperCase(); };
    if (o.cost !== n.cost || o.costType !== n.costType) parts.push(`Cost: ${costLabel(o.cost,o.costType)} → ${costLabel(n.cost,n.costType)}`);
    if (parts.length) atkDiff = `<div style="font-size:0.72rem;color:var(--accent);margin-top:4px;display:flex;flex-wrap:wrap;gap:6px">${parts.map(p=>`<span style="background:var(--theme-bg);border:1px solid var(--accent-dim);border-radius:4px;padding:1px 6px">${escHtml(p)}</span>`).join('')}</div>`;
  }
  const d = document.createElement('div');
  d.className = 'growth-event';
  d.style.cssText = 'margin:6px 0;border-left:2px solid var(--border);padding-left:10px;padding-top:4px;padding-bottom:4px';
  d.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px">
      <span>${typeTag}<span class="growth-event-date" style="margin-left:0">${ev.date}</span></span>
    </div>
    ${ev.notes ? `<div style="font-size:0.82rem;color:var(--text2);margin-top:3px"><em>${escHtml(ev.notes)}</em></div>` : ''}
    ${ev.newDetail ? `<div style="font-size:0.78rem;color:var(--text3);margin-top:2px">${escHtml(ev.newDetail)}</div>` : ''}
    ${renameNote}${atkDiff}`;
  return d;
}

function renderGrowthLog() {
  const ch = characters[activeCharIdx];
  const el = document.getElementById('growthHistory');
  if (!el) return;
  if (!ch.growthLog || ch.growthLog.length === 0) {
    el.innerHTML = '<div style="color:var(--text3);font-size:0.83rem">Growth events will appear here.</div>';
    return;
  }
  el.innerHTML = '';

  // Partition: events with skillId go into groups, legacy events (no skillId) go flat
  const groups = new Map(); // skillId → { events: [], rootName: string, lastDate: string }
  const legacyEvents = [];
  ch.growthLog.forEach(function(ev) {
    if (ev.skillId) {
      if (!groups.has(ev.skillId)) {
        groups.set(ev.skillId, { events: [], rootName: ev.rootSkillName || ev.skillName, lastDate: ev.date });
      }
      const g = groups.get(ev.skillId);
      g.events.push(ev);
      g.lastDate = ev.date; // last event date
    } else {
      legacyEvents.push(ev);
    }
  });

  // Sort groups by last event date descending (most recent first)
  const sortedGroups = Array.from(groups.entries()).sort(function(a, b) {
    return new Date(b[1].lastDate) - new Date(a[1].lastDate);
  });

  sortedGroups.forEach(function(entry) {
    const skillId = entry[0], group = entry[1];
    const currentSkill = findSkillById(ch, skillId);
    const displayName = currentSkill ? currentSkill.name : (group.events[group.events.length - 1].skillName);
    const rootName = group.rootName;

    const container = document.createElement('div');
    container.style.cssText = 'border:1px solid var(--border);border-radius:6px;margin-bottom:10px;overflow:hidden';

    const hdr = document.createElement('div');
    hdr.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--bg3);cursor:pointer;user-select:none';
    const rootNote = (rootName && rootName !== displayName) ? `<span style="font-size:0.68rem;color:var(--text3);margin-left:8px">was: ${escHtml(rootName)}</span>` : '';
    const countBadge = `<span style="font-size:0.62rem;color:var(--text3);margin-left:8px">${group.events.length} event${group.events.length !== 1 ? 's' : ''}</span>`;
    hdr.innerHTML = `
      <div style="display:flex;align-items:center;flex-wrap:wrap;gap:0">
        <span class="growth-event-name" style="font-size:0.82rem">[${escHtml(displayName)}]</span>${rootNote}${countBadge}
      </div>
      <span style="font-size:0.75rem;color:var(--text3)">▾</span>`;

    const body = document.createElement('div');
    body.style.cssText = 'display:none;padding:8px 12px 10px';
    group.events.forEach(function(ev) { body.appendChild(_buildGrowthEventDiv(ev)); });

    hdr.addEventListener('click', function() {
      const isOpen = body.style.display !== 'none';
      body.style.display = isOpen ? 'none' : 'block';
      hdr.querySelector('span:last-child').textContent = isOpen ? '▾' : '▴';
    });

    container.appendChild(hdr);
    container.appendChild(body);
    el.appendChild(container);
  });

  // Legacy events (no skillId) — flat list at bottom
  if (legacyEvents.length > 0) {
    const legacyWrap = document.createElement('div');
    legacyWrap.style.cssText = 'border:1px solid var(--border);border-radius:6px;margin-bottom:10px;overflow:hidden;opacity:0.8';
    const legacyHdr = document.createElement('div');
    legacyHdr.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--bg3);cursor:pointer;user-select:none';
    legacyHdr.innerHTML = `<span style="font-family:\'Cinzel\',serif;font-size:0.62rem;letter-spacing:0.08em;color:var(--text3)">EARLIER EVENTS (${legacyEvents.length})</span><span style="font-size:0.75rem;color:var(--text3)">▾</span>`;
    const legacyBody = document.createElement('div');
    legacyBody.style.cssText = 'display:none;padding:8px 12px 10px';
    legacyEvents.slice().reverse().forEach(function(ev) { legacyBody.appendChild(_buildGrowthEventDiv(ev)); });
    legacyHdr.addEventListener('click', function() {
      const isOpen = legacyBody.style.display !== 'none';
      legacyBody.style.display = isOpen ? 'none' : 'block';
      legacyHdr.querySelector('span:last-child').textContent = isOpen ? '▾' : '▴';
    });
    legacyWrap.appendChild(legacyHdr);
    legacyWrap.appendChild(legacyBody);
    el.appendChild(legacyWrap);
  }
}

// ================================================================
// SYSTEM SKILLS
// ================================================================
function renderSystemSkills() {
  const ch = characters[activeCharIdx];
  const el = document.getElementById('systemSkillsContent');
  if (!el) return;
  el.innerHTML = '';

  const maxTier = Math.min(Math.floor(ch.classLevel / 5) * 5, 100);

  if (maxTier < 5) {
    el.innerHTML = '<div style="color:var(--text3);font-size:0.83rem;padding:4px">System Skill selections become available at Class Level 5.</div>';
    return;
  }

  // Map of skillId -> tier at which it was selected
  const selectionMap = {};
  ch.selectedSystemSkills.forEach(function(s) { selectionMap[s.id] = s.tier; });

  for (let tier = 5; tier <= maxTier; tier += 5) {
    const selection = ch.selectedSystemSkills.find(function(s) { return s.tier === tier; });
    const isPending = !selection;

    // Tier-specific options (added explicitly for this tier via "+ Add Option")
    const tierOwned = (ch.systemSkillOptions && ch.systemSkillOptions[tier]) ? [...ch.systemSkillOptions[tier]] : [];

    // Carry-over pool: skills from EARLIER tiers that were NOT selected
    // These appear as additional choices but are NOT part of tierOwned (not editable/deletable at this tier)
    const carryOver = [];
    if (tier > 5) {
      for (let prevTier = 5; prevTier < tier; prevTier += 5) {
        const prevOwned = (ch.systemSkillOptions && ch.systemSkillOptions[prevTier]) ? ch.systemSkillOptions[prevTier] : [];
        prevOwned.forEach(function(sk) {
          // Include if: not yet selected at any tier, OR selected at THIS tier (show checkmark)
          const selectedAtTier = selectionMap[sk.id];
          if (!selectedAtTier || selectedAtTier === tier) {
            // Don't duplicate if already in tierOwned
            if (!tierOwned.find(function(o) { return o.id === sk.id; })) {
              carryOver.push({...sk, _fromTier: prevTier});
            }
          }
        });
      }
    }

    // Section container
    const section = document.createElement('div');
    section.style.cssText = 'margin-bottom:20px;border:1px solid ' + (isPending ? 'var(--accent-dim)' : 'var(--border)') + ';border-radius:6px;overflow:hidden';

    // Section header
    const hdr = document.createElement('div');
    hdr.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:' + (isPending ? 'var(--theme-bg)' : 'var(--bg4)') + ';border-bottom:1px solid var(--border)';
    const hdrLeft = document.createElement('span');
    hdrLeft.style.cssText = 'font-family:Cinzel,serif;font-size:0.72rem;letter-spacing:0.1em;color:' + (isPending ? 'var(--accent)' : 'var(--text3)');
    hdrLeft.textContent = (isPending ? '⚡ ' : '✓ ') + 'CLASS LEVEL ' + tier + ' — SYSTEM SKILL';
    if (isPending) {
      const badge = document.createElement('span');
      badge.style.cssText = 'font-size:0.62rem;color:var(--accent-dim);margin-left:6px';
      badge.textContent = '(Choose 1)';
      hdrLeft.appendChild(badge);
    }
    hdr.appendChild(hdrLeft);
    const addBtn = document.createElement('button');
    addBtn.className = 'btn btn-sm';
    addBtn.style.cssText = 'background:var(--bg4);color:var(--text3);border-color:var(--border);font-size:0.58rem';
    addBtn.textContent = '+ Add Option';
    addBtn.onclick = (function(t) { return function() { openAddSystemSkillOption(t); }; })(tier);
    hdr.appendChild(addBtn);
    section.appendChild(hdr);

    const listEl = document.createElement('div');
    listEl.style.cssText = 'padding:8px;display:flex;flex-direction:column;gap:6px';

    // Helper: build a skill card for display
    function buildSysCard(sk, fromTier) {
      const isSelected = !!(selection && selection.id === sk.id);
      const isGreyed = !isPending && !isSelected;
      const isCarryOver = !!fromTier; // came from an earlier tier's pool, not this tier's owned list

      const card = document.createElement('div');
      card.className = 'sys-skill-card' + (isSelected ? ' selected' : '');
      if (isGreyed) card.style.opacity = '0.4';

      // Checkbox
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.className = 'sys-skill-checkbox';
      cb.checked = isSelected;
      cb.onchange = (function(sid, t) { return function() { selectSystemSkill(sid, t, this.checked); }; })(sk.id, tier);
      card.appendChild(cb);

      // Info block
      const info = document.createElement('div');
      info.className = 'sys-skill-info';

      const nameRow = document.createElement('div');
      nameRow.style.cssText = 'display:flex;align-items:center;gap:6px;flex-wrap:wrap';
      const nameEl = document.createElement('span');
      nameEl.className = 'sys-skill-name';
      nameEl.style.margin = '0';
      nameEl.textContent = sk.name;
      nameRow.appendChild(nameEl);

      if (isSelected) {
        const selBadge = document.createElement('span');
        selBadge.style.cssText = 'color:var(--green2);font-size:0.68rem;font-family:Cinzel,serif;white-space:nowrap';
        selBadge.textContent = '✓ Selected — Level ' + tier;
        nameRow.appendChild(selBadge);
      }
      if (isCarryOver) {
        const coBadge = document.createElement('span');
        coBadge.style.cssText = 'color:var(--text3);font-size:0.62rem;font-style:italic';
        coBadge.textContent = '(from Lvl ' + fromTier + ')';
        nameRow.appendChild(coBadge);
      }
      info.appendChild(nameRow);

      if (sk.desc) {
        const descEl = document.createElement('div');
        descEl.className = 'sys-skill-desc';
        descEl.innerHTML = escHtml(sk.desc).replace(/\n/g, '<br/>');
        info.appendChild(descEl);
      }

      const tagsEl = document.createElement('div');
      tagsEl.className = 'sys-skill-tags';
      if (sk.rarity) {
        const rc = sk.rarity === 'rare' ? 'rarity-rare' : sk.rarity === 'uncommon' ? 'rarity-uncommon' : sk.rarity === 'passive' ? 'rarity-growth' : 'rarity-common';
        const rt = document.createElement('span');
        rt.className = 'sys-skill-rarity ' + rc;
        rt.textContent = sk.rarity;
        tagsEl.appendChild(rt);
      }
      if (sk.isGrowth) { const t2=document.createElement('span'); t2.className='skill-tag tag-growth'; t2.textContent='Growth'; tagsEl.appendChild(t2); }
      if (sk.isAttack) { const t2=document.createElement('span'); t2.className='skill-tag tag-attack'; t2.textContent='Attack'; tagsEl.appendChild(t2); }
      info.appendChild(tagsEl);
      card.appendChild(info);

      // Edit + Delete buttons
      // Carry-over skills: edit/delete routes back to their origin tier
      const editTier = isCarryOver ? fromTier : tier;
      const actions = document.createElement('div');
      actions.style.cssText = 'display:flex;flex-direction:column;gap:4px;margin-left:auto;align-self:flex-start;flex-shrink:0';
      const editBtn2 = document.createElement('button');
      editBtn2.className = 'btn btn-sm';
      editBtn2.style.cssText = 'background:var(--bg4);color:var(--text3);border-color:var(--border);font-size:0.58rem';
      editBtn2.textContent = '✎';
      editBtn2.title = 'Edit skill option';
      editBtn2.onclick = (function(et, sid) { return function() { editSystemSkillOption(et, sid); }; })(editTier, sk.id);
      actions.appendChild(editBtn2);
      const delBtn2 = document.createElement('button');
      delBtn2.className = 'btn btn-red btn-xs';
      delBtn2.textContent = '✕';
      delBtn2.title = isCarryOver ? 'Delete from origin tier (Lvl ' + fromTier + ')' : 'Delete option';
      delBtn2.onclick = (function(et, sid) { return function() { confirmDeleteSystemSkillOption(et, sid); }; })(editTier, sk.id);
      actions.appendChild(delBtn2);
      card.appendChild(actions);
      return card;
    }

    // Render tier-owned options first
    if (tierOwned.length === 0 && carryOver.length === 0) {
      const empty = document.createElement('div');
      empty.style.cssText = 'color:var(--text3);font-size:0.8rem;padding:4px;font-style:italic';
      empty.textContent = 'No options yet. Click "+ Add Option" to add skill choices for this level.';
      listEl.appendChild(empty);
    } else {
      if (tierOwned.length > 0) {
        tierOwned.forEach(function(sk) { listEl.appendChild(buildSysCard(sk, null)); });
      }
      // Carry-over section separator
      if (carryOver.length > 0) {
        if (tierOwned.length > 0) {
          const sep = document.createElement('div');
          sep.style.cssText = 'font-family:Cinzel,serif;font-size:0.6rem;letter-spacing:0.08em;color:var(--text3);padding:6px 2px 2px;border-top:1px solid var(--border);margin-top:4px';
          sep.textContent = 'AVAILABLE FROM PREVIOUS LEVELS';
          listEl.appendChild(sep);
        }
        carryOver.forEach(function(sk) { listEl.appendChild(buildSysCard(sk, sk._fromTier)); });
      }
    }

    section.appendChild(listEl);
    el.appendChild(section);
  }

  _updateSystemSkillBanner(ch);
}

// Update the header notification banner and tab dot without full re-render
function _updateSystemSkillBanner(ch) {
  const pending = getPendingSystemSkillTiers(ch);
  // Update banner
  const banner = document.getElementById('sysSkillBanner');
  if (banner) {
    if (pending.length > 0) {
      banner.style.display = '';
      banner.innerHTML = '&#9889; System Skill Selection' + (pending.length > 1 ? 's' : '') + ' available! Pending: <strong>' + pending.map(function(t){return 'Lvl '+t;}).join(', ') + '</strong>. Visit the <strong>System Skills</strong> tab to choose.';
    } else {
      banner.style.display = 'none';
    }
  }
  // Update tab dot
  const tabBtns = document.querySelectorAll('.tab-btn');
  tabBtns.forEach(function(btn) {
    if (btn.textContent.includes('System Skills') || btn.innerHTML.includes('System Skills')) {
      // Rebuild tab text
      const dot = document.getElementById('sysSkillTabDot');
      if (dot) dot.style.display = pending.length > 0 ? '' : 'none';
    }
  });
}

// ── Add / Edit system skill option ─────────────────────────────
function openAddSystemSkillOption(tier, existingId) {
  const ch = characters[activeCharIdx];
  const existing = existingId ? (ch.systemSkillOptions?.[tier] || []).find(s => s.id === existingId) : null;
  const isEdit = !!existing;
  openModal(`${isEdit ? 'Edit' : 'Add'} Skill Option — Level ${tier} System Skill`, `
    <div style="color:var(--text3);font-size:0.8rem;margin-bottom:10px">
      ${isEdit ? 'Edit this skill option.' : `Add a skill option for Class Level ${tier}. Works the same as adding a Class Skill.`}
    </div>
    <div class="form-field" style="margin-bottom:8px">

      <div class="form-row">
        <div class="form-field"><label class="form-label"># Dice</label><input class="form-input" id="ssoAtkCount" type="number" value="${existing?.attackCount||1}" min="1"/></div>
        <div class="form-field"><label class="form-label">Dice</label>
          <select class="form-select" id="ssoAtkDice">${[4,6,8,10,12,20,100].map(d=>`<option value="${d}" ${(existing?.attackDice||20)===d?'selected':''}>D${d}</option>`).join('')}</select>
        </div>
        <div class="form-field"><label class="form-label">Stat</label>
          <select class="form-select" id="ssoAtkStat">
            <option value="">None</option>

function editSystemSkillOption(tier, skillId) {
  const ch = characters[activeCharIdx];
  // If this skill is currently selected (i.e. it lives in classSkills), edit it there
  // so the full class skill editor opens with all fields populated.
  const isSelected = !!ch.selectedSystemSkills.find(function(s) { return s.id === skillId; });
  const inClassSkills = !!ch.classSkills.find(function(s) { return s.id === skillId; });
  if (isSelected && inClassSkills) {
    openAddSkillModal('classSkills', skillId);
  } else {
    openAddSystemSkillOption(tier, skillId);
  }
}

function toggleSsoAtk() {
  const el = document.getElementById('ssoAtkOpts');
  if (el) el.style.display = isChecked('ssoIsAttack') ? 'block' : 'none';
}

function saveSystemSkillOption(tier, existingId) {
  const ch = characters[activeCharIdx];
  const name = getVal('ssoName').trim();
  if (!name) { alert('Please enter a skill name.'); return; }
  if (!ch.systemSkillOptions) ch.systemSkillOptions = {};
  if (!ch.systemSkillOptions[tier]) ch.systemSkillOptions[tier] = [];
  const isAtk = isChecked('ssoIsAttack');
  const skData = {
    name,
    rarity: getVal('ssoRarity'),
    desc: getVal('ssoDesc').trim(),
    isGrowth: isChecked('ssoIsGrowth'),
    isAttack: isAtk,
    ...(isAtk ? {
      attackDice: parseInt(getVal('ssoAtkDice')) || 20,
      attackCount: parseInt(getVal('ssoAtkCount')) || 1,
      attackStat: getVal('ssoAtkStat') || null,
      attackCost: parseInt(getVal('ssoAtkCost')) || 0,
      attackCostType: getVal('ssoAtkCostType') || 'mp',
    } : {}),
  };

  if (existingId) {
    // Edit existing option in-place
    const idx = ch.systemSkillOptions[tier].findIndex(s => s.id === existingId);
    if (idx !== -1) {
      ch.systemSkillOptions[tier][idx] = { ...ch.systemSkillOptions[tier][idx], ...skData };
      // If this option is currently selected, sync the class skill entry too
      const sel = ch.selectedSystemSkills.find(s => s.tier === tier && s.id === existingId);
      if (sel) {
        Object.assign(sel, skData);
        const cs = ch.classSkills.find(s => s.id === existingId);
        if (cs) Object.assign(cs, { name: skData.name, desc: skData.desc, detail: skData.rarity || '' });
      }
    }
  } else {
    // New option
    ch.systemSkillOptions[tier].push({ id: 'sso_' + tier + '_' + Date.now(), ...skData });
  }

  closeModal();
  renderSystemSkills();
  renderSkillList('classSkills');
  scheduleAutoSave();
}

// Delete an option — always available, cascades if it was selected
function confirmDeleteSystemSkillOption(tier, skillId) {
  const ch = characters[activeCharIdx];
  const allOptions = ch.systemSkillOptions?.[tier] || [];
  const sk = allOptions.find(s => s.id === skillId);
  if (!sk) return;
  const isSelected = !!ch.selectedSystemSkills.find(s => s.tier === tier && s.id === skillId);
  const msg = isSelected
    ? `Delete "${sk.name}"? It is currently selected — this will also remove it from Class Skills.`
    : `Delete "${sk.name}" from Level ${tier} options?`;
  if (!confirm(msg)) return;
  deleteSystemSkillOption(tier, skillId);
}

function deleteSystemSkillOption(tier, skillId) {
  const ch = characters[activeCharIdx];
  if (ch.systemSkillOptions?.[tier]) {
    ch.systemSkillOptions[tier] = ch.systemSkillOptions[tier].filter(s => s.id !== skillId);
  }
  ch.selectedSystemSkills = ch.selectedSystemSkills.filter(s => !(s.tier === tier && s.id === skillId));
  ch.classSkills = ch.classSkills.filter(s => s.id !== skillId);
  renderSystemSkills();
  renderSkillList('classSkills');
  renderAllTabs();
  scheduleAutoSave();
}


function selectSystemSkill(skillId, tier, checked) {
  const ch = characters[activeCharIdx];

  // Search ALL tiers for the skill — carry-over skills live in a previous tier's options
  let sk = null;
  const allTiers = Object.keys(ch.systemSkillOptions || {}).map(Number).sort((a,b)=>a-b);
  for (const t of allTiers) {
    const found = (ch.systemSkillOptions[t] || []).find(function(s) { return s.id === skillId; });
    if (found) { sk = found; break; }
  }
  if (!sk) return;

  if (checked) {
    // Remove any prior selection for this tier from both selectedSystemSkills and classSkills
    const prior = ch.selectedSystemSkills.find(function(s) { return s.tier === tier; });
    if (prior) ch.classSkills = ch.classSkills.filter(function(s) { return s.id !== prior.id; });
    ch.selectedSystemSkills = ch.selectedSystemSkills.filter(function(s) { return s.tier !== tier; });
    ch.selectedSystemSkills.push(Object.assign({}, sk, { tier: tier }));

    // Add to classSkills as a full editable entry (with system skill tier tracked)
    if (!ch.classSkills.find(function(s) { return s.id === sk.id; })) {
      ch.classSkills.push({
        id: sk.id, name: sk.name, detail: sk.rarity || '', desc: sk.desc || '',
        isAttack: sk.isAttack || false, isGrowth: sk.isGrowth || false,
        isSoulBound: false, statAdj: false, sbSlotBonus: false,
        vitalEffect: null, _sysSkillTier: tier,
        attackDice: sk.attackDice || 20, attackCount: sk.attackCount || 1,
        attackStat: sk.attackStat || null, attackCost: sk.attackCost || 0,
        attackCostType: sk.attackCostType || 'none',
      });
    }

    // If this is a Growth skill, prompt whether it evolves an existing skill
    if (sk.isGrowth) {
      const allGrowthSkills = [];
      ['titles','raceSkills','classSkills','profSkills'].forEach(function(lk) {
        (ch[lk]||[]).forEach(function(s) {
          if (s.isGrowth && s.id !== sk.id) allGrowthSkills.push({ skill: s, listKey: lk });
        });
      });
      if (allGrowthSkills.length > 0) {
        _growthPickerData = {
          bankIdx: null, charIdx: activeCharIdx,
          skillRefs: allGrowthSkills.map(function(e) { return { id: e.skill.id, listKey: e.listKey, name: e.skill.name }; }),
          newSkillId: sk.id, newSkillDesc: sk.desc || '', newSkillName: sk.name, newSkillTier: tier,
        };
        renderSystemSkills();
        renderSkillList('classSkills');
        renderAllTabs();
        scheduleAutoSave();
        openModal('Growth Skill Selected \u2014 ' + escHtml(sk.name), `
          <div style="font-size:0.83rem;color:var(--text2);margin-bottom:14px">
            <strong>${escHtml(sk.name)}</strong> is a Growth Skill.<br/>
            Is this a brand new skill, or is it a growth stage of an existing skill?
          </div>
          <div style="display:flex;flex-direction:column;gap:10px">
            <div class="option-card" onclick="closeModal()" style="cursor:pointer">
              <div class="option-card-title">New Growth Skill</div>
              <div class="option-card-desc">Add <strong>${escHtml(sk.name)}</strong> as a fresh skill entry in Class Skills.</div>
            </div>
            <div class="option-card" onclick="closeModal();openSysSkillGrowthPicker()" style="cursor:pointer">
              <div class="option-card-title">Growth of Existing Skill</div>
              <div class="option-card-desc">This evolves a skill the character already has. The existing skill will be updated \u2014 <strong>${escHtml(sk.name)}</strong> won\u2019t be added as a separate entry.</div>
            </div>
          </div>
        `);
        return; // Rendering and saving already done above
      } else {
        // No existing growth skills — log as new
        if (!ch.growthLog) ch.growthLog = [];
        ch.growthLog.push({ skillName: sk.name, previousName: null, date: new Date().toLocaleDateString(), notes: '', newDetail: sk.desc||'', type: 'new' });
      }
    }
  } else {
    // Uncheck — clear selection and remove from class skills
    ch.selectedSystemSkills = ch.selectedSystemSkills.filter(function(s) {
      return !(s.id === skillId && s.tier === tier);
    });
    ch.classSkills = ch.classSkills.filter(function(s) { return s.id !== skillId; });
  }
  renderSystemSkills();
  renderSkillList('classSkills');
  renderAllTabs();
  scheduleAutoSave();
}

function openSysSkillGrowthPicker() {
  const { skillRefs, newSkillName } = _growthPickerData;
  const options = skillRefs.map(function(ref, i) {
    return '<option value="' + i + '">' + escHtml(ref.name) + ' (' + ref.listKey + ')</option>';
  }).join('');
  openModal('Grow Existing Skill \u2014 ' + escHtml(newSkillName), `
    <div style="font-size:0.83rem;color:var(--text2);margin-bottom:12px">
      Select the existing Growth Skill this is an evolution of, then update the name if needed.
    </div>
    <div class="form-field" style="margin-bottom:10px">
      <label class="form-label">Existing Growth Skill</label>
      <select class="form-select" id="ssgExistingSelect" onchange="updateSsgNamePreview(this.value)">${options}</select>
    </div>
    <div class="form-field" style="margin-bottom:10px">
      <label class="form-label">Updated Skill Name (can rename on growth)</label>
      <input class="form-input" id="ssgNewName" value="${escHtml(newSkillName)}" placeholder="New name after growth\u2026"/>
    </div>
    <div class="form-field" style="margin-bottom:14px">
      <label class="form-label">Growth Notes (optional)</label>
      <textarea class="form-textarea" id="ssgNotes" style="min-height:60px" placeholder="e.g. Evolved to Superior rank. Range extended to 50ft."></textarea>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn" style="flex:1" onclick="closeModal()">Cancel</button>
      <button class="btn btn-green" style="flex:2" onclick="applySystemSkillGrowth()">Apply Growth</button>
    </div>
  `);
}

function updateSsgNamePreview(selectedIdx) {
  const nameEl = document.getElementById('ssgNewName');
  const ref = _growthPickerData.skillRefs[parseInt(selectedIdx)];
  if (nameEl && ref) nameEl.value = ref.name;
}

function applySystemSkillGrowth() {
  const { charIdx, skillRefs, newSkillId, newSkillDesc, newSkillName, newSkillTier } = _growthPickerData;
  const ch = characters[charIdx];
  const selectEl = document.getElementById('ssgExistingSelect');
  const nameEl = document.getElementById('ssgNewName');
  const notesEl = document.getElementById('ssgNotes');
  if (!selectEl || !nameEl) return;
  const selectedIdx = parseInt(selectEl.value);
  const ref = skillRefs[selectedIdx];
  if (!ref) return;
  const newName = nameEl.value.trim() || newSkillName;
  const notes = notesEl ? notesEl.value.trim() : '';

  // Update the existing growth skill in place
  const skillList = ch[ref.listKey] || [];
  const skill = skillList.find(function(s) { return s.id === ref.id; });
  if (!skill) { alert('Skill not found \u2014 it may have been removed.'); return; }
  const previousName = skill.name;
  skill.name = newName;
  skill.detail = newSkillDesc || skill.detail;
  skill.desc = newSkillDesc || skill.desc;
  if (!skill.growthHistory) skill.growthHistory = [];
  skill.growthHistory.push({ previousName, newName, date: new Date().toLocaleDateString(), notes });

  // Log to growth log
  if (!ch.growthLog) ch.growthLog = [];
  ch.growthLog.push({
    skillId: ref.id,
    rootSkillName: previousName,
    skillName: newName,
    previousName: previousName !== newName ? previousName : null,
    date: new Date().toLocaleDateString(),
    notes,
    newDetail: newSkillDesc || '',
    type: 'growth',
  });

  // Remove the system skill entry from classSkills and selectedSystemSkills (it replaced the existing skill)
  ch.classSkills = ch.classSkills.filter(function(s) { return s.id !== newSkillId; });
  ch.selectedSystemSkills = ch.selectedSystemSkills.filter(function(s) { return s.id !== newSkillId; });

  closeModal();
  showSaveStatus('\u2713 "' + previousName + '" grew into "' + newName + '"!', true);
  renderSystemSkills();
  renderSkillList('classSkills');
  renderGrowthLog();
  renderAllTabs();
  scheduleAutoSave();
}

function renderStatRewards() {
  const ch = characters[activeCharIdx];
  const el = document.getElementById('statRewardsList');
  if (!el) return;
  el.innerHTML='';
  if (!ch.statRewards||ch.statRewards.length===0) { el.innerHTML='<div style="color:var(--text3);font-size:0.83rem">No stat rewards yet.</div>'; return; }
  ch.statRewards.forEach(r=>{
    const d=document.createElement('div');
    d.className='stat-reward-item';
    const bonusTags = Object.entries(r.bonuses||{}).filter(([,v])=>v>0).map(([k,v])=>`<span class="stat-reward-bonus">+${v} ${STAT_ABBR[k]||k}</span>`).join('');
    d.draggable = true;
    d.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="display:flex;align-items:center;gap:4px"><span class="drag-handle" title="Drag to reorder">⠿</span><span style="font-family:'Cinzel',serif;font-size:0.78rem;color:var(--gold)">[${escHtml(r.source||'Reward')}]</span></span>
        <button class="btn btn-red btn-xs" onclick="removeStatReward(${r.id})">✕</button>
      </div>
      <div style="font-size:0.8rem;color:var(--text3);margin-top:2px;font-style:italic">${escHtml(r.desc||'')}</div>
      <div class="stat-reward-bonuses">${bonusTags}</div>`;
    el.appendChild(d);
  });
  makeDraggable(el, 'statRewards', renderStatRewards);
}

function openStatRewardModal() {
  const statInputs = STAT_KEYS.map(k=>`
    <div class="form-checkbox-row" style="margin-bottom:4px">
      <label class="form-check-label" style="min-width:90px">${k}</label>
      <input class="form-input" id="sr_${k}" type="number" value="0" min="0" style="width:55px"/>
    </div>`).join('');
  openModal('Add Stat Reward', `
    <div class="form-field" style="margin-bottom:8px"><label class="form-label">Source / Title</label><input class="form-input" id="srSource" placeholder="e.g. Boss Reward, Event"/></div>
    <div class="form-field" style="margin-bottom:8px"><label class="form-label">One-line Description</label><input class="form-input" id="srDesc" placeholder="What led to this reward?"/></div>
    <div class="form-label" style="margin-bottom:6px">Stat Increases</div>
    ${statInputs}
    <button class="btn btn-green" style="width:100%;margin-top:12px" onclick="saveStatReward()">Add Stat Reward</button>
  `);
}

function saveStatReward() {
  const ch = characters[activeCharIdx];
  const bonuses = {};
  for (const k of STAT_KEYS) { const v=parseInt(document.getElementById('sr_'+k)?.value)||0; if(v) bonuses[k]=v; }
  const reward = {id:ch.nextId++, source:getVal('srSource').trim(), desc:getVal('srDesc').trim(), bonuses};
  ch.statRewards = ch.statRewards||[];
  ch.statRewards.push(reward);
  // Apply to rewardBonus
  for (const [k,v] of Object.entries(bonuses)) { ch.stats[k].rewardBonus=(ch.stats[k].rewardBonus||0)+v; }
  renderStatRewards();
  renderStats();
  closeModal();
}

function removeStatReward(id) {
  const ch = characters[activeCharIdx];
  const r = ch.statRewards.find(x=>x.id===id);
  if (r) { for (const [k,v] of Object.entries(r.bonuses||{})) ch.stats[k].rewardBonus=Math.max(0,(ch.stats[k].rewardBonus||0)-v); }
  ch.statRewards = ch.statRewards.filter(x=>x.id!==id);
  renderStatRewards();
  renderStats();
}

function renderWeapons() {
  const ch = characters[activeCharIdx];
  const el = document.getElementById('weaponsList');
  if (!el) return;
  el.innerHTML='';
  if (!ch.weapons||ch.weapons.length===0) { el.innerHTML='<div style="color:var(--text3);font-size:0.83rem">No weapons or armor.</div>'; return; }
  ch.weapons.forEach(w=>{
    const d=document.createElement('div');
    d.className='weapon-card'+(w.isEquipped?' equipped':'')+(w.isAttack?' attack-weapon':'')+(w.isDefensive?' defensive-weapon':'');
    const tags=[];
    if(w.isEquipped) tags.push('<span class="skill-tag tag-equipped">Equipped</span>');
    if(w.isAttack) tags.push('<span class="skill-tag tag-attack">Attack</span>');
    if(w.isDefensive) tags.push('<span class="skill-tag" style="background:#0a1a2e;color:#6aaee8;border:1px solid #4a8fc4">Defensive</span>');
    if(w.isGrowth) tags.push('<span class="skill-tag tag-growth">Growth</span>');
    if(w.isSoulBound) tags.push('<span class="skill-tag tag-soulbound">Soul Bound</span>');
    const atkBtns = w.isAttack ? `<button class="to-hit-btn" onclick="rollToHit(${w.id},'weapons')">To Hit</button><button class="attack-btn" onclick="rollWeaponAttack(${w.id})">Roll DMG</button>` : '';
    // Build AC display for defensive items
    let acLine = '';
    if (w.isDefensive) {
      const ch2 = characters[activeCharIdx];
      let acVal = w.acBase||0;
      let acParts = [`Base ${acVal}`];
      if (w.acStatBase) { const sv=calcStatTotal(w.acStatBase,ch2); acVal+=sv; acParts.push(`+${w.acStatBase} Base(${sv})`); }
      if (w.acStatMod) { const mv=getMod(w.acStatMod,ch2); acVal+=mv; acParts.push(`+${w.acStatMod} Mod(${mv})`); }
      acLine = `<div class="skill-detail" style="color:var(--blue2)"><strong>AC: ${acVal}</strong> <span style="color:var(--text3);font-size:0.78rem">(${acParts.join(' ')})</span></div>`;
    }
    d.draggable = true;
    d.innerHTML=`
      <div class="skill-row">
        <span class="drag-handle" title="Drag to reorder">⠿</span>
        <span class="skill-name">${escHtml(w.name)}</span>
        <div class="skill-actions">${atkBtns}
          <button class="btn btn-sm" style="background:var(--bg4);color:var(--text3);border-color:var(--border)" onclick="openEditWeaponModal(${w.id})">✎</button>
          <button class="btn btn-red btn-xs" onclick="removeWeapon(${w.id})">✕</button>
        </div>
      </div>
      ${w.dmg?`<div class="skill-detail"><strong>DMG: ${escHtml(w.dmg)} ${escHtml(w.dmgType||'')}</strong></div>`:''}
      ${acLine}
      ${w.desc?`<div class="skill-detail">${escHtml(w.desc)}</div>`:''}
      ${tags.length?`<div class="skill-row" style="margin-top:4px">${tags.join(' ')}</div>`:''}`;
    el.appendChild(d);
  });
  makeDraggable(el, 'weapons', renderWeapons);
}

function joinRoom(roomId, isCreator) {
  if (!_firebaseDb) return;
  _roomId = roomId;

  // Reflect room ID in the URL so others can join via the same link
  const url = new URL(window.location.href);
  url.searchParams.set('room', roomId);
  history.replaceState(null, '', url.toString());

  const roomRef = _firebaseDb.ref('rooms/' + roomId);

  // Presence — auto-remove on disconnect
  const presRef = roomRef.child('presence/' + _userId);
  const chName = characters[activeCharIdx] ? characters[activeCharIdx].name : 'Player';
  presRef.set({ uid: _userId, name: chName, joined: Date.now() });
  presRef.onDisconnect().remove();

  // If we created the room, push our current characters up
  if (isCreator) pushCharactersToFirebase();

  // Listen for character state changes from others
  roomRef.child('characters').on('value', function(snap) {
    const val = snap.val();
    if (!val || val.by === _userId) return; // skip own pushes
    _receivingRemoteUpdate = true;
    // Preserve local navigation — each client navigates independently
    const savedActiveIdx = activeCharIdx;
    const savedIsDMView  = isDMView;
    try {
      const savedScroll = window.pageYOffset;
      applyLoadedState(JSON.parse(val.payload));
      activeCharIdx = Math.min(savedActiveIdx, characters.length - 1);
      isDMView = savedIsDMView;
      characters.forEach(function(ch) { recalcVitals(ch); });
      renderAllTabs();
      renderSheet();
      if (savedScroll > 0) requestAnimationFrame(function() { window.scrollTo(0, savedScroll); });
    } catch(e) { console.warn('Firebase character sync error:', e); }
    _receivingRemoteUpdate = false;
  });

  // Listen for new rolls — skip existing history on join
  let rollInitDone = false;
  roomRef.child('rolls').orderByChild('ts').on('child_added', function(snap) {
    if (!rollInitDone) return;
    const data = snap.val();
    if (!data || data.by === _userId) return; // skip own rolls — already rendered locally
    _renderRollCard(data);
  });
  setTimeout(function() { rollInitDone = true; }, 300);

  // Listen for presence changes
  roomRef.child('presence').on('value', function(snap) {
    _renderPresence(snap.val() || {});
  });

  updateGoLiveBtn();
}

function pushCharactersToFirebase() {
  if (!_firebaseDb || !_roomId || _receivingRemoteUpdate) return;
  _firebaseDb.ref('rooms/' + _roomId + '/characters').set({
    payload: JSON.stringify(getSerializableState()),
    by: _userId,
    ts: Date.now()
  });
}

  });
}

function _parseLabel(label) {
  // "[SkillName] DMG"  /  "[SkillName] To Hit"
  const skillMatch = label.match(/^\[(.+?)\]\s+(.+)$/);
  if (skillMatch) return { type: skillMatch[2].toUpperCase(), action: skillMatch[1].toUpperCase() };
  // "Strength Check" etc.
  const statCheck = label.match(/^(\w+)\s+Check$/i);
  if (statCheck) {
    const abbr = STAT_ABBR[statCheck[1]] || statCheck[1].toUpperCase().slice(0, 3);
    return { type: abbr, action: 'CHECK' };
  }
  if (label === 'Level Up!')          return { type: 'LEVEL',  action: 'UP'      };
  if (label === 'Level Up Undone')    return { type: 'LEVEL',  action: 'UNDO'    };
  if (label.startsWith('System Skill')) return { type: 'SKILL', action: 'UNLOCK' };
  const freeRoll = label.match(/^Quick Roll (.+)$/i);
  if (freeRoll) return { type: freeRoll[1].toUpperCase(), action: 'FREE ROLL' };
  const parts = label.trim().split(/\s+/);
  if (parts.length >= 2) return { type: parts[0].toUpperCase(), action: parts.slice(1).join(' ').toUpperCase() };
  return { type: 'ROLL', action: label.toUpperCase() };
}

function _renderRollCard(data) {
  _logData.push(data);
  const log = document.getElementById('logEntries');
  if (!log) return;
  const ph = log.querySelector('.log-empty');
  if (ph) ph.remove();

  const isCrit   = data.roll === 100;
  const isFumble = data.roll === 1;
  const totalColor = isCrit ? '#ffd700' : isFumble ? '#ff4444' : '';
  const time = new Date(data.ts).toLocaleString([], {
    month: 'numeric', day: 'numeric', year: 'numeric',
    hour: 'numeric', minute: '2-digit'
  });
  const initial = (data.charName || '?').charAt(0).toUpperCase();

  const group = document.createElement('div');
  group.className = 'log-group';
  group.innerHTML =
    '<div class="log-char-name">' + escHtml(data.charName) + '</div>' +
    '<div class="log-card">' +
      '<div class="log-card-body">' +
        '<div class="log-avatar" style="background:' + escHtml(data.accentColor) + '">' + initial + '</div>' +
        '<div class="log-label">' +
          '<span class="log-label-type">' + escHtml(data.labelType) + '</span>' +
          '<span class="log-label-type">: </span>' +
          '<span class="log-label-action" style="color:' + escHtml(data.accentColor) + '">' + escHtml(data.labelAction) + '</span>' +
          (data.breakdown ? '<div class="log-breakdown">' + escHtml(data.breakdown) + ' <strong>' + data.total + '</strong></div>' : '') +
        '</div>' +
      '</div>' +
      '<div class="log-divider"></div>' +
      '<div class="log-card-total"' + (totalColor ? ' style="color:' + totalColor + '"' : '') + '>' + data.total + '</div>' +
    '</div>' +
    '<div class="log-entry-time">' + escHtml(time) + '</div>';

  log.insertBefore(group, log.firstChild);

  const gl = document.getElementById('gameLog');
  if (gl.classList.contains('collapsed')) {
    gl.classList.remove('collapsed');
    document.getElementById('logToggleIcon').textContent = '▼';
  }
  if (isDMView) dmUpdateDMLog();
}

function showDiceAnimation(result, accentColor, callback) {
  const overlay = document.getElementById('diceOverlay');
  if (!overlay) { if (callback) callback(); return; }

  const scene = document.createElement('div');
  scene.className = 'die-scene';
  scene.style.top = (15 + Math.random() * 35) + 'vh';

  const cube = document.createElement('div');
  cube.className = 'die-cube';

  const brightness = { front:1, top:0.88, right:0.82, left:0.78, back:0.65, bottom:0.6 };
  Object.keys(brightness).forEach(function(face) {
    const f = document.createElement('div');
    f.className = 'die-face ' + face;
    f.textContent = face === 'front' ? result : '';
    f.style.background = accentColor;
    f.style.filter = 'brightness(' + brightness[face] + ')';
    cube.appendChild(f);
  });

  scene.appendChild(cube);
  overlay.appendChild(scene);

  // After 1.5s animation, pause on result (card renders now), then fade die out
  setTimeout(function() {
    if (callback) callback();
    setTimeout(function() {
      scene.style.transition = 'opacity 0.35s ease, transform 0.35s ease';
      scene.style.opacity = '0';
      scene.style.transform = 'translateY(-18px) scale(0.82)';
      setTimeout(function() {
        if (overlay.contains(scene)) overlay.removeChild(scene);
      }, 350);
    }, 750);
  }, 1500);
}

function addLog(label, breakdown, total, roll) {
  const ch = characters[activeCharIdx];
  const charName    = ch ? ch.name : 'Unknown';
  const accentColor = THEME_DOTS[ch ? (ch.theme || 'theme-crimson') : 'theme-crimson'] || '#8b1a1a';
  const parsed      = _parseLabel(label);

  const rollData = {
    charName,
    accentColor,
    labelType:   parsed.type,
    labelAction: parsed.action,
    breakdown,
    total,
    roll,
    by: _userId,
    ts: Date.now()
  };

  // Show dice animation; render card + sync only after it lands
  showDiceAnimation(total, accentColor, function() {
    _renderRollCard(rollData);
    if (_firebaseDb && _roomId) {
      _firebaseDb.ref('rooms/' + _roomId + '/rolls').push(rollData);
    }
  });
}

    <div class="form-field" style="margin-bottom:12px"><label class="form-label">Character Name</label><input class="form-input" id="wizName" placeholder="Enter name..." value="${escHtml(_wizData.name||'')}"/></div>
    <div class="form-label" style="margin-bottom:8px">Starting Race Gender (determines race grade progression)</div>
    <div class="option-grid">
      <div class="option-card ${_wizData.gender==='G'?'selected':''}" onclick="selectWiz('gender','G',this)"><div class="option-card-title">Human (G)</div><div class="option-card-desc">Race Level 0–9</div></div>
      <div class="option-card ${_wizData.gender==='F'?'selected':''}" onclick="selectWiz('gender','F',this)"><div class="option-card-title">Human (F)</div><div class="option-card-desc">Race Level 10–24</div></div>
    </div>
    <button class="btn btn-gold" style="width:100%" onclick="wizNext()">Next →</button>
  `;
  if (step===2) return `
    <div class="wizard-title">Step 2 of 3 — Class</div>
    <div class="wizard-sub">Choose your class. This determines your stat bonus progression.</div>
    <div class="option-grid">
      <div class="option-card ${_wizData.charClass==='Mage'?'selected':''}" onclick="selectWiz('charClass','Mage',this)">
        <div class="option-card-title">Mage</div>
        <div class="option-card-desc">Level bonuses: +2 INT, +1 WIS, VIT, PER, PER per Class Level.<br/>High MP pool.</div>
      </div>
      <div class="option-card ${_wizData.charClass==='Melee'?'selected':''}" onclick="selectWiz('charClass','Melee',this)">
        <div class="option-card-title">Melee</div>
        <div class="option-card-desc">Level bonuses: +2 STR, +1 AGI, VIT, PER, WIS per Class Level.<br/>High HP pool.</div>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn" style="flex:1" onclick="wizBack()">← Back</button>
      <button class="btn btn-gold" style="flex:2" onclick="wizNext()">Next →</button>
    </div>
  `;
  if (step===3) {
    const statInputs = STAT_KEYS.map(k=>`
      <div class="stat-init-row">
        <label class="stat-init-label">${k} (${STAT_ABBR[k]})</label>
        <input class="stat-init-input" id="wizStat_${k}" type="number" value="${_wizData.stats[k]||5}" min="1" max="50"/>
      </div>`).join('');
    return `
      <div class="wizard-title">Step 3 of 3 — Starting Stats</div>
      <div class="wizard-sub">Enter the starting base values for each stat. The modifier is base ÷ 2.</div>
      <div class="stat-init-grid">${statInputs}</div>
      <div style="display:flex;gap:8px;margin-top:14px">
        <button class="btn" style="flex:1" onclick="wizBack()">← Back</button>
        <button class="btn btn-gold" style="flex:2" onclick="wizCreate()">Create Character ✦</button>
      </div>`;
  }
}

function selectWiz(field, val, el) {
  _wizData[field]=val;
  el.closest('.option-grid').querySelectorAll('.option-card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
}

function wizNext() {
  if (_wizData.step===1) { _wizData.name=document.getElementById('wizName').value.trim(); if(!_wizData.name){alert('Please enter a name.');return;} }
  if (_wizData.step===2) {}
  _wizData.step++;
  document.getElementById('modalBody').innerHTML=buildWizardHTML();
}

function wizBack() { _wizData.step--; document.getElementById('modalBody').innerHTML=buildWizardHTML(); }

function wizCreate() {
  const startStats={};
  for(const k of STAT_KEYS){startStats[k]=parseInt(document.getElementById('wizStat_'+k)?.value)||5;}
  const ch = makeBlankChar(_wizData.name, _wizData.race+' ('+_wizData.gender+')', _wizData.charClass, startStats);
  characters.push(ch);
  activeCharIdx=characters.length-1;
  closeModal();
  renderAllTabs();
  renderSheet();
}
